<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Official Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Zhi+Mang+Xing&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e9e7e2; 
        }
        
        body {
            background-color: var(--paper);
            background-image: 
                url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            height: 100vh; overflow: hidden;
            /* Custom Scrollbar for the form */
        }

        /* Large Background Watermark */
        body::before {
            content: "茶";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60vh;
            color: rgba(0, 0, 0, 0.03);
            font-family: 'Zhi Mang Xing', cursive;
            pointer-events: none;
            z-index: -1;
        }

        /* Return Home Button */
        .back-home {
            position: fixed;
            top: 30px;
            left: 30px;
            display: flex;
            items-center;
            gap: 10px;
            font-family: 'ZCOOL XiaoWei';
            font-weight: bold;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: 0.3s;
            z-index: 100;
            opacity: 0.6;
        }
        .back-home:hover { opacity: 1; color: var(--cinnabar); transform: translateX(-5px); }

        /* Question Box Enhancements */
        .question-box {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 2rem;
            margin-bottom: 1.5rem;
            position: relative;
            transition: all 0.4s ease;
        }
        .question-box:focus-within {
            background: white;
            box-shadow: 15px 15px 0px rgba(188, 47, 50, 0.05);
            border-color: var(--cinnabar);
        }

        /* Better Dropdowns & Inputs */
        select, input[type="text"], textarea {
            appearance: none;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            width: 100%;
            padding: 10px 0;
            font-family: 'ZCOOL XiaoWei';
            font-size: 1.2rem;
            outline: none;
            transition: 0.3s;
        }
        select:focus, input:focus { border-bottom-color: var(--cinnabar); }

        /* Custom Radio Buttons (Ink Blot Style) */
        .radio-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .radio-item { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .radio-item input { display: none; }
        .custom-radio {
            width: 18px; height: 18px; border: 2px solid var(--ink);
            border-radius: 50%; position: relative; transition: 0.3s;
        }
        .radio-item input:checked + .custom-radio { background: var(--cinnabar); border-color: var(--cinnabar); }
        .radio-item input:checked + .custom-radio::after {
            content: ''; position: absolute; width: 6px; height: 6px;
            background: white; border-radius: 50%; top: 4px; left: 4px;
        }

        /* Error Shake Animation */
        .error-shake { animation: shake 0.4s ease-in-out; border-bottom: 2px solid var(--cinnabar) !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .required-mark { color: var(--cinnabar); margin-left: 4px; }
    </style>
</head>
<body>

    <a href="/dprt/" class="back-home">
        <span>←</span> RETURN TO HOME
    </a>

    <div class="vertical-tracker" id="tracker"></div>

    <main class="h-full flex flex-col items-center justify-center px-6 mt-10">
        <h1 id="app-title" class="text-4xl font-['ZCOOL_XiaoWei'] mb-12 tracking-[0.4em] uppercase text-center"></h1>
        
        <form id="app-form" class="w-full max-w-xl overflow-y-auto max-h-[70vh] pr-4" onsubmit="return false;">
            <div id="pages-root"></div>
        </form>
    </main>

    <div class="nav-container">
        <div id="prev-btn" class="nav-btn" onclick="move(-1)">〔 PREVIOUS 〕</div>
        <div id="next-btn" class="nav-btn" onclick="move(1)">NEXT →</div>
    </div>

    <script>
        const formConfig = {
            title: "Ministry of Tea Registry",
            sections: [
                {
                    questions: [
                        { id: "id", label: "Citizen Identity", type: "text", placeholder: "Name...", required: true },
                        { id: "age", label: "Real Age", type: "radio", options: ["13 or below", "14", "15", "16", "17", "18+"], required: true }
                    ]
                },
                {
                    questions: [
                        { id: "volunteer", label: "Volunteer Confirmation", type: "radio", options: ["Yes, I understand this is volunteer"], required: true },
                        { id: "sector", label: "Desired Sector", type: "select", options: ["Diplomacy", "Defense", "Archives"], required: false }
                    ]
                }
            ]
        };

        let currentStep = 0;

        function init() {
            const root = document.getElementById('pages-root');
            document.getElementById('app-title').innerText = formConfig.title;
            
            formConfig.sections.forEach((section, sIdx) => {
                const page = document.createElement('div');
                page.className = `page-layer ${sIdx === 0 ? 'active' : ''}`;
                page.id = `step-${sIdx}`;

                section.questions.forEach(q => {
                    const box = document.createElement('div');
                    box.className = "question-box";
                    const reqHtml = q.required ? '<span class="required-mark">*</span>' : '';
                    
                    let field = '';
                    if(q.type === 'text') {
                        field = `<input type="text" name="${q.id}" placeholder="${q.placeholder}" ${q.required ? 'data-required="true"' : ''}>`;
                    } else if(q.type === 'radio') {
                        field = `<div class="radio-group" ${q.required ? 'data-required="true"' : ''} data-name="${q.id}">` + 
                            q.options.map(o => `
                                <label class="radio-item">
                                    <input type="radio" name="${q.id}" value="${o}">
                                    <div class="custom-radio"></div>
                                    <span class="text-sm opacity-80 uppercase tracking-widest">${o}</span>
                                </label>
                            `).join('') + `</div>`;
                    } else if(q.type === 'select') {
                        field = `<select name="${q.id}" ${q.required ? 'data-required="true"' : ''}>
                                    <option value="" selected disabled>Select an option...</option>
                                    ${q.options.map(o => `<option value="${o}">${o}</option>`).join('')}
                                 </select>`;
                    }

                    box.innerHTML = `<label class="text-[10px] uppercase tracking-[0.4em] text-[#bc2f32] mb-3 block font-black">${q.label}${reqHtml}</label>${field}`;
                    page.appendChild(box);
                });
                root.appendChild(page);
            });
            updateNav();
        }

        function validatePage() {
            const currentPage = document.getElementById(`step-${currentStep}`);
            const requiredFields = currentPage.querySelectorAll('[data-required="true"]');
            let isValid = true;

            requiredFields.forEach(field => {
                // Radio Validation
                if(field.classList.contains('radio-group')) {
                    const checked = field.querySelector('input:checked');
                    if(!checked) {
                        isValid = false;
                        field.classList.add('error-shake');
                        setTimeout(() => field.classList.remove('error-shake'), 400);
                    }
                } 
                // Input/Select Validation
                else if(!field.value || field.value.trim() === "") {
                    isValid = false;
                    field.classList.add('error-shake');
                    setTimeout(() => field.classList.remove('error-shake'), 400);
                }
            });

            return isValid;
        }

        function move(dir) {
            if(dir === 1 && !validatePage()) return; // Block moving forward if invalid

            const nextStep = currentStep + dir;
            if(nextStep < 0 || nextStep >= formConfig.sections.length + 1) return;
            
            if(nextStep === formConfig.sections.length) {
                alert("Recording to Archives...");
                return;
            }

            document.getElementById(`step-${currentStep}`).classList.remove('active');
            currentStep = nextStep;
            document.getElementById(`step-${currentStep}`).classList.add('active');
            updateNav();
        }

        function updateNav() {
            const next = document.getElementById('next-btn');
            const prev = document.getElementById('prev-btn');
            prev.style.visibility = (currentStep === 0) ? "hidden" : "visible";
            next.innerText = (currentStep === formConfig.sections.length - 1) ? "COMMIT →" : "NEXT →";
        }

        window.onload = init;
    </script>
</body>
</html>
