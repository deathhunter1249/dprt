<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Official Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Zhi+Mang+Xing&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1a1a; --cinnabar: #bc2f32; --paper: #e9e7e2; }
        
        body {
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            height: 100vh; overflow: hidden; margin: 0;
        }

        /* Large Background Watermark */
        body::before {
            content: "茶";
            position: fixed;
            top: 50%; left: 65%;
            transform: translate(-50%, -50%);
            font-size: 80vh;
            color: rgba(0, 0, 0, 0.02);
            font-family: 'Zhi Mang Xing', cursive;
            pointer-events: none; z-index: -1;
        }

        /* Return Home Button */
        .back-home {
            position: fixed; top: 40px; left: 40px;
            display: flex; align-items: center; gap: 12px;
            font-family: 'ZCOOL XiaoWei'; font-weight: bold; letter-spacing: 0.15em;
            cursor: pointer; transition: 0.3s; z-index: 100; opacity: 0.5;
            text-decoration: none; color: var(--ink);
        }
        .back-home:hover { opacity: 1; color: var(--cinnabar); transform: translateX(-5px); }

        /* Split Layout */
        .side-panel {
            width: 35%; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; padding-left: 8%; border-right: 1px solid rgba(0,0,0,0.05);
        }

        .form-area {
            width: 65%; height: 100vh; overflow-y: auto;
            padding: 10vh 10% 20vh 5%; scroll-behavior: smooth;
        }

        /* Custom Inky Scrollbar */
        .form-area::-webkit-scrollbar { width: 4px; }
        .form-area::-webkit-scrollbar-track { background: transparent; }
        .form-area::-webkit-scrollbar-thumb { background: var(--cinnabar); border-radius: 10px; }

        .progress-container { width: 150px; height: 2px; background: rgba(0,0,0,0.1); margin-top: 20px; }
        .progress-fill { height: 100%; background: var(--cinnabar); width: 0%; transition: width 0.6s ease; }

        .page-layer { display: none; opacity: 0; flex-direction: column; gap: 2rem; }
        .page-layer.active { display: flex; animation: inkFade 0.6s ease forwards; }

        @keyframes inkFade {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .question-box {
            background: rgba(255, 255, 255, 0.4); padding: 2.5rem;
            border: 1px solid rgba(0,0,0,0.03); transition: 0.4s;
        }
        .question-box:focus-within { border-color: var(--cinnabar); background: white; }

        input, select, textarea {
            background: transparent !important; width: 100%; border: none;
            border-bottom: 2px solid rgba(0,0,0,0.05); outline: none; padding: 0.8rem 0;
            font-size: 1.2rem; color: var(--ink); font-family: 'ZCOOL XiaoWei', serif;
        }
        input:focus { border-bottom-color: var(--cinnabar); }

        .nav-fixed { position: fixed; bottom: 6vh; right: 10%; display: flex; gap: 40px; align-items: center; }
        .nav-btn { font-family: 'ZCOOL XiaoWei'; letter-spacing: 0.3em; cursor: pointer; transition: 0.3s; font-size: 0.85rem; font-weight: bold; }
        .nav-btn:hover { color: var(--cinnabar); }

        .error-shake { animation: shake 0.4s ease-in-out; border-bottom-color: var(--cinnabar) !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body class="flex">

    <a href="/dprt/" class="back-home">
        <span>←</span> RETURN TO HOME
    </a>

    <aside class="side-panel">
        <p id="step-counter" class="text-[10px] tracking-[0.5em] text-[#bc2f32] font-black uppercase mb-2">Initializing...</p>
        <h1 id="app-title" class="text-5xl font-['ZCOOL_XiaoWei'] tracking-widest uppercase">Registry</h1>
        <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
    </aside>

    <main class="form-area" id="form-scroll-container">
        <form id="app-form">
            <div id="pages-root"></div>
        </form>
    </main>

    <div class="nav-fixed">
        <div id="prev-btn" class="nav-btn" onclick="move(-1)">〔 PREV 〕</div>
        <div id="next-btn" class="nav-btn" onclick="move(1)">NEXT →</div>
    </div>

    <script>
        let currentStep = 0;
        let formConfig = null;

        async function loadConfig() {
            try {
                // Since form.json is in the SAME folder as this HTML file:
                const jsonUrl = './form.json';

                console.log("📡 Fetching from local directory:", jsonUrl);
                const response = await fetch(jsonUrl);
                
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                formConfig = await response.json();
                
                document.getElementById('app-title').innerText = formConfig.title;
                renderForm();
                updateUI();
            } catch (err) {
                console.error("⛔ Fetch Error:", err);
                document.getElementById('app-title').innerText = "Registry Missing";
                document.getElementById('step-counter').innerText = "ERROR 404";
            }
        }

        function renderForm() {
            const root = document.getElementById('pages-root');
            root.innerHTML = ''; 
            
            formConfig.sections.forEach((section, sIdx) => {
                const page = document.createElement('div');
                page.className = `page-layer ${sIdx === 0 ? 'active' : ''}`;
                page.id = `step-${sIdx}`;

                section.questions.forEach(q => {
                    const box = document.createElement('div');
                    box.className = "question-box";
                    const reqAttr = q.required ? 'data-required="true"' : '';
                    
                    let field = '';
                    if(q.type === 'text') {
                        field = `<input type="text" name="${q.id}" placeholder="${q.placeholder}" ${reqAttr} autocomplete="off">`;
                    } else if(q.type === 'select') {
                        field = `<select name="${q.id}" ${reqAttr}>
                                    <option value="" disabled selected>Select an option...</option>
                                    ${q.options.map(o => `<option value="${o}">${o}</option>`).join('')}
                                 </select>`;
                    } else if(q.type === 'textarea') {
                        field = `<textarea name="${q.id}" rows="3" placeholder="${q.placeholder}" ${reqAttr}></textarea>`;
                    }

                    box.innerHTML = `<label class="text-[9px] uppercase tracking-[0.4em] text-[#bc2f32] mb-4 block font-black opacity-60">${q.label} ${q.required ? '*' : ''}</label>${field}`;
                    page.appendChild(box);
                });
                root.appendChild(page);
            });
        }

        function validatePage() {
            const currentPage = document.getElementById(`step-${currentStep}`);
            if (!currentPage) return true;
            const requiredFields = currentPage.querySelectorAll('[data-required="true"]');
            let allValid = true;

            requiredFields.forEach(field => {
                if (!field.value || field.value.trim() === "") {
                    allValid = false;
                    field.classList.add('error-shake');
                    setTimeout(() => field.classList.remove('error-shake'), 400);
                }
            });
            return allValid;
        }

        function move(dir) {
            if (!formConfig) return;
            if (dir === 1 && !validatePage()) return;
            const nextStep = currentStep + dir;
            
            if (nextStep < 0) return;
            if (nextStep === formConfig.sections.length) {
                submitForm();
                return;
            }

            document.getElementById(`step-${currentStep}`).classList.remove('active');
            currentStep = nextStep;
            document.getElementById(`step-${currentStep}`).classList.add('active');
            document.getElementById('form-scroll-container').scrollTop = 0;
            updateUI();
        }

        function updateUI() {
            if(!formConfig) return;
            const total = formConfig.sections.length;
            const progress = ((currentStep + 1) / total) * 100;
            
            document.getElementById('step-counter').innerText = `Step ${currentStep + 1} / ${total}`;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('prev-btn').style.visibility = (currentStep === 0) ? "hidden" : "visible";
            document.getElementById('next-btn').innerText = (currentStep === total - 1) ? "COMMIT →" : "NEXT →";
        }

        function submitForm() {
            document.body.style.opacity = "0";
            document.body.style.transition = "opacity 1s";
            setTimeout(() => {
                alert("The ink has dried. Registry sent.");
                window.location.href = "/dprt/";
            }, 1000);
        }

        window.onload = loadConfig;
    </script>
</body>
</html>
