<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Official Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Zhi+Mang+Xing&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1a1a; --cinnabar: #bc2f32; --paper: #e9e7e2; }
        
        body {
            background-color: var(--paper);
            background-image: 
                linear-gradient(to bottom, rgba(233, 231, 226, 0.8), rgba(233, 231, 226, 0.5)),
                url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            height: 100vh; overflow: hidden;
        }

        .mist {
            position: fixed; bottom: 0; width: 100%; height: 45vh;
            background: linear-gradient(to top, rgba(0,0,0,0.06), transparent);
            filter: blur(60px); pointer-events: none;
        }

        /* Large Side Progress Tracker */
        .vertical-tracker {
            position: fixed; left: 4vw; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            z-index: 50;
        }
        .step-node {
            width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid var(--ink); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .step-node.active { background: var(--cinnabar); border-color: var(--cinnabar); box-shadow: 0 0 15px var(--cinnabar); }
        .step-line { width: 1px; height: 45px; background: rgba(0,0,0,0.1); }

        /* Floating "Cloud" Question Areas */
        .page-layer { display: none; animation: slideUp 0.7s ease-out forwards; }
        .page-layer.active { display: flex; flex-direction: column; gap: 1.8rem; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-box {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            padding: 1.5rem 3rem;
            border-radius: 50px 15px 50px 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 10px 10px 40px rgba(0,0,0,0.03);
            width: 100%;
        }

        input, select, textarea {
            background: transparent !important; width: 100%; border: none;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            outline: none; padding: 0.6rem 0; font-size: 1.15rem;
            color: var(--ink); transition: border-color 0.3s;
        }
        input:focus { border-bottom-color: var(--cinnabar); }

        /* Navigation */
        .nav-container { position: fixed; bottom: 6vh; width: 100%; padding: 0 6vw; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav-btn { font-family: 'ZCOOL XiaoWei'; letter-spacing: 0.25em; cursor: pointer; transition: 0.3s; opacity: 0.7; font-weight: bold; }
        .nav-btn:hover { color: var(--cinnabar); opacity: 1; transform: scale(1.05); }
        .submit-btn { background: var(--cinnabar); color: white; padding: 0.7rem 2.8rem; border-radius: 3px; opacity: 1; }
        .submit-btn:hover { background: #9b2426; color: white; }
    </style>
</head>
<body>

    <div class="mist"></div>
    <div class="vertical-tracker" id="tracker"></div>

    <main class="h-full flex flex-col items-center justify-center px-6">
        <h1 id="app-title" class="text-3xl font-['ZCOOL_XiaoWei'] mb-12 tracking-widest opacity-90 uppercase"></h1>
        
        <form id="app-form" class="w-full max-w-2xl">
            <div id="pages-root"></div>
        </form>
    </main>

    <div class="nav-container">
        <div id="prev-btn" class="nav-btn" onclick="move(-1)">← PREVIOUS</div>
        <div id="next-btn" class="nav-btn" onclick="move(1)">NEXT →</div>
    </div>

    <script>
        // --- DATA SECTION: Edit your questions here directly ---
        const formConfig = {
            title: "Ministry of Tea Registry",
            sections: [
                {
                    questions: [
                        { id: "id", label: "Citizen Identity", type: "text", placeholder: "Enter name..." },
                        { id: "origin", label: "Province of Origin", type: "text", placeholder: "Where were you forged?" }
                    ]
                },
                {
                    questions: [
                        { id: "sector", label: "Desired Sector", type: "select", options: ["Diplomacy", "Defense", "Internal Archives"] },
                        { id: "specialty", label: "Primary Specialty", type: "text", placeholder: "e.g. Scholar, Guard..." }
                    ]
                },
                {
                    questions: [
                        { id: "vow", label: "The Eternal Vow", type: "textarea", placeholder: "Why do you seek the Republic? State your intent clearly..." }
                    ]
                }
            ]
        };

        let currentStep = 0;
        let totalSections = formConfig.sections.length;

        function init() {
            const root = document.getElementById('pages-root');
            const tracker = document.getElementById('tracker');
            document.getElementById('app-title').innerText = formConfig.title;
            
            formConfig.sections.forEach((section, sIdx) => {
                // Render Page
                const page = document.createElement('div');
                page.className = `page-layer ${sIdx === 0 ? 'active' : ''}`;
                page.id = `step-${sIdx}`;

                section.questions.forEach(q => {
                    const box = document.createElement('div');
                    box.className = "question-box";
                    
                    let field = `<input type="text" name="${q.id}" placeholder="${q.placeholder}">`;
                    if(q.type === 'select') {
                        field = `<select name="${q.id}">${q.options.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
                    } else if(q.type === 'textarea') {
                        field = `<textarea name="${q.id}" rows="2" placeholder="${q.placeholder}"></textarea>`;
                    }

                    box.innerHTML = `<label class="text-[10px] uppercase tracking-[0.4em] opacity-50 mb-3 block font-bold">${q.label}</label>${field}`;
                    page.appendChild(box);
                });
                root.appendChild(page);

                // Render Progress Dots
                const dot = document.createElement('div');
                dot.className = `step-node ${sIdx === 0 ? 'active' : ''}`;
                dot.id = `dot-${sIdx}`;
                tracker.appendChild(dot);
                if(sIdx < totalSections - 1) {
                    const line = document.createElement('div');
                    line.className = "step-line";
                    tracker.appendChild(line);
                }
            });
            updateNav();
        }

        function move(dir) {
            const nextStep = currentStep + dir;
            if(nextStep < 0) return;
            
            if(nextStep === totalSections) {
                submitForm();
                return;
            }

            // Page handling
            const currentP = document.getElementById(`step-${currentStep}`);
            const currentD = document.getElementById(`dot-${currentStep}`);
            if(currentP) currentP.classList.remove('active');
            if(currentD) currentD.classList.remove('active');

            currentStep = nextStep;

            const nextP = document.getElementById(`step-${currentStep}`);
            const nextD = document.getElementById(`dot-${currentStep}`);
            if(nextP) nextP.classList.add('active');
            if(nextD) nextD.classList.add('active');

            updateNav();
        }

        function updateNav() {
            const next = document.getElementById('next-btn');
            const prev = document.getElementById('prev-btn');
            
            prev.style.visibility = (currentStep === 0) ? "hidden" : "visible";
            
            if(currentStep === totalSections - 1) {
                next.innerText = "SUBMIT RECORD";
                next.classList.add('submit-btn');
            } else {
                next.innerText = "NEXT →";
                next.classList.remove('submit-btn');
            }
        }

        function submitForm() {
            const data = Object.fromEntries(new FormData(document.getElementById('app-form')));
            console.log("Archives Data:", data);
            alert("Application Sent to the Republic Archives.");
        }

        window.onload = init;
    </script>
</body>
</html>
