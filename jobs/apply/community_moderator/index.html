<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Zhi+Mang+Xing&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1a1a; --cinnabar: #bc2f32; --paper: #e6e4e0; }
        
        body {
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            min-height: 100vh;
        }

        /* Progress Tracker on the side */
        .progress-sidebar {
            position: fixed;
            left: 5vw;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            border-left: 1px solid rgba(0,0,0,0.1);
            padding-left: 1.5rem;
            z-index: 50;
        }

        .step-dot {
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 1.2rem;
            color: rgba(0,0,0,0.2);
            transition: all 0.5s ease;
            cursor: default;
        }

        .step-dot.active {
            color: var(--cinnabar);
            transform: scale(1.2);
        }

        /* Minimalist Input Styling */
        input, textarea, select {
            background: transparent !important;
            width: 100%;
            padding: 0.75rem 0;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            outline: none;
            border: none;
        }

        /* Thin horizontal spacers */
        .question-wrapper {
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding: 2.5rem 0;
            transition: border-color 0.4s ease;
        }

        .question-wrapper:focus-within {
            border-bottom-color: var(--cinnabar);
        }

        label {
            display: block;
            text-[10px] tracking-[0.4em] font-bold uppercase mb-2 opacity-40;
        }

        .btn-seal {
            border: 1px solid var(--ink);
            padding: 1rem 3rem;
            letter-spacing: 0.5em;
            transition: all 0.3s ease;
            margin-top: 4rem;
        }

        .btn-seal:hover {
            background: var(--cinnabar);
            border-color: var(--cinnabar);
            color: white;
        }
    </style>
</head>
<body>

    <div class="fixed top-1/2 right-10 -translate-y-1/2 text-[30rem] font-['Ma_Shan_Zheng'] opacity-[0.02] pointer-events-none select-none">
        中
    </div>

    <div class="progress-sidebar hidden md:flex">
        <div class="step-dot active" id="dot-0">一</div>
        <div class="step-dot" id="dot-1">二</div>
        <div class="step-dot" id="dot-2">三</div>
        <div class="step-dot" id="dot-3">四</div>
    </div>

    <main class="max-w-4xl mx-auto px-12 py-32 relative z-10">
        
        <header class="mb-20">
            <h1 class="text-5xl font-['ZCOOL_XiaoWei'] tracking-tighter mb-4">MEMBER REGISTRY</h1>
            <div class="w-12 h-1 bg-[#bc2f32]"></div>
        </header>

        <form id="app-form">
            <div id="form-questions">
                </div>

            <div class="flex justify-center">
                <button type="submit" class="btn-seal font-bold">
                    SUBMIT TO ARCHIVES
                </button>
            </div>
        </form>
    </main>

    <script>
        const formConfig = [
            { id: "username", label: "Identity", type: "text", placeholder: "Citizen Name..." },
            { id: "origin", label: "Province of Origin", type: "text", placeholder: "Where were you forged?" },
            { id: "division", label: "Selection", type: "select", options: ["Internal Affairs", "Frontier Guard", "Tea Archives"] },
            { id: "vow", label: "The Vow", type: "textarea", placeholder: "Your loyalty defines the Republic..." }
        ];

        const container = document.getElementById('form-questions');

        formConfig.forEach((q, index) => {
            let html = `
                <div class="question-wrapper reveal-node" data-index="${index}">
                    <label>${q.label}</label>`;
            
            if(q.type === "text") {
                html += `<input type="text" name="${q.id}" placeholder="${q.placeholder}" onfocus="updateProgress(${index})">`;
            } else if(q.type === "textarea") {
                html += `<textarea name="${q.id}" rows="2" placeholder="${q.placeholder}" onfocus="updateProgress(${index})"></textarea>`;
            } else if(q.type === "select") {
                html += `<select name="${q.id}" onfocus="updateProgress(${index})" class="cursor-pointer">
                    ${q.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                </select>`;
            }

            html += `</div>`;
            container.innerHTML += html;
        });

        function updateProgress(index) {
            document.querySelectorAll('.step-dot').forEach((dot, i) => {
                if(i <= index) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        // Handle Submission
        document.getElementById('app-form').onsubmit = (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            alert("Application Submitted.");
            console.log(data);
        };
    </script>
</body>
</html>
