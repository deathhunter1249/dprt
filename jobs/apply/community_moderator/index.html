<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Zhi+Mang+Xing&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1a1a; --cinnabar: #bc2f32; --paper: #e6e4e0; }
        
        body {
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            height: 100vh;
            overflow: hidden; /* Clean, no-scroll feel */
        }

        /* Large Page Indicator */
        .page-counter {
            position: fixed;
            left: 5vw;
            top: 50%;
            transform: translateY(-50%);
            z-index: 50;
            text-align: center;
        }
        .current-num {
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 8rem;
            line-height: 1;
            color: var(--cinnabar);
            display: block;
        }
        .total-num {
            font-size: 1.2rem;
            letter-spacing: 0.5em;
            opacity: 0.3;
            border-top: 1px solid var(--ink);
            padding-top: 10px;
        }

        /* Question Layout */
        .page-container {
            display: none; /* Hidden by default */
            animation: fadeIn 0.8s ease forwards;
        }
        .page-container.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input, textarea, select {
            background: transparent !important;
            width: 100%;
            padding: 1rem 0;
            font-size: 1.5rem;
            outline: none;
            border: none;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            transition: all 0.4s ease;
        }
        input:focus { border-bottom-color: var(--cinnabar); }

        /* Nav Buttons */
        .nav-link {
            position: fixed;
            bottom: 5vh;
            font-family: 'Noto Serif SC', serif;
            font-weight: 900;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-size: 0.9rem;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 100;
        }
        .nav-link:hover { color: var(--cinnabar); }
        .nav-left { left: 5vw; }
        .nav-right { right: 5vw; }

        .btn-submit {
            color: var(--cinnabar);
            border: 1px solid var(--cinnabar);
            padding: 5px 15px;
        }
    </style>
</head>
<body>

    <div class="page-counter">
        <span class="current-num" id="active-idx">一</span>
        <span class="total-num" id="total-idx">/ 四</span>
    </div>

    <main class="h-full flex items-center justify-center px-12">
        <form id="app-form" class="w-full max-w-2xl">
            <div id="dynamic-pages">
                </div>
        </form>
    </main>

    <div id="nav-prev" class="nav-link nav-left" onclick="changePage(-1)">Previous</div>
    <div id="nav-next" class="nav-link nav-right" onclick="changePage(1)">Next</div>

    <script>
        // --- ADD PAGES EASILY HERE ---
        const pages = [
            { label: "Identity", type: "text", id: "user", placeholder: "What is your name?" },
            { label: "Origin", type: "text", id: "home", placeholder: "Where do you hail from?" },
            { label: "Role", type: "select", id: "role", options: ["Frontier Guard", "Archive Keeper", "Tea Master"] },
            { label: "The Vow", type: "textarea", id: "vow", placeholder: "State your purpose..." }
        ];

        const chineseNums = ["一", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
        let currentPage = 0;

        function initForm() {
            const container = document.getElementById('dynamic-pages');
            document.getElementById('total-idx').innerText = "/ " + chineseNums[pages.length - 1];

            pages.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = `page-container ${i === 0 ? 'active' : ''}`;
                div.id = `page-${i}`;
                
                let inputHtml = '';
                if(p.type === 'select') {
                    inputHtml = `<select name="${p.id}">${p.options.map(o => `<option>${o}</option>`).join('')}</select>`;
                } else if(p.type === 'textarea') {
                    inputHtml = `<textarea name="${p.id}" rows="2" placeholder="${p.placeholder}"></textarea>`;
                } else {
                    inputHtml = `<input type="text" name="${p.id}" placeholder="${p.placeholder}">`;
                }

                div.innerHTML = `
                    <label class="text-[10px] tracking-[0.5em] uppercase opacity-40 mb-4 block">${p.label}</label>
                    ${inputHtml}
                `;
                container.appendChild(div);
            });
            updateNav();
        }

        function changePage(step) {
            const nextStep = currentPage + step;
            if (nextStep >= 0 && nextStep < pages.length) {
                document.getElementById(`page-${currentPage}`).classList.remove('active');
                currentPage = nextStep;
                document.getElementById(`page-${currentPage}`).classList.add('active');
                updateNav();
            } else if (nextStep === pages.length) {
                submitForm();
            }
        }

        function updateNav() {
            const nextBtn = document.getElementById('nav-next');
            const prevBtn = document.getElementById('nav-prev');
            
            // Update Large Numbers
            document.getElementById('active-idx').innerText = chineseNums[currentPage];
            
            // Toggle Previous Visibility
            prevBtn.style.visibility = currentPage === 0 ? 'hidden' : 'visible';
            
            // Toggle Next vs Submit
            if (currentPage === pages.length - 1) {
                nextBtn.innerText = "Submit Application";
                nextBtn.classList.add('btn-submit');
            } else {
                nextBtn.innerText = "Next";
                nextBtn.classList.remove('btn-submit');
            }
        }

        function submitForm() {
            const data = Object.fromEntries(new FormData(document.getElementById('app-form')));
            console.log("Final Submission:", data);
            alert("Application Sent to the Republic.");
        }

        initForm();
    </script>
</body>
</html>
