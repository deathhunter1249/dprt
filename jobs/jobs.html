<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | State Personnel Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --dprt-bronze: #b8860b; --dprt-ink: #050505; }
        
        body {
            background: var(--dprt-ink);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            /* Scanline Effect */
            background-image: linear-gradient(rgba(184, 134, 11, 0.02) 50%, transparent 50%);
            background-size: 100% 4px;
        }

        /* Dossier Row Styling */
        .job-row {
            display: grid;
            grid-template-columns: 4px 1fr 2fr 180px;
            align-items: center;
            gap: 2rem;
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(184, 134, 11, 0.1);
            transition: all 0.3s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.01);
        }

        .job-row:hover {
            background: rgba(184, 134, 11, 0.04);
            padding-left: 2rem;
        }

        .job-row::before {
            content: '';
            height: 60%;
            width: 4px;
            background: transparent;
            transition: 0.3s;
        }

        .job-row:hover::before {
            background: var(--dprt-bronze);
            box-shadow: 0 0 15px var(--dprt-bronze);
        }

        .status-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 8px;
            border: 1px solid;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 8px;
        }

        .status-open { color: var(--dprt-bronze); border-color: rgba(184, 134, 11, 0.4); }
        .status-locked { color: #444; border-color: #222; }

        /* Smooth UI Transitions (No Lag) */
        #blur-container { transition: opacity 0.5s ease, transform 0.5s ease; }
        .chinese-font { font-family: 'Noto Serif SC', serif; }

        /* Buttons */
        .btn-enlist {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 12px 24px;
            transition: 0.3s;
            text-align: center;
        }

        /* Admin UI */
        .admin-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #ff4444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div id="blur-container">
        <main class="max-w-7xl mx-auto px-10 py-32">
            <div class="flex justify-between items-end border-b border-zinc-800 pb-10 mb-10">
                <div>
                    <div class="flex items-center space-x-3 mb-4">
                        <div class="h-[1px] w-12 bg-[#b8860b]"></div>
                        <span class="text-[#b8860b] font-mono text-[10px] tracking-[0.5em] uppercase">Directorate of Personnel</span>
                    </div>
                    <h1 class="text-6xl font-black uppercase italic tracking-tighter text-white">State Roles</h1>
                </div>
                <div class="text-right font-mono text-[10px] text-zinc-600 uppercase leading-loose">
                    Security: Tier-1 Clear<br>
                    Last Sync: <span id="sync-time">Just Now</span>
                </div>
            </div>

            <div id="job-list" class="flex flex-col">
                </div>

            <button id="admin-add-trigger" onclick="openEditor()" class="hidden w-full mt-12 border border-dashed border-zinc-800 py-8 text-zinc-600 hover:border-[#b8860b] hover:text-[#b8860b] transition-all font-black uppercase text-[10px] tracking-[0.4em]">
                + Initialize New Directive
            </button>
        </main>
    </div>

    <div id="admin-editor" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center backdrop-blur-sm" onclick="if(event.target == this) closeEditor()">
        <div class="bg-[#0e0e10] border border-[#b8860b]/30 p-10 w-full max-w-lg">
            <h2 class="text-white font-black uppercase mb-8 italic text-xl border-b border-zinc-800 pb-4">Modify Entry</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[9px] uppercase font-bold text-zinc-500 block mb-2">Role Title</label>
                    <input type="text" id="edit-title" class="w-full bg-black border border-zinc-800 p-4 text-white focus:border-[#b8860b] outline-none transition-all">
                </div>
                <div>
                    <label class="text-[9px] uppercase font-bold text-zinc-500 block mb-2">Directives</label>
                    <textarea id="edit-desc" class="w-full bg-black border border-zinc-800 p-4 text-white h-32 focus:border-[#b8860b] outline-none transition-all"></textarea>
                </div>
                <div class="flex items-center space-x-3">
                    <input type="checkbox" id="edit-locked" class="w-4 h-4 accent-[#b8860b]">
                    <label class="text-[10px] uppercase font-black text-zinc-400">Classify as Restricted</label>
                </div>
                <div class="flex space-x-4 pt-4">
                    <button onclick="saveApp()" class="flex-1 bg-[#b8860b] text-black font-black py-4 uppercase text-[10px] tracking-widest">Update Database</button>
                    <button onclick="closeEditor()" class="flex-1 bg-zinc-900 text-white font-black py-4 uppercase text-[10px] tracking-widest">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '1323365609777528962';
        let currentEditingIndex = null;

        let apps = JSON.parse(localStorage.getItem('dprt_apps')) || [
            { title: "Kettlenauts", desc: "Heavy siege infantry tasked with frontline tea-field defense.", locked: false },
            { title: "Teaian Recons", desc: "Intelligence gathering and high-value target elimination.", locked: true }
        ];

        async function loadHeader() {
            try {
                const resp = await fetch('/dprt/header.html');
                if (!resp.ok) throw new Error();
                document.getElementById('header-placeholder').innerHTML = await resp.text();
                initAuth();
            } catch (e) { console.error("Header Error", e); }
        }

        async function initAuth() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            let token = fragment.get('access_token') || localStorage.getItem('discord_access_token');
            
            if (fragment.get('access_token')) {
                localStorage.setItem('discord_access_token', token);
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            let isAdmin = false;

            if (token) {
                try {
                    const response = await fetch('https://discord.com/api/users/@me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!response.ok) throw new Error();
                    const user = await response.json();

                    // Sync UI with header IDs
                    document.getElementById('nav-username').innerText = user.username;
                    document.getElementById('menu-user-name').innerText = user.username;
                    document.getElementById('nav-pfp').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                    document.getElementById('nav-rank').innerText = "Teapotian Citizen";
                    
                    document.getElementById('login-btn').classList.add('hidden');
                    document.getElementById('user-display').classList.remove('hidden');

                    // Admin Check (Add your Discord ID here)
                    if (user.username === 'deathhunter1249' || user.id === '1255927538367332423') {
                        isAdmin = true;
                        document.getElementById('admin-add-trigger').classList.remove('hidden');
                    }
                } catch (err) {
                    localStorage.removeItem('discord_access_token');
                }
            }
            renderApps(isAdmin);
        }

        function renderApps(isAdmin) {
            const list = document.getElementById('job-list');
            list.innerHTML = '';

            apps.forEach((app, index) => {
                const row = document.createElement('div');
                row.className = `job-row ${app.locked ? 'opacity-40' : ''}`;
                
                row.innerHTML = `
                    <div></div>
                    <div>
                        <span class="status-badge ${app.locked ? 'status-locked' : 'status-open'}">
                            ${app.locked ? 'Classified' : 'Active'}
                        </span>
                        <h3 class="text-2xl font-black uppercase italic text-white tracking-tighter">${app.title}</h3>
                    </div>
                    <div class="text-zinc-500 text-sm leading-relaxed max-w-xl">
                        ${app.desc}
                    </div>
                    <div class="flex flex-col items-end">
                        ${isAdmin ? `
                            <div class="flex space-x-4 mb-4 admin-tag">
                                <button onclick="openEditor(${index})" class="hover:text-white transition-colors">EDIT</button>
                                <button onclick="deleteApp(${index})" class="hover:text-white transition-colors">ARCHIVE</button>
                            </div>
                        ` : ''}
                        <button class="btn-enlist w-full ${app.locked ? 'bg-zinc-900 text-zinc-700 cursor-not-allowed' : 'bg-[#b8860b] text-black hover:bg-white transition-all'}">
                            ${app.locked ? 'Restricted' : 'Enlist'}
                        </button>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        // Editor Functions
        function openEditor(index = null) {
            currentEditingIndex = index;
            const modal = document.getElementById('admin-editor');
            if (index !== null) {
                document.getElementById('edit-title').value = apps[index].title;
                document.getElementById('edit-desc').value = apps[index].desc;
                document.getElementById('edit-locked').checked = apps[index].locked;
            } else {
                document.getElementById('edit-title').value = '';
                document.getElementById('edit-desc').value = '';
                document.getElementById('edit-locked').checked = false;
            }
            modal.style.display = 'flex';
        }

        function closeEditor() { document.getElementById('admin-editor').style.display = 'none'; }

        function saveApp() {
            const title = document.getElementById('edit-title').value;
            const desc = document.getElementById('edit-desc').value;
            const locked = document.getElementById('edit-locked').checked;
            if(!title) return;

            const newData = { title, desc, locked };
            if (currentEditingIndex !== null) apps[currentEditingIndex] = newData;
            else apps.push(newData);

            localStorage.setItem('dprt_apps', JSON.stringify(apps));
            closeEditor();
            initAuth();
        }

        function deleteApp(index) {
            if(confirm("Archive this directive?")) {
                apps.splice(index, 1);
                localStorage.setItem('dprt_apps', JSON.stringify(apps));
                initAuth();
            }
        }

        // Logic for the profile menu to avoid lag
        function toggleMenu(show) {
            const menu = document.getElementById('profile-menu');
            const overlay = document.getElementById('global-overlay');
            const blur = document.getElementById('blur-container');
            if (!menu) return;

            if (show) {
                menu.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4');
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                blur.style.opacity = "0.3";
                blur.style.transform = "translateX(-10px)";
            } else {
                menu.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4');
                overlay.classList.add('opacity-0', 'pointer-events-none');
                blur.style.opacity = "1";
                blur.style.transform = "translateX(0)";
            }
        }

        window.onload = loadHeader;
    </script>
</body>
</html>
