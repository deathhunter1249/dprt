<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Imperial Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1a1a; --cinnabar: #bc2f32; --paper: #e6e4e0; }

        body { 
            background-color: var(--paper);
            background-image: url('https://googleusercontent.com/image_collection/image_retrieval/6199966141472970469_0');
            background-blend-mode: multiply;
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif !important; 
            margin: 0; min-height: 100vh; overflow-x: hidden; 
        }

        .brush-font { font-family: 'Ma Shan Zheng', cursive !important; }
        
        .job-card { 
            background: rgba(255, 255, 255, 0.4);
            border-left: 4px solid var(--ink);
            padding: 3rem; position: relative; 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(8px);
        }

        .job-card:hover { 
            background: #fff;
            transform: translateX(10px);
            box-shadow: 20px 20px 60px rgba(0,0,0,0.05);
        }

        #admin-editor {
            position: fixed; top: 0; right: -500px; width: 500px; height: 100%;
            background: #0d0d0d; color: #d1d1d1;
            transition: right 0.6s cubic-bezier(0.8, 0, 0.2, 1);
            z-index: 2000; box-shadow: -20px 0 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            border-left: 1px solid #222;
        }
        #admin-editor.open { right: 0; }

        .input-field {
            background: #141414; border: 1px solid #222; color: #fff;
            width: 100%; padding: 0.8rem; margin-top: 0.4rem; outline: none;
        }
        .input-field:focus { border-color: var(--cinnabar); }

        .icon-opt { 
            cursor: pointer; padding: 10px; border: 1px solid #333; 
            transition: 0.2s; opacity: 0.5; 
        }
        .icon-opt.selected { border-color: var(--cinnabar); opacity: 1; background: #1a1a1a; }
        
        .btn-brush {
            background: var(--cinnabar); color: #fff; padding: 1rem 2rem;
            font-family: 'Zhi_Mang_Xing', cursive !important; font-size: 1.4rem; 
            cursor: pointer; border: none; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="header-placeholder" class="relative z-[1001]"></div>

    <div id="main-content">
        <main class="max-w-7xl mx-auto px-12 py-24">
            <header class="mb-40">
                <h1 class="text-9xl brush-font leading-none text-zinc-900">
                    Archive <span class="text-[#bc2f32]">Directives</span>
                </h1>
            </header>

            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 gap-16"></div>

            <button id="admin-trigger" onclick="openEditor()" class="hidden fixed bottom-12 right-12 w-20 h-20 bg-black text-[#bc2f32] rounded-full shadow-2xl flex items-center justify-center text-4xl font-['Zhi_Mang_Xing'] border-2 border-[#bc2f32] hover:bg-[#bc2f32] hover:text-white transition-all z-[1500]">
                改
            </button>
        </main>
    </div>

    <div id="admin-editor">
        <div class="p-8 border-bottom border-[#222]">
            <span id="editor-mode" class="text-[#bc2f32] font-mono text-[10px] tracking-widest uppercase opacity-60">New Entry</span>
            <h2 class="text-4xl brush-font text-white">Modify Archive</h2>
        </div>
        
        <div class="p-8 overflow-y-auto flex-grow space-y-6">
            <input type="hidden" id="edit-index" value="-1">
            
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Designation</label>
                <input type="text" id="edit-title" class="input-field" placeholder="Job Title">
            </div>

            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Directives</label>
                <textarea id="edit-desc" class="input-field h-32" placeholder="Details..."></textarea>
            </div>

            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500 block mb-2">Select Imperial Icon</label>
                <div class="grid grid-cols-4 gap-2" id="icon-selector">
                    <div class="icon-opt selected" onclick="selectIcon(this, 'seal')">Seal</div>
                    <div class="icon-opt" onclick="selectIcon(this, 'dragon')">Dragon</div>
                    <div class="icon-opt" onclick="selectIcon(this, 'lotus')">Lotus</div>
                    <div class="icon-opt" onclick="selectIcon(this, 'sword')">Sword</div>
                </div>
            </div>

            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Accent Color (HEX)</label>
                <div class="flex gap-2">
                    <input type="color" id="edit-color" class="h-10 w-20 bg-transparent border-none cursor-pointer" value="#bc2f32">
                    <input type="text" id="edit-color-hex" class="input-field !mt-0" value="#bc2f32">
                </div>
            </div>

            <button onclick="saveApp()" class="w-full btn-brush">Seal Entry</button>
            <button onclick="closeEditor()" class="w-full text-[10px] text-zinc-600 uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <script>
        let apps = [];
        let currentAdmin = false;
        let selectedIcon = 'seal';

        const ICON_URLS = {
            seal: 'https://googleusercontent.com/image_collection/image_retrieval/18071948604054727570_0',
            dragon: 'https://cdn-icons-png.flaticon.com/512/3233/3233497.png', // Example placeholders
            lotus: 'https://cdn-icons-png.flaticon.com/512/1045/1045233.png',
            sword: 'https://cdn-icons-png.flaticon.com/512/9167/9167816.png'
        };

        async function loadArchive() {
            try {
                const res = await fetch('./jobsdata.json');
                apps = await res.json();
            } catch (e) { apps = []; }
            renderApps(currentAdmin);
            document.getElementById('main-content').classList.add('visible');
        }

        function renderApps(isAdmin = false) {
            currentAdmin = isAdmin;
            const grid = document.getElementById('job-grid');
            if(isAdmin) document.getElementById('admin-trigger')?.classList.remove('hidden');
            grid.innerHTML = '';

            apps.forEach((app, i) => {
                const card = document.createElement('div');
                card.className = 'job-card';
                card.style.borderLeftColor = app.color || '#1a1a1a';
                
                card.innerHTML = `
                    <div class="w-12 h-12 mb-6 grayscale opacity-80" style="background: url('${ICON_URLS[app.icon || 'seal']}') no-repeat center/contain"></div>
                    <h3 class="text-6xl brush-font mb-4">${app.title}</h3>
                    <p class="text-zinc-600 italic border-l border-zinc-200 pl-6 mb-8">${app.desc}</p>
                    <div class="flex justify-between items-center">
                        <button class="btn-brush !text-lg !py-2" style="background:${app.color || '#bc2f32'}">Initiate</button>
                        ${isAdmin ? `
                            <div class="flex gap-4">
                                <button onclick="editApp(${i})" class="text-zinc-400 hover:text-black uppercase text-[9px] tracking-widest">Edit</button>
                                <button onclick="deleteApp(${i})" class="text-zinc-400 hover:text-red-700 uppercase text-[9px] tracking-widest">Redact</button>
                            </div>
                        ` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function selectIcon(el, icon) {
            document.querySelectorAll('.icon-opt').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            selectedIcon = icon;
        }

        function openEditor() {
            document.getElementById('edit-index').value = "-1";
            document.getElementById('editor-mode').innerText = "New Entry";
            document.getElementById('admin-editor').classList.add('open');
        }

        function closeEditor() { document.getElementById('admin-editor').classList.remove('open'); }

        function editApp(index) {
            const app = apps[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('edit-title').value = app.title;
            document.getElementById('edit-desc').value = app.desc;
            document.getElementById('edit-color').value = app.color || "#bc2f32";
            document.getElementById('editor-mode').innerText = "Edit Entry #" + (index + 1);
            document.getElementById('admin-editor').classList.add('open');
        }

        function saveApp() {
            const idx = parseInt(document.getElementById('edit-index').value);
            const newData = {
                title: document.getElementById('edit-title').value,
                desc: document.getElementById('edit-desc').value,
                icon: selectedIcon,
                color: document.getElementById('edit-color').value
            };

            if(idx === -1) apps.push(newData);
            else apps[idx] = newData;

            navigator.clipboard.writeText(JSON.stringify(apps, null, 2)).then(() => {
                alert("Archive Copied! Update your jobsdata.json on GitHub.");
            });
            renderApps(currentAdmin);
            closeEditor();
        }

        function deleteApp(i) {
            if(confirm("Redact?")) {
                apps.splice(i, 1);
                navigator.clipboard.writeText(JSON.stringify(apps, null, 2));
                renderApps(currentAdmin);
            }
        }

        window.addEventListener('load', loadArchive);
    </script>
    <script src="/dprt/styling/auth.js"></script>
</body>
</html>
