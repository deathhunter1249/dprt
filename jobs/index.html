<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Imperial Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { 
            --imp-yellow: #ffcc00; 
            --ink-black: #0f0f0f; 
            --paper-white: #f4f1ea;
            --charcoal: #2b2b2b;
        }

        body { 
            background-color: var(--ink-black); 
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); 
            color: var(--paper-white); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden; 
        }

        /* Loading Screen: Flying Dragon */
        #loader { 
            position: fixed; inset: 0; background: var(--ink-black); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 1s ease; 
        }

        .dragon-path {
            width: 100%; max-width: 600px; height: 2px;
            background: rgba(255, 204, 0, 0.1); position: relative; overflow: hidden;
        }

        .flying-dragon {
            position: absolute; left: -100px; top: -20px;
            font-family: 'Ma Shan Zheng'; font-size: 3rem; color: var(--imp-yellow);
            text-shadow: 0 0 15px var(--imp-yellow);
            animation: dragon-fly 3s infinite linear;
            white-space: nowrap;
        }

        @keyframes dragon-fly {
            0% { left: -10%; transform: skewX(-20deg); }
            100% { left: 110%; transform: skewX(20deg); }
        }

        /* Ink Wash Card Style */
        .job-card { 
            background: linear-gradient(to bottom right, #1a1a1a, #0a0a0a); 
            border: 1px solid rgba(255, 204, 0, 0.1);
            padding: 4rem 2.5rem; position: relative; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .job-card:hover { 
            border-color: var(--imp-yellow);
            background: #1f1f1f;
            box-shadow: inset 0 0 50px rgba(255, 204, 0, 0.05);
        }

        .job-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--imp-yellow); transform: scaleX(0); transition: transform 0.4s;
        }
        .job-card:hover::before { transform: scaleX(1); }

        .calligraphy { font-family: 'Zhi Mang Xing', cursive; }
        .imperial-title { font-family: 'Ma Shan Zheng', cursive; letter-spacing: -2px; }
        
        /* Buttons */
        .btn-ink {
            border: 1px solid var(--imp-yellow); color: var(--imp-yellow);
            padding: 10px 25px; transition: all 0.3s; font-family: 'Zhi Mang Xing';
            background: transparent; font-size: 1.25rem;
        }
        .btn-ink:hover { background: var(--imp-yellow); color: black; }

        #main-content { opacity: 0; transform: translateY(30px); transition: all 1.5s ease; }
        #main-content.visible { opacity: 1; transform: translateY(0); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--imp-yellow); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="dragon-path">
            <div class="flying-dragon">🐉 ──── 龍 ────</div>
        </div>
        <div class="mt-12 font-mono text-[10px] text-[#ffcc00] tracking-[0.8em] uppercase opacity-50">Communing with the Great Dragon</div>
    </div>

    <div id="header-placeholder" class="relative z-[1001]"></div>

    <div id="main-content">
        <main class="max-w-6xl mx-auto px-8 py-32">
            <div class="mb-32 flex flex-col items-center text-center">
                <span class="text-white text-5xl calligraphy mb-6">大同茶國</span>
                <div class="w-1 h-20 bg-gradient-to-b from-yellow-500 to-transparent mb-8"></div>
                <h1 class="text-8xl md:text-9xl font-black text-white imperial-title">THE ARCHIVE</h1>
                <p class="mt-8 text-zinc-500 max-w-xl italic font-light tracking-wide">
                    "Ink flows like the yellow river; only the worthy leave a mark upon the scroll."
                </p>
            </div>

            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 gap-16"></div>

            <button id="admin-add-trigger" onclick="openEditor()" class="hidden w-full mt-24 border border-zinc-800 py-20 text-zinc-600 hover:text-[#ffcc00] hover:border-[#ffcc00] transition-all uppercase text-xs tracking-[1em] calligraphy">
                + Unroll New Decree
            </button>
        </main>
    </div>

    <div id="admin-editor" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center backdrop-blur-md">
        <div class="bg-[#111] border-l-4 border-[#ffcc00] p-12 w-full max-w-xl">
            <h2 class="text-white text-4xl mb-10 imperial-title">Archive New Entry</h2>
            <div class="space-y-8">
                <input type="text" id="edit-title" placeholder="Designation" class="w-full bg-transparent border-b border-zinc-800 p-4 text-white outline-none focus:border-[#ffcc00] font-serif text-xl">
                <textarea id="edit-desc" placeholder="Directives" class="w-full bg-transparent border border-zinc-800 p-4 text-white h-40 outline-none focus:border-[#ffcc00]"></textarea>
                <div class="flex gap-4">
                    <button onclick="saveApp()" class="flex-1 btn-ink">Seal Record</button>
                    <button onclick="closeEditor()" class="flex-1 text-zinc-500 uppercase text-[10px] tracking-widest">Discard</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let apps = [];
        async function loadArchive() {
            try {
                const response = await fetch('./jobsdata.json'); 
                apps = await response.json();
            } catch (e) {
                apps = [{ title: "Imperial Guard", desc: "Shield of the Cinnabar Gate.", locked: false }];
            }
            renderApps();
        }

        function renderApps() {
            const grid = document.getElementById('job-grid');
            grid.innerHTML = '';
            const isAdmin = window.location.search.includes('admin=true');
            if(isAdmin) document.getElementById('admin-add-trigger').classList.remove('hidden');

            apps.forEach((app, index) => {
                const card = document.createElement('div');
                card.className = `job-card ${app.locked ? 'opacity-30 grayscale' : ''}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-10">
                        <span class="text-[#ffcc00] text-3xl calligraphy">命</span>
                        <div class="text-right">
                            <div class="text-[9px] tracking-[0.4em] text-zinc-600 uppercase mb-1">Status</div>
                            <div class="text-[10px] text-white font-bold uppercase tracking-widest">${app.locked ? 'Classified' : 'Available'}</div>
                        </div>
                    </div>
                    <h3 class="text-5xl text-white mb-6 imperial-title">${app.title}</h3>
                    <p class="text-zinc-400 font-light leading-relaxed mb-12 text-lg italic">${app.desc}</p>
                    <div class="flex justify-between items-center">
                        <button class="btn-ink">${app.locked ? 'Access Denied' : 'Initiate'}</button>
                        ${isAdmin ? `<button onclick="deleteApp(${index})" class="text-red-900 text-[10px] hover:text-white">Dismiss</button>` : ''}
                    </div>`;
                grid.appendChild(card);
            });
        }

        function saveApp() {
            const title = document.getElementById('edit-title').value;
            const desc = document.getElementById('edit-desc').value;
            if(!title) return;
            apps.push({ title, desc, locked: false });
            navigator.clipboard.writeText(JSON.stringify(apps, null, 2)).then(() => {
                alert("Decree Sealed! JSON copied for GitHub.");
            });
            renderApps(); closeEditor();
        }

        function deleteApp(i) {
            if(confirm("Destroy record?")) {
                apps.splice(i, 1);
                navigator.clipboard.writeText(JSON.stringify(apps, null, 2));
                renderApps();
            }
        }

        window.addEventListener('load', () => {
            loadArchive();
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-content').classList.add('visible');
                }, 1000);
            }, 3000);
        });

        function openEditor() { document.getElementById('admin-editor').style.display = 'flex'; }
        function closeEditor() { document.getElementById('admin-editor').style.display = 'none'; }
    </script>
    <script src="/dprt/styling/auth.js"></script>
</body>
</html>
