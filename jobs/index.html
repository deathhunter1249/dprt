<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Imperial Directives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #0a0a0a; --cinnabar: #9d2218; --paper: #dcd7c9; }

        body { 
            background-color: #1a1a1a; /* Darker void to make paper pop */
            background-image: url('https://www.transparenttextures.com/patterns/black-paper.png');
            font-family: 'Noto Serif SC', serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        /* THE DRAGON - Fixed path & ethereal animation */
        .bg-artwork {
            position: fixed; top: 50%; right: 0; transform: translateY(-50%);
            width: 60vw; height: 90vh;
            background-image: url('../decals/dragon-background.png'); 
            background-size: contain; background-repeat: no-repeat;
            background-position: center right;
            opacity: 0.1; pointer-events: none; z-index: 0;
            filter: grayscale(1) invert(0.2);
            animation: inkDrift 25s ease-in-out infinite;
        }

        @keyframes inkDrift {
            0%, 100% { transform: translateY(-50%) scale(1); opacity: 0.08; }
            50% { transform: translateY(-53%) scale(1.05) rotate(-1deg); opacity: 0.12; }
        }

        /* HEADER - Deep Ink Style */
        .sumi-header {
            position: relative; text-align: center; padding: 60px 0; z-index: 20;
        }
        .sumi-title {
            font-family: 'Ma Shan Zheng', cursive; font-size: 5rem;
            color: var(--ink); position: relative; display: inline-block;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }
        /* The Red Seal Stamp */
        .sumi-title::after {
            content: "局"; position: absolute; right: -60px; top: 10px;
            width: 50px; height: 50px; border: 3px solid var(--cinnabar);
            color: var(--cinnabar); font-size: 1.5rem; line-height: 45px;
            font-family: 'Zhi Mang Xing', cursive; transform: rotate(5deg);
        }

        /* THE TRUE WALL SCROLL (Kakemono) */
        .scroll-wrapper {
            perspective: 1000px; margin-bottom: 40px;
        }

        .job-scroll { 
            background: #f4f1ea;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            width: 280px; min-height: 400px;
            position: relative; margin: 0 auto;
            border-left: 2px solid rgba(0,0,0,0.05);
            border-right: 2px solid rgba(0,0,0,0.05);
            box-shadow: 15px 25px 50px -10px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; padding: 40px 25px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Top Hanging Bar & Cord */
        .scroll-top-bar {
            position: absolute; top: -10px; left: -5%; width: 110%; height: 12px;
            background: #222; border-radius: 2px;
        }
        .hanging-cord {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 50px; border-top: 2px solid #444;
            border-left: 2px solid #444; border-right: 2px solid #444;
            border-radius: 60px 60px 0 0; opacity: 0.6;
        }

        /* Bottom Heavy Roller */
        .scroll-bottom-roller {
            position: absolute; bottom: -15px; left: -8%; width: 116%; height: 24px;
            background: linear-gradient(to bottom, #1a1a1a, #000, #222);
            border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* Ink Texture Overlay */
        .ink-bleed {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 20%, rgba(0,0,0,0.03) 0%, transparent 80%);
            pointer-events: none;
        }

        .job-scroll:hover {
            transform: rotateX(5deg) translateY(-10px);
            box-shadow: 20px 40px 60px -10px rgba(0,0,0,0.7);
        }

        /* Typography & Details */
        .scroll-id { font-family: 'Noto Serif SC'; font-weight: 900; color: var(--cinnabar); font-size: 0.7rem; letter-spacing: 0.2em; border-bottom: 1px solid #d1ccc0; margin-bottom: 15px; padding-bottom: 5px; }
        .scroll-title { font-family: 'Ma Shan Zheng', cursive; font-size: 2.2rem; color: #111; line-height: 1; margin-bottom: 20px; }
        .scroll-body { font-size: 0.9rem; color: #444; line-height: 1.8; text-align: justify; flex-grow: 1; }
        
        /* Cinnabar Button (The Signature) */
        .btn-apply {
            margin-top: 25px; border: 1.5px solid var(--ink); padding: 10px;
            font-family: 'Zhi Mang Xing', cursive; font-size: 1.4rem; color: var(--ink);
            transition: all 0.3s; cursor: pointer; background: transparent;
        }
        .btn-apply:hover { background: var(--ink); color: #fff; }

        .ma-shan { font-family: 'Ma_Shan_Zheng', cursive; }
    </style>
</head>
<body>
    <div class="bg-artwork"></div>

    <header class="sumi-header">
        <h1 class="sumi-title">State Directives</h1>
        <p class="text-zinc-500 font-serif tracking-[0.5em] mt-4 uppercase text-[10px]">Imperial Department of Public Relations & Trust</p>
    </header>

    <main id="job-grid" class="flex flex-wrap justify-center gap-24 p-20 relative z-20"></main>

    <script>
        let apps = [];
        async function loadArchive() {
            const stored = localStorage.getItem("dprt_jobs");
            apps = stored ? JSON.parse(stored) : [
                {title: "Senior Scribe", desc: "You are tasked with the transcription of vital edicts. Each brush stroke must be precise, for the ink of the state never fades. Accuracy is your primary virtue in the archives of the eternal city.", color: "#000"},
                {title: "Gate Watch", desc: "The digital borders are vast and silent. Your duty is to remain vigilant against the whispers of dissent. Report all anomalies to the Ministry of Truth immediately.", color: "#9d2218"}
            ];
            renderApps();
        }

        function renderApps() {
            const grid = document.getElementById('job-grid');
            grid.innerHTML = '';
            apps.forEach((app, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'scroll-wrapper';
                wrapper.innerHTML = `
                    <div class="hanging-cord"></div>
                    <div class="job-scroll">
                        <div class="scroll-top-bar"></div>
                        <div class="ink-bleed"></div>
                        <div class="scroll-id">CLASSIFIED // NO. 0${i+1}</div>
                        <h2 class="scroll-title">${app.title}</h2>
                        <div class="scroll-body">${app.desc}</div>
                        <button class="btn-apply">INITIATE BRUSH</button>
                        <div class="scroll-bottom-roller"></div>
                    </div>
                `;
                grid.appendChild(wrapper);
            });
        }
        window.addEventListener('DOMContentLoaded', loadArchive);
    </script>
</body>
</html>
