<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | State Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
            --silk-dark: #b0aaa0;
            --silk-light: #d4cfc5;
            --inner-paper: #f4f1e8;
            --wood: #2c1e14;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--paper); border-left: 1px solid rgba(0, 0, 0, 0.05); }
        ::-webkit-scrollbar-thumb { background: var(--ink); border: 2px solid var(--paper); }
        ::-webkit-scrollbar-thumb:hover { background: var(--cinnabar); }
        * { scrollbar-width: thin; scrollbar-color: var(--ink) var(--paper); }

        html { overflow: hidden; height: 100%; }
        body {
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            background-color: var(--paper);
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; height: 100%;
            overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        .bg-watermark {
            position: fixed; top: 50%; right: -5%; transform: translateY(-50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 40rem; color: rgba(0, 0, 0, 0.03);
            pointer-events: none; z-index: 0; user-select: none;
        }

        #ink-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; overflow: hidden; }
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            filter: blur(1px); animation: fall 12s infinite linear;
        }
        @keyframes fall {
            0% { transform: translateY(-10px); opacity: 0; }
            20% { opacity: 0.1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .scroll-container {
            opacity: 0; transform: translateY(40px);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
            perspective: 1200px;
        }
        .scroll-container.visible { opacity: 1; transform: translateY(0); }

        .kakemono {
            position: relative;
            width: 310px;
            margin: 0 auto;
            background: linear-gradient(to right, var(--silk-dark), var(--silk-light) 12%, var(--silk-light) 88%, var(--silk-dark));
            padding: 25px 14px 35px 14px;
            box-shadow: 0 35px 70px -15px rgba(0,0,0,0.3);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: top center;
        }

        .scroll-container:hover .kakemono {
            transform: rotateX(5deg) rotateY(-3deg) translateY(-5px);
        }

        .scroll-inner {
            background-color: var(--inner-paper);
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            min-height: 420px;
            padding: 30px 22px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.08); 
        }

        .kakemono::before {
            content: ""; position: absolute; 
            top: -12px; left: -8%; 
            width: 116%; height: 24px;
            background: linear-gradient(to bottom, #3d2b1d, var(--wood), #1a110a);
            border-radius: 4px; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .roller {
            position: absolute; 
            bottom: -8px; left: -2%; 
            width: 104%; height: 16px;
            background: var(--wood);
            border-radius: 8px;
            z-index: 10;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px;
        }

        .roller::before, .roller::after {
            content: ""; width: 8px; height: 8px; background: #1e3a8a; 
            border-radius: 50%; box-shadow: inset 0 0 3px black;
        }

        .job-icon {
            width: 50px; height: 50px; margin: 0 auto 18px;
            opacity: 0.7; filter: sepia(0.5);
            transition: all 0.4s ease;
        }
        .scroll-container:hover .job-icon { opacity: 1; filter: sepia(0); transform: scale(1.1); }

        .scroll-title {
            font-family: 'Noto Serif SC', serif; font-weight: 900;
            font-size: 1.5rem; text-align: center; color: var(--ink);
            line-height: 1.2; margin-bottom: 6px;
        }

        .scroll-meta {
            color: var(--cinnabar); font-size: 0.65rem; font-weight: 900;
            text-align: center; letter-spacing: 0.4em;
            margin-bottom: 20px; border-bottom: 1px solid rgba(188, 47, 50, 0.2);
            padding-bottom: 10px;
        }

        .btn-apply {
            margin-top: auto;
            border: 1px solid var(--ink);
            padding: 10px; font-weight: 900; font-size: 0.7rem;
            letter-spacing: 0.2em; text-transform: uppercase;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.02);
        }
        .btn-apply:hover { background: var(--ink); color: white; letter-spacing: 0.3em; }

        .reveal-node { opacity: 0; transform: translateX(-20px); transition: all 1s ease; }
        .reveal-active { opacity: 1; transform: translateX(0); }

        .admin-toggle {
            position: absolute; top: 10px; right: 10px;
            width: 32px; height: 32px;
            background: var(--cinnabar); border: 2px solid var(--ink);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer;
            transition: all 0.3s ease; z-index: 20;
        }

        .admin-toggle:hover { transform: scale(1.1); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .admin-toggle::before { content: "●"; font-size: 16px; color: white; }
        .admin-toggle.disabled::before { content: "○"; }

        .scroll-container.disabled .scroll-inner { opacity: 0.4; filter: grayscale(1); }
        .scroll-container.disabled .btn-apply { background: #ccc; color: #666; cursor: not-allowed; border-color: #999; }

        .drag-handle {
            position: absolute; top: 50%; left: -45px;
            transform: translateY(-50%); width: 35px; height: 60px;
            background: var(--ink); border-radius: 8px 0 0 8px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 4px; cursor: grab;
            opacity: 0; transition: all 0.3s ease; z-index: 15;
        }

        .scroll-container:hover .drag-handle { opacity: 0.7; }
        .drag-handle span { width: 20px; height: 3px; background: white; border-radius: 2px; }
        .scroll-container.dragging { opacity: 0.5; transform: scale(0.95); z-index: 1000; }
        .scroll-container.drag-over { transform: translateX(20px); }

        .disabled-overlay {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; justify-content: center;
            z-index: 15; pointer-events: none;
        }

        .disabled-badge {
            background: var(--cinnabar); color: white; padding: 8px 16px;
            border-radius: 4px; font-size: 0.7rem; font-weight: 900;
            letter-spacing: 0.2em; text-transform: uppercase;
            border: 2px solid var(--ink); box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="header-placeholder" class="relative z-[100]"></div>
    <div class="bg-watermark">令</div>
    <div id="ink-container"></div>

    <main class="relative z-10 pt-16 pb-24">
        <header class="max-w-6xl mx-auto px-12 mb-24">
            <div class="flex items-center gap-10">
                <div class="reveal-node h-28 border-r-4 border-[#bc2f32] pr-10 flex items-center">
                    <span class="writing-vertical font-['Zhi_Mang_Xing'] text-4xl text-[#bc2f32]">職務指令</span>
                </div>
                <div>
                    <h1 class="font-['ZCOOL_XiaoWei'] text-7xl uppercase tracking-tighter">Republic Jobs</h1>
                    <p class="font-serif italic text-zinc-500 text-xs tracking-[0.6em] mt-3">PROCLAIMED MANDATES OF THE STATE (Get a job sucker)</p>
                </div>
            </div>
        </header>
        <div id="job-grid" class="flex flex-wrap justify-center gap-x-20 gap-y-28 px-8"></div>
    </main>

    <script src="/dprt/styling/auth.js"></script>
    <script>
const API_URL = "https://dprt.dprt.workers.dev";
const OWNER_ID = "735531512124145674";
let jobData = [];

// Real owner check
function isOwner() {
    const token = localStorage.getItem('discord_access_token');
    if (!token) return false;
    // This is a simplified check. In initAuth (auth.js), 
    // it usually sets a global or you can check against user object if stored.
    // For now, we rely on the state set during load.
    return window.isSiteOwner === true; 
}

async function loadJobData() {
    try {
        const resp = await fetch(`${API_URL}/get-jobs`);
        const data = await resp.json();
        jobData = data.map(j => ({
            id: j.id,
            title: j.title,
            icon: j.icon,
            desc: j.description,
            disabled: j.is_disabled === 1,
            order: j.display_order
        }));
        renderApps();
    } catch (e) {
        console.error("Server Error:", e);
    }
}

async function toggleJobStatus(jobId) {
    const job = jobData.find(j => j.id === jobId);
    try {
        await fetch(`${API_URL}/toggle-job`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': OWNER_ID },
            body: JSON.stringify({ id: jobId, currentStatus: job.disabled })
        });
        loadJobData(); // Sync with server
    } catch (e) { console.error("Update failed", e); }
}

async function saveJobOrder() {
    const orders = jobData.map((j, i) => ({ id: j.id, order: i }));
    try {
        await fetch(`${API_URL}/reorder-jobs`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': OWNER_ID },
            body: JSON.stringify({ orders })
        });
    } catch (e) { console.error("Order update failed", e); }
}

// Drag & Drop Logic
let draggedElement = null;
let draggedJobId = null;

function handleDragStart(e, jobId) {
    draggedElement = e.currentTarget.parentElement;
    draggedJobId = jobId;
    draggedElement.classList.add('dragging');
}

function handleDragOver(e) { e.preventDefault(); return false; }

function handleDrop(e) {
    const dropTarget = e.currentTarget;
    if (draggedElement !== dropTarget) {
        const targetJobId = dropTarget.dataset.jobId;
        const draggedIndex = jobData.findIndex(j => j.id === draggedJobId);
        const targetIndex = jobData.findIndex(j => j.id === targetJobId);
        
        const draggedJob = jobData[draggedIndex];
        jobData.splice(draggedIndex, 1);
        jobData.splice(targetIndex, 0, draggedJob);
        
        saveJobOrder(); // Update server
        renderApps();
    }
    return false;
}

function renderApps() {
    const grid = document.getElementById('job-grid');
    const adminMode = isOwner();
    
    grid.innerHTML = jobData.map(job => `
        <div class="scroll-container ${job.disabled ? 'disabled' : ''}" data-job-id="${job.id}">
            ${adminMode ? `
                <div class="drag-handle" draggable="true" ondragstart="handleDragStart(event, '${job.id}')">
                    <span></span><span></span><span></span>
                </div>
                <div class="admin-toggle ${job.disabled ? 'disabled' : ''}" onclick="toggleJobStatus('${job.id}')"></div>
            ` : ''}
            <div class="kakemono">
                <div class="scroll-inner">
                    <img src="../decals/${job.icon}" class="job-icon" alt="${job.title}">
                    <div class="scroll-meta">DIRECTIVE #${job.id}</div>
                    <h2 class="scroll-title">${job.title}</h2>
                    <p class="text-zinc-600 text-[11px] leading-relaxed font-serif italic mb-8 text-center px-2">"${job.desc}"</p>
                    <button ${job.disabled ? 'disabled' : ''} onclick="window.location.href='/dprt/jobs/apply/${job.title.toLowerCase().replace(/\s+/g, '_')}/';" class="btn-apply">
                        ${job.disabled ? 'Closed' : 'Apply'}
                    </button>
                </div>
                ${job.disabled ? '<div class="disabled-overlay"><div class="disabled-badge">Applications Closed</div></div>' : ''}
                <div class="roller"></div>
            </div>
        </div>
    `).join('');

    if (adminMode) {
        document.querySelectorAll('.scroll-container').forEach(el => {
            el.addEventListener('dragover', handleDragOver);
            el.addEventListener('drop', handleDrop);
        });
    }

    setTimeout(() => {
        document.querySelectorAll('.scroll-container').forEach((el, i) => setTimeout(() => el.classList.add('visible'), i * 150));
        document.querySelectorAll('.reveal-node').forEach(n => n.classList.add('reveal-active'));
    }, 100);
}

// Ink Animation
const inkContainer = document.getElementById('ink-container');
for (let i = 0; i < 15; i++) {
    const drop = document.createElement('div');
    drop.className = 'ink-drop';
    drop.style.left = Math.random() * 98 + 'vw';
    const size = (Math.random() * 3 + 2) + 'px';
    drop.style.width = size; drop.style.height = size;
    drop.style.animationDelay = Math.random() * 10 + 's';
    inkContainer.appendChild(drop);
}

window.onload = loadJobData;
    </script>
</body>
</html>
