<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | State Personnel Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --dprt-bronze: #b8860b; 
            --dprt-ink: #08080a; 
            --dprt-card: rgba(255, 255, 255, 0.04);
        }
        
        body {
            background: radial-gradient(circle at 50% 50%, #151518 0%, var(--dprt-ink) 100%);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline Overlay Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* Startup Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out;
        }

        .loader-bar {
            width: 240px;
            height: 2px;
            background: rgba(184, 134, 11, 0.1);
            position: relative;
            overflow: hidden;
            margin-top: 24px;
        }

        .loader-progress {
            position: absolute;
            height: 100%;
            width: 0%;
            background: var(--dprt-bronze);
            box-shadow: 0 0 15px var(--dprt-bronze);
            animation: load 2.2s forwards cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes load {
            0% { width: 0%; }
            40% { width: 30%; }
            70% { width: 85%; }
            100% { width: 100%; }
        }

        /* Glass Cards */
        .job-card {
            background: var(--dprt-card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            position: relative;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .job-card:hover {
            background: rgba(184, 134, 11, 0.07);
            border-color: var(--dprt-bronze);
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* Content Fade-in after loader */
        #main-content {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1s ease, transform 1s ease;
        }

        #main-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
            background: var(--dprt-bronze);
            box-shadow: 0 0 10px var(--dprt-bronze);
        }

        .admin-controls {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 10px 15px;
            background: rgba(184, 134, 11, 0.15);
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            opacity: 0;
            transition: 0.3s;
            z-index: 10;
        }
        .job-card:hover .admin-controls { opacity: 1; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--dprt-bronze); }
    </style>
</head>
<body class="custom-scroll">

    <div id="loader">
        <div class="font-mono text-[10px] text-[#b8860b] tracking-[0.5em] uppercase">Initialising Database Sequence</div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <div id="main-content">
        <div id="global-overlay" class="fixed inset-0 bg-black/60 z-[80] opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-[2px]" onclick="toggleMenu(false)"></div>
        
        <div id="header-placeholder"></div>

        <main class="max-w-7xl mx-auto px-10 py-24">
            <div class="mb-20">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="h-[1px] w-12 bg-[#b8860b]"></div>
                    <span class="text-[#b8860b] font-mono text-[10px] tracking-[0.6em] uppercase">Directorate of Personnel</span>
                </div>
                <h1 class="text-7xl font-black uppercase italic tracking-tighter text-white">Entry Portal<span class="text-[#b8860b]">.</span></h1>
                <p class="text-zinc-500 mt-6 max-w-xl text-sm leading-relaxed font-medium border-l-2 border-zinc-900 pl-8">
                    Access restricted to authorized personnel. Select a division to initiate your enlistment protocol. Restricted roles require direct Overseer appointment.
                </p>
            </div>

            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

            <button id="admin-add-trigger" onclick="openEditor()" class="hidden w-full mt-16 border border-dashed border-zinc-800 py-12 text-zinc-600 hover:border-[#b8860b] hover:text-[#b8860b] hover:bg-[#b8860b]/5 transition-all font-black uppercase text-[10px] tracking-[0.5em]">
                + Initialize New Personnel Directive
            </button>
        </main>
    </div>

    <div id="admin-editor" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center backdrop-blur-md">
        <div class="bg-[#0e0e10] border border-[#b8860b]/30 p-10 w-full max-w-lg shadow-[0_0_80px_rgba(0,0,0,1)]">
            <h2 class="text-white font-black uppercase mb-8 italic text-xl border-b border-zinc-800 pb-4">Modify Entry</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[9px] uppercase font-bold text-zinc-500 block mb-2">Role Title</label>
                    <input type="text" id="edit-title" class="w-full bg-black border border-zinc-800 p-4 text-white focus:border-[#b8860b] outline-none transition-all font-bold">
                </div>
                <div>
                    <label class="text-[9px] uppercase font-bold text-zinc-500 block mb-2">Directives</label>
                    <textarea id="edit-desc" class="w-full bg-black border border-zinc-800 p-4 text-white h-32 focus:border-[#b8860b] outline-none transition-all text-sm"></textarea>
                </div>
                <div class="flex items-center space-x-3 bg-black/50 p-4 border border-zinc-800">
                    <input type="checkbox" id="edit-locked" class="w-4 h-4 accent-[#b8860b]">
                    <label class="text-[10px] uppercase font-black text-zinc-400">Classify as Restricted / Locked</label>
                </div>
                <div class="flex space-x-4 pt-4">
                    <button onclick="saveApp()" class="flex-1 bg-[#b8860b] text-black font-black py-4 uppercase text-[10px] tracking-widest hover:bg-white transition-all">Update Database</button>
                    <button onclick="closeEditor()" class="flex-1 bg-zinc-900 text-white font-black py-4 uppercase text-[10px] tracking-widest">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Page Loader Logic ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                const mainContent = document.getElementById('main-content');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    mainContent.classList.add('visible');
                    // Check if auth.js has run, otherwise render default
                    if (typeof initAuth !== "function") renderApps(true); 
                }, 800);
            }, 2300); // Duration matches animation
        });

        // --- Data Logic ---
        let currentEditingIndex = null;
        let apps = JSON.parse(localStorage.getItem('dprt_apps')) || [
            { title: "Moderator", desc: "Help moderate the discord server with a great team!", locked: false },
            { title: "Application", desc: "Read inbound applications from developers!", locked: false },
            { title: "Marketplace", desc: "Keep the marketplace flowing with new posts!", locked: false },
            { title: "Representative", desc: "Keep the community active with events, giveaways and more!", locked: false },
            { title: "Scam Investigator", desc: "With an active marketplace it's our job to make sure everyone is safe.", locked: true },
            { title: "Social Media", desc: "Grow our community by outreaching to other platforms!", locked: false }
        ];

        function renderApps(isAdmin) {
            const grid = document.getElementById('job-grid');
            if(!grid) return;
            grid.innerHTML = '';

            apps.forEach((app, index) => {
                const card = document.createElement('div');
                card.className = `job-card ${app.locked ? 'status-locked opacity-70' : ''}`;

                card.innerHTML = `
                    ${isAdmin ? `
                    <div class="admin-controls">
                        <span onclick="event.stopPropagation(); openEditor(${index})" class="text-[9px] font-mono font-bold cursor-pointer text-white hover:text-[#b8860b]">EDIT</span>
                        <span onclick="event.stopPropagation(); deleteApp(${index})" class="text-[9px] font-mono font-bold cursor-pointer text-red-500 hover:text-white">ARCHIVE</span>
                    </div>
                    ` : ''}
                    <div>
                        <div class="mb-4 flex items-center">
                            <span class="status-dot ${app.locked ? 'bg-zinc-700 shadow-none' : ''}"></span>
                            <span class="font-mono text-[9px] uppercase tracking-widest text-zinc-500">
                                ${app.locked ? 'Classified' : 'Active Channel'}
                            </span>
                        </div>
                        <h3 class="text-2xl font-black uppercase text-white mb-3 italic tracking-tight">${app.title}</h3>
                        <p class="text-zinc-500 text-xs leading-relaxed font-medium mb-10">${app.desc}</p>
                    </div>
                    <button class="w-full py-4 border ${app.locked ? 'border-zinc-800 text-zinc-600' : 'border-[#b8860b]/30 text-[#b8860b]'} text-[10px] font-black uppercase tracking-[0.2em] hover:bg-[#b8860b] hover:text-black transition-all">
                        ${app.locked ? 'Access Denied' : 'Initiate Application'}
                    </button>
                `;
                grid.appendChild(card);
            });

            if(isAdmin) document.getElementById('admin-add-trigger')?.classList.remove('hidden');
        }

        // --- Admin Interaction Logic ---
        function openEditor(index = null) {
            currentEditingIndex = index;
            const editor = document.getElementById('admin-editor');
            editor.classList.remove('hidden');
            editor.style.display = 'flex';

            if (index !== null) {
                document.getElementById('edit-title').value = apps[index].title;
                document.getElementById('edit-desc').value = apps[index].desc;
                document.getElementById('edit-locked').checked = apps[index].locked;
            } else {
                document.getElementById('edit-title').value = '';
                document.getElementById('edit-desc').value = '';
                document.getElementById('edit-locked').checked = false;
            }
        }

        function closeEditor() {
            document.getElementById('admin-editor').style.display = 'none';
        }

        function saveApp() {
            const title = document.getElementById('edit-title').value;
            const desc = document.getElementById('edit-desc').value;
            const locked = document.getElementById('edit-locked').checked;
            if(!title) return;

            if (currentEditingIndex !== null) apps[currentEditingIndex] = { title, desc, locked };
            else apps.push({ title, desc, locked });

            localStorage.setItem('dprt_apps', JSON.stringify(apps));
            closeEditor();
            renderApps(true); 
        }

        function deleteApp(index) {
            if(confirm("Permanently archive this role?")) {
                apps.splice(index, 1);
                localStorage.setItem('dprt_apps', JSON.stringify(apps));
                renderApps(true);
            }
        }
    </script>
    
    <script src="/dprt/styling/auth.js"></script>
</body>
</html>
