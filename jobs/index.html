<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | State Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
            --scroll-silk: #d4cfc5;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden; 
            background-color: var(--paper);
            perspective: 1000px; /* Required for the 3D effect */
        }

        body {
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; min-height: 100vh;
        }

        /* 1. BACKGROUND ELEMENTS */
        .bg-watermark {
            position: fixed; top: 50%; right: -5%; transform: translateY(-50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 40rem; color: rgba(0, 0, 0, 0.03);
            pointer-events: none; z-index: 0; user-select: none;
        }

        /* 2. INK DROPS */
        #ink-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            filter: blur(1px); animation: fall 12s infinite linear;
        }
        @keyframes fall {
            0% { transform: translateY(-5vh); opacity: 0; }
            20% { opacity: 0.1; }
            100% { transform: translateY(105vh); opacity: 0; }
        }

        /* 3. 3D KAKEMONO SCROLL (Matches Image) */
        .scroll-container {
            opacity: 0; transform: translateY(30px) rotateX(10deg);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }
        .scroll-container.visible { opacity: 1; transform: translateY(0) rotateX(0deg); }

        .kakemono {
            background: var(--scroll-silk);
            width: 280px; min-height: 420px;
            margin: 0 auto; position: relative;
            padding: 15px; /* The "Silk" border around the paper */
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: rotateY(0deg);
        }

        /* The Cool 3D Hover Animation */
        .scroll-container:hover .kakemono {
            transform: rotateY(-10deg) rotateX(5deg) translateY(-10px);
            box-shadow: 20px 30px 50px rgba(0,0,0,0.2);
        }

        /* Inner Paper (Where text lives) */
        .scroll-inner {
            background: #fdfcf8;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            height: 100%; width: 100%;
            padding: 25px 20px;
            display: flex; flex-direction: column;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Scroll Hardware (The wood/bars) */
        .kakemono::before { 
            content: ""; position: absolute; top: -8px; left: 0; width: 100%; height: 12px;
            background: #2c1e14; border-radius: 2px; z-index: 2;
        }
        
        .roller {
            position: absolute; bottom: -12px; left: -5%; width: 110%; height: 24px;
            background: #2c1e14; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5px;
        }
        /* Roller Caps (Blue tip in your image) */
        .roller::before, .roller::after {
            content: ""; width: 8px; height: 8px; background: #2f5bb7; border-radius: 50%;
        }

        /* 4. CONTENT STYLING */
        .job-icon {
            width: 60px; height: 60px; margin: 0 auto 15px;
            border: 1px solid var(--cinnabar);
            padding: 5px; background: white;
            object-fit: contain;
        }

        .scroll-title { 
            font-family: 'Noto Serif SC', serif; font-weight: 900; 
            font-size: 1.4rem; color: var(--ink); text-align: center; line-height: 1.2;
        }

        .scroll-meta { 
            font-family: 'Noto Serif SC'; font-weight: 900; color: var(--cinnabar); 
            font-size: 0.6rem; letter-spacing: 0.3em; margin: 10px 0;
            text-align: center; border-bottom: 1px double var(--cinnabar); padding-bottom: 5px;
        }

        .btn-apply {
            margin-top: auto; border: 1px solid var(--ink); padding: 10px;
            font-family: 'Noto Serif SC', serif; font-weight: 900;
            font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--ink); transition: all 0.3s; background: transparent;
        }
        .btn-apply:hover { background: var(--ink); color: #fff; transform: scale(1.05); }

        .reveal-node { opacity: 0; transform: translateX(-20px); transition: all 1s ease; }
        .reveal-active { opacity: 1; transform: translateX(0); }
    </style>
</head>
<body>
    <div id="header-placeholder" class="relative z-[100]"></div>
    <div class="bg-watermark">令</div>
    <div id="ink-container"></div>

    <main class="relative z-10 pt-10 pb-24">
        <div class="max-w-6xl mx-auto px-12 mb-20">
            <div class="flex items-center gap-8">
                <div class="reveal-node h-24 border-r-4 border-[#bc2f32] pr-8 flex items-center">
                    <span class="writing-vertical font-['Zhi_Mang_Xing'] text-3xl text-[#bc2f32]">職務指令</span>
                </div>
                <div>
                    <h1 class="font-['ZCOOL_XiaoWei'] text-6xl uppercase tracking-tighter">Imperial Bureau</h1>
                    <p class="font-serif italic text-zinc-500 text-sm tracking-[0.4em] mt-2">MANDATES OF THE REPUBLIC</p>
                </div>
            </div>
        </div>

        <div id="job-grid" class="flex flex-wrap justify-center gap-16 px-6"></div>
    </main>

    <script src="/dprt/styling/auth.js"></script>
    <script>
        // EASY ICON ADDITION: Add the filename of the image in your ./decals/ folder
        const jobData = [
            { 
                id: "01", 
                title: "Imperial Scribe", 
                icon: "scribe_seal.png", // Looks in ./decals/scribe_seal.png
                desc: "Record the eternal history of the Republic. Your brush is the memory of the state." 
            },
            { 
                id: "02", 
                title: "Teapot Guardian", 
                icon: "shield_icon.png", 
                desc: "Ensure the sanctity of the brew. Peace is maintained through constant vigilance." 
            },
            { 
                id: "03", 
                title: "Silk Merchant", 
                icon: "trade_icon.png", 
                desc: "Facilitate the flow of wealth and fine garments across the Republic's borders." 
            }
        ];

        function renderApps() {
            const grid = document.getElementById('job-grid');
            grid.innerHTML = jobData.map((job) => `
                <div class="scroll-container">
                    <div class="kakemono">
                        <div class="scroll-inner">
                            ${job.icon ? `<img src="./decals/${job.icon}" class="job-icon" alt="seal">` : ''}
                            <div class="scroll-meta">DIRECTIVE #${job.id}</div>
                            <h2 class="scroll-title">${job.title}</h2>
                            <p class="text-zinc-600 text-[11px] leading-relaxed font-serif italic my-6 text-center">
                                "${job.desc}"
                            </p>
                            <button onclick="window.location.href='https://deathhunter1249.github.io/dprt/apply/'" class="btn-apply">
                                Petition Role
                            </button>
                        </div>
                        <div class="roller"></div>
                    </div>
                </div>
            `).join('');
            
            setTimeout(() => {
                document.querySelectorAll('.scroll-container').forEach((el, idx) => {
                    setTimeout(() => el.classList.add('visible'), idx * 200);
                });
                document.querySelectorAll('.reveal-node').forEach(n => n.classList.add('reveal-active'));
            }, 100);
        }

        // Animated Ink
        const inkContainer = document.getElementById('ink-container');
        for (let i = 0; i < 12; i++) {
            const drop = document.createElement('div');
            drop.className = 'ink-drop';
            drop.style.left = Math.random() * 100 + 'vw';
            const size = (Math.random() * 4 + 2) + 'px';
            drop.style.width = size; drop.style.height = size;
            drop.style.animationDelay = Math.random() * 12 + 's';
            inkContainer.appendChild(drop);
        }

        window.onload = renderApps;
    </script>
</body>
</html>
