<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | State Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
            --wood: #2c1e14;
        }

        /* FIX: Double Scrollbar & Shake */
        html {
            overflow: hidden; /* Lock the base layer */
            height: 100%;
        }

        body {
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            background-color: var(--paper);
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0;
            height: 100%;
            overflow-y: auto; /* Only allow scrolling here */
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 1. BACKGROUND & LAYERS */
        .bg-watermark {
            position: fixed; top: 50%; right: -5%; transform: translateY(-50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 40rem; color: rgba(0, 0, 0, 0.03);
            pointer-events: none; z-index: 0; user-select: none;
        }

        #ink-container { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            pointer-events: none; z-index: 1; overflow: hidden; 
        }

        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            filter: blur(1px); animation: fall 12s infinite linear;
        }

        @keyframes fall {
            0% { transform: translateY(-10px); opacity: 0; }
            20% { opacity: 0.1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* 2. THE IMPROVED SCROLL (KAKEMONO) */
        .scroll-container {
            opacity: 0; 
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
            perspective: 1200px;
        }
        .scroll-container.visible { opacity: 1; transform: translateY(0); }

        .kakemono {
            position: relative;
            width: 300px;
            margin: 0 auto;
            /* Silk Border Gradient */
            background: linear-gradient(to right, #b0aaa0, #d4cfc5 15%, #d4cfc5 85%, #b0aaa0);
            padding: 20px 15px 40px 15px;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.25);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: top center;
        }

        /* The 3D Sway Animation */
        .scroll-container:hover .kakemono {
            transform: rotateX(4deg) rotateY(-4deg) scale(1.02);
        }

        /* The Inner Paper with a "Torn" bottom edge effect */
        .scroll-inner {
            background: #fdfcf8;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            min-height: 400px;
            padding: 30px 20px;
            border: 1px solid rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Hanging Bar */
        .kakemono::before {
            content: ""; position: absolute; top: -5px; left: -2%; width: 104%; height: 12px;
            background: var(--wood); border-radius: 3px; z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Bottom Heavy Roller */
        .roller {
            position: absolute; bottom: -15px; left: -8%; width: 116%; height: 28px;
            background: linear-gradient(to bottom, #3d2b1d, var(--wood), #1a110a);
            border-radius: 14px;
            z-index: 10;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px;
        }

        .roller::before, .roller::after {
            content: ""; width: 10px; height: 10px; background: #1e3a8a; 
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
        }

        /* 3. ELEMENTS */
        .job-icon {
            width: 55px; height: 55px; margin: 0 auto 20px;
            filter: grayscale(1) contrast(1.2); opacity: 0.8;
            transition: all 0.4s ease;
        }
        .scroll-container:hover .job-icon {
            filter: grayscale(0) contrast(1); opacity: 1; transform: scale(1.1);
        }

        .scroll-title {
            font-family: 'Noto Serif SC', serif; font-weight: 900;
            font-size: 1.6rem; text-align: center; color: var(--ink);
            letter-spacing: -0.02em; margin-bottom: 8px;
        }

        .scroll-meta {
            color: var(--cinnabar); font-size: 0.7rem; font-weight: 900;
            text-align: center; letter-spacing: 0.4em;
            margin-bottom: 20px; border-bottom: 1px solid rgba(188, 47, 50, 0.2);
            padding-bottom: 8px;
        }

        .btn-apply {
            margin-top: auto;
            border: 1.5px solid var(--ink);
            padding: 10px; font-weight: 900; font-size: 0.75rem;
            letter-spacing: 0.2em; text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn-apply:hover {
            background: var(--cinnabar); color: white; border-color: var(--cinnabar);
        }

        .reveal-node { opacity: 0; transform: translateX(-20px); transition: all 1s ease; }
        .reveal-active { opacity: 1; transform: translateX(0); }
    </style>
</head>
<body>
    <div id="header-placeholder" class="relative z-[100]"></div>
    <div class="bg-watermark">令</div>
    <div id="ink-container"></div>

    <main class="relative z-10 pt-12 pb-24">
        <header class="max-w-6xl mx-auto px-12 mb-20">
            <div class="flex items-center gap-8">
                <div class="reveal-node h-24 border-r-4 border-[#bc2f32] pr-8 flex items-center">
                    <span class="writing-vertical font-['Zhi_Mang_Xing'] text-3xl text-[#bc2f32]">職務指令</span>
                </div>
                <div>
                    <h1 class="font-['ZCOOL_XiaoWei'] text-6xl uppercase tracking-tighter">Imperial Bureau</h1>
                    <p class="font-serif italic text-zinc-500 text-xs tracking-[0.5em] mt-2">ACTIVE MANDATES & ASSIGNMENTS</p>
                </div>
            </div>
        </header>

        <div id="job-grid" class="flex flex-wrap justify-center gap-x-16 gap-y-24 px-6"></div>
    </main>

    <script src="/dprt/styling/auth.js"></script>
    <script>
        const jobData = [
            { id: "01", title: "Palace Scribe", icon: "scribe.png", desc: "Maintain the Bureau's records with unwavering precision and elegant calligraphy." },
            { id: "02", title: "Internal Guard", icon: "shield.png", desc: "Enforce state directives and ensure the tranquility of the Republic's inner sanctum." },
            { id: "03", title: "Tea Governor", icon: "tea.png", desc: "Standardize the production and distribution of high-grade infusions across the states." }
        ];

        function renderApps() {
            const grid = document.getElementById('job-grid');
            grid.innerHTML = jobData.map(job => `
                <div class="scroll-container">
                    <div class="kakemono">
                        <div class="scroll-inner">
                            <img src="./decals/${job.icon}" class="job-icon" onerror="this.style.display='none'">
                            <div class="scroll-meta">DIRECTIVE #${job.id}</div>
                            <h2 class="scroll-title">${job.title}</h2>
                            <p class="text-zinc-600 text-[12px] leading-relaxed font-serif italic mb-8 text-center">
                                "${job.desc}"
                            </p>
                            <button onclick="window.location.href='https://deathhunter1249.github.io/dprt/apply/'" class="btn-apply">
                                Petition Role
                            </button>
                        </div>
                        <div class="roller"></div>
                    </div>
                </div>
            `).join('');
            
            setTimeout(() => {
                document.querySelectorAll('.scroll-container').forEach((el, idx) => {
                    setTimeout(() => el.classList.add('visible'), idx * 200);
                });
                document.querySelectorAll('.reveal-node').forEach(n => n.classList.add('reveal-active'));
            }, 100);
        }

        // Ink Physics (Now strictly vertical to prevent overflow)
        const inkContainer = document.getElementById('ink-container');
        for (let i = 0; i < 15; i++) {
            const drop = document.createElement('div');
            drop.className = 'ink-drop';
            drop.style.left = Math.random() * 98 + 'vw';
            const size = (Math.random() * 3 + 2) + 'px';
            drop.style.width = size; drop.style.height = size;
            drop.style.animationDelay = Math.random() * 10 + 's';
            inkContainer.appendChild(drop);
        }

        window.onload = renderApps;
    </script>
</body>
</html>
