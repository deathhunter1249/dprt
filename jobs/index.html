<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | State Personnel Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --dprt-bronze: #b8860b; --dprt-ink: #050505; }
        
        body {
            background: var(--dprt-ink);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            background-image: linear-gradient(rgba(184, 134, 11, 0.02) 50%, transparent 50%);
            background-size: 100% 4px;
        }

        /* Card Styling */
        .job-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(184, 134, 11, 0.1);
            padding: 2.5rem;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .job-card:hover {
            background: rgba(184, 134, 11, 0.05);
            border-color: var(--dprt-bronze);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .job-card::before {
            content: 'ROLE';
            position: absolute;
            top: 10px;
            right: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            color: rgba(184, 134, 11, 0.3);
            letter-spacing: 2px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            background: var(--dprt-bronze);
            box-shadow: 0 0 10px var(--dprt-bronze);
        }

        .status-locked .status-dot {
            background: #444;
            box-shadow: none;
        }

        /* Admin UI */
        .admin-controls {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 8px 15px;
            background: rgba(184, 134, 11, 0.1);
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            opacity: 0;
            transition: 0.3s;
            z-index: 10;
        }

        .job-card:hover .admin-controls { opacity: 1; }

        .btn-action {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 900;
            color: var(--dprt-bronze);
            cursor: pointer;
        }

        .btn-action:hover { color: white; }

        .chinese-font { font-family: 'Noto Serif SC', serif; }
        
        #blur-container { transition: all 0.5s ease; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div id="blur-container">
        <main class="max-w-7xl mx-auto px-10 py-24">
            <div class="mb-16">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="h-[1px] w-12 bg-[#b8860b]"></div>
                    <span class="text-[#b8860b] font-mono text-[10px] tracking-[0.5em] uppercase">Directorate of Personnel</span>
                </div>
                <h1 class="text-6xl font-black uppercase italic tracking-tighter text-white">Apply Now<span class="text-[#b8860b]">!</span></h1>
                <p class="text-zinc-500 mt-4 max-w-lg text-sm leading-relaxed font-medium">Select a department to begin your enlistment process. Restricted roles require Tier-2 verification or direct Overseer appointment.</p>
            </div>

            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>

            <button id="admin-add-trigger" onclick="openEditor()" class="hidden w-full mt-12 border border-dashed border-zinc-800 py-12 text-zinc-600 hover:border-[#b8860b] hover:text-[#b8860b] transition-all font-black uppercase text-[10px] tracking-[0.4em]">
                + Initialize New Personnel Directive
            </button>
        </main>
    </div>

    <div id="admin-editor" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center backdrop-blur-md">
        <div class="bg-[#0e0e10] border border-[#b8860b]/30 p-10 w-full max-w-lg shadow-[0_0_50px_rgba(0,0,0,0.9)]">
            <h2 class="text-white font-black uppercase mb-8 italic text-xl border-b border-zinc-800 pb-4">Modify Entry</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[9px] uppercase font-bold text-zinc-500 block mb-2">Role Title</label>
                    <input type="text" id="edit-title" class="w-full bg-black border border-zinc-800 p-4 text-white focus:border-[#b8860b] outline-none transition-all font-bold">
                </div>
                <div>
                    <label class="text-[9px] uppercase font-bold text-zinc-500 block mb-2">Directives</label>
                    <textarea id="edit-desc" class="w-full bg-black border border-zinc-800 p-4 text-white h-32 focus:border-[#b8860b] outline-none transition-all text-sm"></textarea>
                </div>
                <div class="flex items-center space-x-3 bg-black/50 p-4 border border-zinc-800">
                    <input type="checkbox" id="edit-locked" class="w-4 h-4 accent-[#b8860b]">
                    <label class="text-[10px] uppercase font-black text-zinc-400">Classify as Restricted / Locked</label>
                </div>
                <div class="flex space-x-4 pt-4">
                    <button onclick="saveApp()" class="flex-1 bg-[#b8860b] text-black font-black py-4 uppercase text-[10px] tracking-widest hover:bg-white transition-all">Update Database</button>
                    <button onclick="closeEditor()" class="flex-1 bg-zinc-900 text-white font-black py-4 uppercase text-[10px] tracking-widest">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEditingIndex = null;
        let apps = JSON.parse(localStorage.getItem('dprt_apps')) || [
            { title: "Moderator", desc: "Help moderate the discord server with a great team!", locked: false },
            { title: "Application", desc: "Read inbound applications from developers!", locked: false },
            { title: "Marketplace", desc: "Keep the marketplace flowing with new posts!", locked: false },
            { title: "Representative", desc: "Keep the community active with events, giveaways and more!", locked: false },
            { title: "Scam Investigator", desc: "With an active marketplace it's our job to make sure everyone is safe.", locked: true },
            { title: "Social Media", desc: "Grow our community by outreaching to other platforms!", locked: false }
        ];

        // 1. Load Header
        async function loadHeader() {
            try {
                const resp = await fetch('/dprt/header.html');
                if (resp.ok) {
                    document.getElementById('header-placeholder').innerHTML = await resp.text();
                    // Small delay to ensure header elements are in DOM
                    setTimeout(initAuth, 100);
                }
            } catch (e) { console.error("Header Error", e); }
        }

        // 2. Authenticate & Check Admin
        async function initAuth() {
            const token = localStorage.getItem('discord_access_token');
            let isAdmin = false;

            if (token) {
                try {
                    const response = await fetch('https://discord.com/api/users/@me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if (!response.ok) throw new Error();
                    const user = await response.json();

                    // ADMIN CHECK: Correct User ID applied here
                    if (user.id === '735531512124145674' || user.username === 'deathhunter1249') {
                        isAdmin = true;
                        document.getElementById('admin-add-trigger')?.classList.remove('hidden');
                    }

                    // Update Header Ranks immediately
                    const navRank = document.getElementById('nav-rank');
                    const menuRank = document.getElementById('menu-user-rank');
                    if(navRank) navRank.innerText = isAdmin ? "Supreme Brewer" : "Teapotian Citizen";
                    if(menuRank) menuRank.innerText = isAdmin ? "Overseer / Admin" : "Verified Citizen";

                } catch (err) { 
                    console.error("Auth error", err);
                    localStorage.removeItem('discord_access_token');
                }
            }
            renderApps(isAdmin);
        }

        // 3. Render Job Cards
        function renderApps(isAdmin) {
            const grid = document.getElementById('job-grid');
            if(!grid) return;
            grid.innerHTML = '';

            apps.forEach((app, index) => {
                const card = document.createElement('div');
                card.className = `job-card ${app.locked ? 'status-locked' : ''}`;
                if(app.locked) card.style.opacity = "0.7";

                card.innerHTML = `
                    ${isAdmin ? `
                    <div class="admin-controls">
                        <span onclick="openEditor(${index})" class="btn-action">EDIT</span>
                        <span onclick="deleteApp(${index})" class="btn-action" style="color:#ff4444">ARCHIVE</span>
                    </div>
                    ` : ''}
                    <div>
                        <div class="mb-4">
                            <span class="status-dot"></span>
                            <span class="font-mono text-[9px] uppercase tracking-widest text-zinc-500">
                                ${app.locked ? 'Classified' : 'Available'}
                            </span>
                        </div>
                        <h3 class="text-xl font-black uppercase text-white mb-3 italic tracking-tight">${app.title}</h3>
                        <p class="text-zinc-500 text-xs leading-relaxed font-medium mb-8">${app.desc}</p>
                    </div>
                    <button class="w-full py-3 border border-[#b8860b]/30 text-[#b8860b] text-[10px] font-black uppercase tracking-[0.2em] hover:bg-[#b8860b] hover:text-black transition-all">
                        ${app.locked ? 'Access Denied' : 'Apply Now'}
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        // 4. Editor Functions
        function openEditor(index = null) {
            currentEditingIndex = index;
            const editor = document.getElementById('admin-editor');
            editor.classList.remove('hidden');
            editor.style.display = 'flex';

            if (index !== null) {
                document.getElementById('edit-title').value = apps[index].title;
                document.getElementById('edit-desc').value = apps[index].desc;
                document.getElementById('edit-locked').checked = apps[index].locked;
            } else {
                document.getElementById('edit-title').value = '';
                document.getElementById('edit-desc').value = '';
                document.getElementById('edit-locked').checked = false;
            }
        }

        function closeEditor() {
            const editor = document.getElementById('admin-editor');
            editor.classList.add('hidden');
            editor.style.display = 'none';
        }

        function saveApp() {
            const title = document.getElementById('edit-title').value;
            const desc = document.getElementById('edit-desc').value;
            const locked = document.getElementById('edit-locked').checked;
            if(!title) return;

            if (currentEditingIndex !== null) apps[currentEditingIndex] = { title, desc, locked };
            else apps.push({ title, desc, locked });

            localStorage.setItem('dprt_apps', JSON.stringify(apps));
            closeEditor();
            initAuth(); // Refresh UI
        }

        function deleteApp(index) {
            if(confirm("Permanently archive this role?")) {
                apps.splice(index, 1);
                localStorage.setItem('dprt_apps', JSON.stringify(apps));
                initAuth();
            }
        }

        window.onload = loadHeader;
    </script>
</body>
</html>
