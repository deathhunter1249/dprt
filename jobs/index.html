<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | State Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
            --silk-dark: #b0aaa0;
            --silk-light: #d4cfc5;
            --inner-paper: #f4f1e8;
            --wood: #2c1e14;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--paper); border-left: 1px solid rgba(0, 0, 0, 0.05); }
        ::-webkit-scrollbar-thumb { background: var(--ink); border: 2px solid var(--paper); }
        ::-webkit-scrollbar-thumb:hover { background: var(--cinnabar); }
        * { scrollbar-width: thin; scrollbar-color: var(--ink) var(--paper); }

        html { overflow: hidden; height: 100%; }
        body {
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            background-color: var(--paper);
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; height: 100%;
            overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        .bg-watermark {
            position: fixed; top: 50%; right: -5%; transform: translateY(-50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 40rem; color: rgba(0, 0, 0, 0.03);
            pointer-events: none; z-index: 0; user-select: none;
        }

        #ink-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; overflow: hidden; }
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            filter: blur(1px); animation: fall 12s infinite linear;
        }
        @keyframes fall {
            0% { transform: translateY(-10px); opacity: 0; }
            20% { opacity: 0.1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .scroll-container {
            opacity: 0; transform: translateY(40px);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
            perspective: 1200px;
        }
        .scroll-container.visible { opacity: 1; transform: translateY(0); }

        .kakemono {
            position: relative;
            width: 310px;
            margin: 0 auto;
            background: linear-gradient(to right, var(--silk-dark), var(--silk-light) 12%, var(--silk-light) 88%, var(--silk-dark));
            padding: 25px 14px 35px 14px;
            box-shadow: 0 35px 70px -15px rgba(0,0,0,0.3);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: top center;
        }

        .scroll-container:hover .kakemono {
            transform: rotateX(5deg) rotateY(-3deg) translateY(-5px);
        }

        .scroll-inner {
            background-color: var(--inner-paper);
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            min-height: 420px;
            padding: 30px 22px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.08); 
        }

        /* THICKER TOP BAR (The Hanger) */
        .kakemono::before {
            content: ""; position: absolute; 
            top: -12px; left: -8%; 
            width: 116%; height: 24px;
            background: linear-gradient(to bottom, #3d2b1d, var(--wood), #1a110a);
            border-radius: 4px; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* THINNER BOTTOM ROLLER */
        .roller {
            position: absolute; 
            bottom: -8px; left: -2%; 
            width: 104%; height: 16px;
            background: var(--wood);
            border-radius: 8px;
            z-index: 10;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px;
        }

        .roller::before, .roller::after {
            content: ""; width: 8px; height: 8px; background: #1e3a8a; 
            border-radius: 50%; box-shadow: inset 0 0 3px black;
        }

        .job-icon {
            width: 50px; height: 50px; margin: 0 auto 18px;
            opacity: 0.7; filter: sepia(0.5);
            transition: all 0.4s ease;
        }
        .scroll-container:hover .job-icon { opacity: 1; filter: sepia(0); transform: scale(1.1); }

        .scroll-title {
            font-family: 'Noto Serif SC', serif; font-weight: 900;
            font-size: 1.5rem; text-align: center; color: var(--ink);
            line-height: 1.2; margin-bottom: 6px;
        }

        .scroll-meta {
            color: var(--cinnabar); font-size: 0.65rem; font-weight: 900;
            text-align: center; letter-spacing: 0.4em;
            margin-bottom: 20px; border-bottom: 1px solid rgba(188, 47, 50, 0.2);
            padding-bottom: 10px;
        }

        .btn-apply {
            margin-top: auto;
            border: 1px solid var(--ink);
            padding: 10px; font-weight: 900; font-size: 0.7rem;
            letter-spacing: 0.2em; text-transform: uppercase;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.02);
        }
        .btn-apply:hover { background: var(--ink); color: white; letter-spacing: 0.3em; }

        .reveal-node { opacity: 0; transform: translateX(-20px); transition: all 1s ease; }
        .reveal-active { opacity: 1; transform: translateX(0); }

        /* === ADMIN CONTROLS STYLING === */
        .admin-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            background: var(--cinnabar);
            border: 2px solid var(--ink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 20;
        }

        .admin-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .admin-toggle::before {
            content: "●";
            font-size: 16px;
            color: white;
            transition: all 0.3s ease;
        }

        .admin-toggle.disabled::before {
            content: "○";
        }

        .scroll-container.disabled .scroll-inner {
            opacity: 0.4;
            filter: grayscale(1);
        }

        .scroll-container.disabled .btn-apply {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
            border-color: #999;
        }

        .scroll-container.disabled .btn-apply:hover {
            background: #ccc;
            color: #666;
            letter-spacing: 0.2em;
        }

        .drag-handle {
            position: absolute;
            top: 50%;
            left: -45px;
            transform: translateY(-50%);
            width: 35px;
            height: 60px;
            background: var(--ink);
            border-radius: 8px 0 0 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: grab;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 15;
        }

        .scroll-container:hover .drag-handle {
            opacity: 0.7;
        }

        .drag-handle:hover {
            opacity: 1;
            left: -48px;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .drag-handle span {
            width: 20px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        .scroll-container.dragging {
            opacity: 0.5;
            transform: scale(0.95);
            z-index: 1000;
        }

        .scroll-container.drag-over {
            transform: translateX(20px);
        }

        .disabled-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            pointer-events: none;
        }

        .disabled-badge {
            background: var(--cinnabar);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border: 2px solid var(--ink);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="header-placeholder" class="relative z-[100]"></div>
    <div class="bg-watermark">令</div>
    <div id="ink-container"></div>

    <main class="relative z-10 pt-16 pb-24">
        <header class="max-w-6xl mx-auto px-12 mb-24">
            <div class="flex items-center gap-10">
                <div class="reveal-node h-28 border-r-4 border-[#bc2f32] pr-10 flex items-center">
                    <span class="writing-vertical font-['Zhi_Mang_Xing'] text-4xl text-[#bc2f32]">職務指令</span>
                </div>
                <div>
                    <h1 class="font-['ZCOOL_XiaoWei'] text-7xl uppercase tracking-tighter">Republic Jobs</h1>
                    <p class="font-serif italic text-zinc-500 text-xs tracking-[0.6em] mt-3">PROCLAIMED MANDATES OF THE STATE (Get a job sucker)</p>
                </div>
            </div>
        </header>

        <div id="job-grid" class="flex flex-wrap justify-center gap-x-20 gap-y-28 px-8"></div>
    </main>

    <script src="/dprt/styling/auth.js"></script>
    <script>
// Job data with disabled state
let jobData = [
    { id: "01", title: "Community Moderator", icon: "dragon.png", desc: "Apply for the Community Moderator position and help enforce rules, manage discussions, and maintain a safe, structured community environment.", disabled: false, order: 0 },
    { id: "02", title: "Chat Moderator", icon: "seal.png", desc: "Become a Chat Moderator and help enforce chat rules, answer questions, and keep discussions organized and respectful.", disabled: false, order: 1 },
    { id: "03", title: "Teapot Communist Party", icon: "teacup.png", desc: "Join the lower echelon of the TCPC. Participate in party activities, support leadership initiatives, and contribute to internal discussions and decision making within the organization.", disabled: false, order: 2 },
    { id: "04", title: "Stuff here", icon: "teacup.png", desc: "", disabled: false, order: 3 },
    { id: "05", title: "Stuff here", icon: "teacup.png", desc: "", disabled: false, order: 4 },
];

// Check if user is admin (you'll need to implement this based on your auth system)
function isAdmin() {
    // Replace this with your actual admin check
    // For example: return window.currentUser && window.currentUser.role === 'admin';
    return true; // Set to false for regular users
}

// Load job data from localStorage
function loadJobData() {
    const saved = localStorage.getItem('dprt_job_data');
    if (saved) {
        jobData = JSON.parse(saved);
    }
}

// Save job data to localStorage
function saveJobData() {
    localStorage.setItem('dprt_job_data', JSON.stringify(jobData));
}

// Toggle job application status
function toggleJobStatus(jobId) {
    const job = jobData.find(j => j.id === jobId);
    if (job) {
        job.disabled = !job.disabled;
        saveJobData();
        renderApps();
    }
}

// Handle drag start
let draggedElement = null;
let draggedJobId = null;

function handleDragStart(e, jobId) {
    draggedElement = e.currentTarget.parentElement;
    draggedJobId = jobId;
    draggedElement.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/html', draggedElement.innerHTML);
}

function handleDragOver(e) {
    if (e.preventDefault) {
        e.preventDefault();
    }
    e.dataTransfer.dropEffect = 'move';
    return false;
}

function handleDragEnter(e) {
    const target = e.currentTarget;
    if (target !== draggedElement) {
        target.classList.add('drag-over');
    }
}

function handleDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
}

function handleDrop(e) {
    if (e.stopPropagation) {
        e.stopPropagation();
    }
    
    const dropTarget = e.currentTarget;
    dropTarget.classList.remove('drag-over');
    
    if (draggedElement !== dropTarget) {
        const targetJobId = dropTarget.dataset.jobId;
        
        // Find indices
        const draggedIndex = jobData.findIndex(j => j.id === draggedJobId);
        const targetIndex = jobData.findIndex(j => j.id === targetJobId);
        
        // Reorder array
        const draggedJob = jobData[draggedIndex];
        jobData.splice(draggedIndex, 1);
        jobData.splice(targetIndex, 0, draggedJob);
        
        // Update order values
        jobData.forEach((job, index) => {
            job.order = index;
        });
        
        saveJobData();
        renderApps();
    }
    
    return false;
}

function handleDragEnd(e) {
    if (draggedElement) {
        draggedElement.classList.remove('dragging');
    }
    document.querySelectorAll('.scroll-container').forEach(el => {
        el.classList.remove('drag-over');
    });
}

function renderApps() {
    const grid = document.getElementById('job-grid');
    const adminMode = isAdmin();
    
    // Sort by order
    const sortedJobs = [...jobData].sort((a, b) => a.order - b.order);
    
    grid.innerHTML = sortedJobs.map(job => `
        <div class="scroll-container ${job.disabled ? 'disabled' : ''}" 
             data-job-id="${job.id}"
             ${adminMode ? 'draggable="true"' : ''}>
            ${adminMode ? `
                <div class="drag-handle" draggable="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="admin-toggle ${job.disabled ? 'disabled' : ''}" 
                     onclick="toggleJobStatus('${job.id}')"
                     title="${job.disabled ? 'Enable Application' : 'Disable Application'}">
                </div>
            ` : ''}
            <div class="kakemono">
                <div class="scroll-inner">
                    <img src="../decals/${job.icon}" class="job-icon" alt="${job.title}" 
                         onerror="console.error('Failed to load:', this.src); this.style.display='none'">
                    <div class="scroll-meta">DIRECTIVE #${job.id}</div>
                    <h2 class="scroll-title">${job.title}</h2>
                    <p class="text-zinc-600 text-[11px] leading-relaxed font-serif italic mb-8 text-center px-2">
                        "${job.desc}"
                    </p>
                    <button 
                        ${job.disabled ? 'disabled' : ''}
                        onclick="${job.disabled ? '' : `window.location.href='/dprt/jobs/apply/${job.title.toLowerCase().replace(/\s+/g, '_')}/';`}" 
                        class="btn-apply">
                        ${job.disabled ? 'Closed' : 'Apply'}
                    </button>
                </div>
                ${job.disabled ? '<div class="disabled-overlay"><div class="disabled-badge">Applications Closed</div></div>' : ''}
                <div class="roller"></div>
            </div>
        </div>
    `).join('');
    
    // Add drag event listeners for admin
    if (adminMode) {
        document.querySelectorAll('.scroll-container').forEach((container, idx) => {
            const dragHandle = container.querySelector('.drag-handle');
            
            if (dragHandle) {
                dragHandle.addEventListener('dragstart', (e) => handleDragStart(e, container.dataset.jobId));
                
                container.addEventListener('dragover', handleDragOver);
                container.addEventListener('dragenter', handleDragEnter);
                container.addEventListener('dragleave', handleDragLeave);
                container.addEventListener('drop', handleDrop);
                container.addEventListener('dragend', handleDragEnd);
            }
        });
    }
    
    // Animate entrance
    setTimeout(() => {
        document.querySelectorAll('.scroll-container').forEach((el, idx) => {
            setTimeout(() => el.classList.add('visible'), idx * 250);
        });
        document.querySelectorAll('.reveal-node').forEach(n => n.classList.add('reveal-active'));
    }, 100);
}

// Ink drops animation
const inkContainer = document.getElementById('ink-container');
for (let i = 0; i < 15; i++) {
    const drop = document.createElement('div');
    drop.className = 'ink-drop';
    drop.style.left = Math.random() * 98 + 'vw';
    const size = (Math.random() * 3 + 2) + 'px';
    drop.style.width = size; drop.style.height = size;
    drop.style.animationDelay = Math.random() * 10 + 's';
    inkContainer.appendChild(drop);
}

// Initialize
window.onload = () => {
    loadJobData();
    renderApps();
};
    </script>
</body>
</html>
