<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | State Directives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
        }

        /* Prevents the map/scroll from moving unexpectedly */
        html, body {
            max-width: 100%;
            overflow-x: hidden; 
            background-color: var(--paper);
        }

        body {
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; min-height: 100vh;
        }

        /* 1. BACKGROUND ELEMENTS */
        .bg-watermark {
            position: fixed; top: 50%; right: -5%; transform: translateY(-50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 40rem; color: rgba(0, 0, 0, 0.03);
            pointer-events: none; z-index: 0; user-select: none;
        }

        .cinnabar-glow {
            position: fixed; bottom: -10%; right: -10%; width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(188, 47, 50, 0.04) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* 2. REVEAL ANIMATIONS */
        .reveal-node { opacity: 0; transform: translateY(15px); transition: all 1s ease-out; }
        .reveal-active { opacity: 1; transform: translateY(0); }

        /* 3. STABLE INK DROPS */
        #ink-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            filter: blur(1px); animation: fall 12s infinite linear;
        }
        @keyframes fall {
            0% { transform: translateY(-5vh); opacity: 0; }
            20% { opacity: 0.1; }
            100% { transform: translateY(105vh); opacity: 0; }
        }

        /* 4. THE KAKEMONO (SCROLLS) - Optimized for Size */
        .scroll-container {
            opacity: 0; transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .scroll-container.visible { opacity: 1; transform: translateY(0); }

        .kakemono {
            background: #f4f1ea;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            width: 280px; min-height: 380px; /* Scaled down slightly */
            margin: 0 auto; position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 35px 25px; display: flex; flex-direction: column;
            transition: transform 0.4s ease;
        }

        .scroll-container:hover .kakemono { transform: translateY(-10px); }

        .kakemono::before { 
            content: ""; position: absolute; top: -6px; left: -2%; width: 104%; height: 10px;
            background: #222; border-radius: 2px;
        }
        
        .roller {
            position: absolute; bottom: -10px; left: -5%; width: 110%; height: 20px;
            background: #1a1a1a; border-radius: 10px;
        }

        /* 5. TYPOGRAPHY */
        .scroll-title { 
            font-family: 'Noto Serif SC', serif; font-weight: 900; 
            font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--ink); 
        }

        .scroll-meta { 
            font-family: 'Noto Serif SC'; font-weight: 900; color: var(--cinnabar); 
            font-size: 0.65rem; letter-spacing: 0.25em; margin-bottom: 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 4px;
        }

        .btn-apply {
            margin-top: auto; border: 1.5px solid var(--ink); padding: 8px;
            font-family: 'Noto Serif SC', serif; font-weight: 900;
            font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--ink); transition: all 0.3s; cursor: pointer;
        }
        .btn-apply:hover { background: var(--cinnabar); color: white; border-color: var(--cinnabar); }

    </style>
</head>
<body>
    <div id="header-placeholder" class="relative z-[100]"></div>
    <div class="bg-watermark">令</div>
    <div class="cinnabar-glow"></div>
    <div id="ink-container"></div>

    <main class="relative z-10 pt-10 pb-20">
        <div class="max-w-6xl mx-auto px-12 mb-16">
            <div class="flex items-center gap-6">
                <div class="reveal-node h-20 border-r-2 border-[#bc2f32] pr-6 flex items-center">
                    <span class="writing-vertical font-['Zhi_Mang_Xing'] text-2xl text-[#bc2f32]">職務指令</span>
                </div>
                <div>
                    <h1 class="font-['ZCOOL_XiaoWei'] text-5xl uppercase tracking-tight">State Directives</h1>
                    <p class="font-serif italic text-zinc-500 text-sm tracking-widest mt-1">Select your path within the Republic</p>
                </div>
            </div>
        </div>

        <div id="job-grid" class="flex flex-wrap justify-center gap-12 px-6"></div>
    </main>

    <script src="/dprt/styling/auth.js"></script>
    <script>
        // DATA: Just add your jobs here
        const jobData = [
            { id: "01", title: "Senior Scribe", desc: "Transcribe the edicts of the Republic with absolute precision and unwavering loyalty." },
            { id: "02", title: "Imperial Guard", desc: "Protect the borders of the Republic from dissent and ensure the peace is kept." },
            { id: "03", title: "Tea Master", desc: "Oversee the preparation of state-sanctioned infusions for the high council." }
        ];

        function renderApps() {
            const grid = document.getElementById('job-grid');
            grid.innerHTML = jobData.map((job, i) => `
                <div class="scroll-container">
                    <div class="kakemono">
                        <div class="scroll-meta">DIRECTIVE #0${job.id}</div>
                        <h2 class="scroll-title">${job.title}</h2>
                        <p class="text-zinc-600 text-[12px] leading-relaxed font-serif italic mb-6">
                            "${job.desc}"
                        </p>
                        <button onclick="window.location.href='https://deathhunter1249.github.io/dprt/apply/'" class="btn-apply">
                            Apply Brush
                        </button>
                        <div class="roller"></div>
                    </div>
                </div>
            `).join('');
            
            // Animation Trigger
            setTimeout(() => {
                document.querySelectorAll('.scroll-container').forEach((el, idx) => {
                    setTimeout(() => el.classList.add('visible'), idx * 150);
                });
                document.querySelectorAll('.reveal-node').forEach(n => n.classList.add('reveal-active'));
            }, 100);
        }

        // Ink Drops
        const inkContainer = document.getElementById('ink-container');
        for (let i = 0; i < 10; i++) {
            const drop = document.createElement('div');
            drop.className = 'ink-drop';
            drop.style.left = Math.random() * 100 + 'vw';
            const size = (Math.random() * 3 + 2) + 'px';
            drop.style.width = size; drop.style.height = size;
            drop.style.animationDelay = Math.random() * 10 + 's';
            inkContainer.appendChild(drop);
        }

        window.onload = renderApps;
    </script>
</body>
</html>
