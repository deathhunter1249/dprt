<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | State Directives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
        }

        body {
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        /* Large Background Calligraphy (The "Dragon") */
        .bg-watermark {
            position: fixed; top: 50%; right: -5%; transform: translateY(-50%);
            font-family: 'Ma Shan Zheng', cursive; font-size: 50rem;
            color: rgba(0, 0, 0, 0.03); pointer-events: none; z-index: 0;
            line-height: 0.8; user-select: none;
            animation: drift 20s ease-in-out infinite;
        }
        @keyframes drift {
            0%, 100% { transform: translateY(-50%) translateX(0); }
            50% { transform: translateY(-52%) translateX(-20px); }
        }

        /* Red Sun / Cinnabar Glow */
        .cinnabar-glow {
            position: fixed; top: -10%; left: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(188, 47, 50, 0.05) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* Ink Droplet Animation */
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            pointer-events: none; z-index: 1; filter: blur(1px);
            animation: fall 15s infinite linear;
        }
        @keyframes fall {
            0% { transform: translate3d(0, -10vh, 0) scale(0); opacity: 0; }
            20% { opacity: 0.1; }
            100% { transform: translate3d(10vw, 110vh, 0) scale(2); opacity: 0; }
        }

        /* AUTHENTIC VERTICAL SCROLL (Kakemono) */
        .scroll-container {
            perspective: 1000px;
            opacity: 0; transform: translateY(30px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .scroll-container.reveal { opacity: 1; transform: translateY(0); }

        .kakemono {
            background: #f4f1ea;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            width: 300px; min-height: 420px;
            margin: 0 auto; position: relative;
            box-shadow: 15px 30px 60px -10px rgba(0,0,0,0.2);
            padding: 40px 30px;
            border-left: 1px solid rgba(0,0,0,0.05);
            border-right: 1px solid rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
        }

        /* The Hanging Mechanism */
        .kakemono::before { /* Top Dowel */
            content: ""; position: absolute; top: -8px; left: -5%; width: 110%; height: 12px;
            background: #222; border-radius: 2px;
        }
        .hanging-string {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 40px; border-top: 1.5px solid #666;
            border-left: 1.5px solid #666; border-right: 1.5px solid #666;
            border-radius: 50px 50px 0 0; opacity: 0.4;
        }

        /* Bottom Heavy Roller */
        .roller {
            position: absolute; bottom: -12px; left: -8%; width: 116%; height: 24px;
            background: linear-gradient(to bottom, #111, #000, #222);
            border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        /* Typography */
        .scroll-title { font-family: 'Ma Shan Zheng', cursive; font-size: 2.2rem; color: var(--ink); margin-bottom: 1rem; line-height: 1.1; }
        .scroll-meta { font-family: 'Noto Serif SC'; font-weight: 900; color: var(--cinnabar); font-size: 0.7rem; letter-spacing: 0.3em; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px;}
        .scroll-desc { font-size: 0.95rem; color: #444; line-height: 1.7; flex-grow: 1; font-style: italic; }

        /* Cinnabar Seal Button */
        .btn-seal {
            margin-top: 2rem; border: 1px solid var(--ink); padding: 8px;
            font-family: 'Zhi Mang Xing', cursive; font-size: 1.4rem;
            color: var(--ink); transition: all 0.3s; background: transparent;
        }
        .btn-seal:hover { background: var(--ink); color: white; border-color: var(--ink); }

        /* Match Header Style */
        .hero-title { font-family: 'Ma Shan Zheng', cursive; font-size: clamp(3rem, 8vw, 6rem); line-height: 0.85; }
        .accent-stamp { writing-mode: vertical-rl; font-family: 'Zhi Mang Xing', cursive; font-size: 1.5rem; color: var(--cinnabar); border-right: 1px solid var(--cinnabar); padding-right: 1rem; margin-right: 2rem; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="bg-watermark">龍</div>
    <div class="cinnabar-glow"></div>
    <div id="ink-container"></div>

    <header class="max-w-7xl mx-auto px-12 py-16 w-full relative z-10">
        <div class="flex items-start">
            <div class="accent-stamp">君子不憂不懼 — Eternal Peace</div>
            <div>
                <div class="mb-4">
                    <span class="bg-black text-white px-4 py-1 text-[10px] tracking-[0.5em] font-bold uppercase">Archive: Job Directives</span>
                </div>
                <h1 class="hero-title text-zinc-900">
                    REPUBLIC <br>
                    <span class="text-[#bc2f32]">POSITIONS</span>
                </h1>
            </div>
        </div>
    </header>

    <main class="relative z-20 pb-40">
        <div id="job-grid" class="flex flex-wrap justify-center gap-24 px-12">
            </div>
    </main>

    <script>
        // Data structure
        const jobs = [
            { id: "001", title: "Senior Scribe", desc: "The brush is your weapon; the scroll is your battlefield. Transcribe the edicts of the Republic with absolute precision and unyielding loyalty." },
            { id: "002", title: "Imperial Guard", desc: "Vigilance is the price of peace. Protect the borders of the Republic of Teapots from those who wish to disrupt our internal tranquility." },
            { id: "003", title: "Tea Master", desc: "Harmony in every drop. Maintain the cultural heritage of our state through the mastery of the leaf and the flame." }
        ];

        function renderJobs() {
            const grid = document.getElementById('job-grid');
            jobs.forEach((job, i) => {
                const container = document.createElement('div');
                container.className = 'scroll-container';
                container.style.transitionDelay = (i * 0.2) + 's';
                
                container.innerHTML = `
                    <div class="hanging-string"></div>
                    <div class="kakemono">
                        <div class="scroll-meta">DIRECTIVE #${job.id}</div>
                        <h2 class="scroll-title">${job.title}</h2>
                        <p class="scroll-desc">"${job.desc}"</p>
                        <button class="btn-seal">Apply Brush</button>
                        <div class="roller"></div>
                    </div>
                `;
                grid.appendChild(container);
                
                // Trigger reveal
                setTimeout(() => container.classList.add('reveal'), 100);
            });
        }

        // Ink Drop Effect (Mirrored from your header)
        function createInk() {
            const container = document.getElementById('ink-container');
            for (let i = 0; i < 15; i++) {
                const drop = document.createElement('div');
                drop.className = 'ink-drop';
                drop.style.left = Math.random() * 100 + '%';
                const size = (Math.random() * 4 + 2) + 'px';
                drop.style.width = size; drop.style.height = size;
                drop.style.animationDelay = Math.random() * 15 + 's';
                container.appendChild(drop);
            }
        }

        window.addEventListener('load', () => {
            createInk();
            renderJobs();
        });
    </script>
</body>
</html>
