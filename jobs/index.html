<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | State Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1a1a; --cinnabar: #bc2f32; --paper: #e6e4e0; --wood: #2a1b0a; }

        body { 
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: 'Noto Serif SC', serif !important; 
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        /* THE HOVERING INK DRAGON - Transparent & Alive */
        .bg-artwork {
            position: fixed; 
            top: 50%; right: -5%; 
            transform: translateY(-50%);
            width: 55vw; height: 85vh;
            background-image: url('background-dragon.png'); 
            background-size: contain; background-repeat: no-repeat;
            background-position: center right;
            opacity: 0.05; pointer-events: none; z-index: 0;
            filter: grayscale(1) contrast(1.1);
            animation: dragonBreath 15s ease-in-out infinite;
        }

        @keyframes dragonBreath {
            0%, 100% { transform: translateY(-50%) translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translateY(-52%) translate(-20px, 10px) rotate(-1deg) scale(1.02); }
            66% { transform: translateY(-48%) translate(10px, -15px) rotate(1deg) scale(0.98); }
        }

        .cinnabar-glow {
            position: fixed; top: -15%; left: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(188, 47, 50, 0.07) 0%, transparent 75%);
            pointer-events: none; z-index: 0;
        }

        /* Ink Droplets */
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            pointer-events: none; z-index: 1; filter: blur(1.5px);
            animation: fall 18s infinite linear;
        }
        @keyframes fall {
            0% { transform: translate3d(0, -10vh, 0) scale(0); opacity: 0; }
            20% { opacity: 0.08; }
            100% { transform: translate3d(15vw, 110vh, 0) scale(2.5); opacity: 0; }
        }

        /* JOB SCROLL - Physical Scroll Look */
        .job-scroll { 
            background: #fdfcf8;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            padding: 1.5rem 2rem;
            position: relative; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.05);
            width: 360px; height: 320px; /* Shorter Frame */
            display: flex; flex-direction: column;
            z-index: 20;
            margin: 20px 0;
            border-left: 1px solid rgba(0,0,0,0.03);
            border-right: 1px solid rgba(0,0,0,0.03);
        }

        /* Top Roller */
        .job-scroll::before {
            content: ""; position: absolute;
            top: -12px; left: -5%; width: 110%; height: 24px;
            background: var(--wood);
            border-radius: 12px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 4px 8px rgba(0,0,0,0.3);
            z-index: 25;
        }

        /* Bottom Roller */
        .job-scroll::after {
            content: ""; position: absolute;
            bottom: -12px; left: -5%; width: 110%; height: 24px;
            background: var(--wood);
            border-radius: 12px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 4px 8px rgba(0,0,0,0.3);
            z-index: 25;
        }

        .job-scroll:hover { 
            transform: translateY(-5px) scale(1.02);
            box-shadow: 15px 15px 30px rgba(188, 47, 50, 0.08);
        }

        /* APPLY BUTTON */
        .btn-initiate {
            background: var(--ink); color: white; padding: 0.6rem;
            font-family: 'Zhi Mang Xing', cursive; font-size: 1.2rem;
            transition: all 0.2s ease;
            border: none; cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            width: 100%; text-align: center;
        }
        .btn-initiate:hover { filter: brightness(1.4); }
        .btn-initiate:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }

        /* ADMIN PANEL */
        #admin-editor {
            position: fixed; top: 0; right: -400px; width: 400px; height: 100%;
            background: #0d0d0d; color: #d1d1d1;
            transition: right 0.5s cubic-bezier(0.8, 0, 0.2, 1);
            z-index: 2000; display: flex; flex-direction: column;
        }
        #admin-editor.open { right: 0; }
        .editor-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .input-field { background: #141414; border: 1px solid #222; color: #fff; width: 100%; padding: 0.6rem; margin-top: 5px; outline: none; font-size: 0.8rem;}
    </style>
</head>
<body>
    <div class="bg-artwork"></div>
    <div class="cinnabar-glow"></div>
    <div id="ink-container" class="fixed inset-0 pointer-events-none z-10"></div>

    <div id="main-content" class="py-20 px-10 relative z-20">
        <header class="max-w-7xl mx-auto mb-16 text-center lg:text-left">
            <div class="flex items-center justify-center lg:justify-start gap-4 mb-2">
                <div class="bg-black text-white px-3 py-0.5 font-bold text-[10px] tracking-widest uppercase">Archive 2026</div>
                <div class="h-[1px] w-16 bg-zinc-300"></div>
            </div>
            <h1 class="text-[clamp(3rem,7vw,5rem)] font-['Ma_Shan_Zheng'] leading-none text-zinc-900">
                Community <span class="text-[#bc2f32]">Directives</span>
            </h1>
        </header>

        <div id="job-grid" class="flex flex-wrap justify-center gap-16 max-w-7xl mx-auto"></div>

        <button id="admin-trigger" onclick="openEditor()" class="hidden fixed bottom-8 right-8 w-14 h-14 bg-black text-[#bc2f32] rounded-full shadow-2xl flex items-center justify-center text-2xl font-['Zhi_Mang_Xing'] border-2 border-[#bc2f32] z-[1500] hover:rotate-90 transition-all duration-500">改</button>
    </div>

    <div id="admin-editor">
        <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
            <h2 class="text-xl font-['Ma_Shan_Zheng'] text-white">Modify Archive</h2>
            <button onclick="closeEditor()" class="text-xs text-zinc-500 hover:text-white">CLOSE</button>
        </div>
        <div class="editor-body space-y-4">
            <input type="hidden" id="edit-index" value="-1">
            <div><label class="text-[8px] uppercase tracking-widest text-zinc-500">Title</label><input type="text" id="edit-title" class="input-field"></div>
            <div><label class="text-[8px] uppercase tracking-widest text-zinc-500">Description</label><textarea id="edit-desc" class="input-field h-20"></textarea></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[8px] uppercase tracking-widest text-zinc-500">Icon</label>
                    <select id="edit-icon" class="input-field">
                        <option value="seal">Seal</option>
                        <option value="dragon">Dragon</option>
                        <option value="lotus">Lotus</option>
                    </select>
                </div>
                <div><label class="text-[8px] uppercase tracking-widest text-zinc-500">Color</label><input type="color" id="edit-color" class="w-full h-9 mt-1 bg-transparent border-none cursor-pointer" value="#bc2f32"></div>
            </div>
            <button onclick="saveApp()" class="w-full bg-[#bc2f32] py-3 mt-4 font-bold text-white uppercase text-[10px] tracking-widest">Update</button>
            <button onclick="copyJSON()" class="w-full border border-zinc-800 py-2 text-zinc-500 uppercase text-[8px]">Copy JSON</button>
        </div>
    </div>

    <script>
        let apps = [];
        let currentAdmin = false;

        // Ink Drops
        const inkContainer = document.getElementById('ink-container');
        for (let i = 0; i < 12; i++) {
            const drop = document.createElement('div');
            drop.className = 'ink-drop';
            drop.style.left = Math.random() * 100 + '%';
            const size = (Math.random() * 3 + 2) + 'px';
            drop.style.width = size; drop.style.height = size;
            drop.style.animationDelay = Math.random() * 15 + 's';
            inkContainer.appendChild(drop);
        }

        async function loadArchive() {
            const stored = localStorage.getItem("dprt_jobs");
            if (stored) { try { apps = JSON.parse(stored); } catch { apps = []; } }
            else {
                apps = [{title: "Imperial Guard", desc: "Defend the inner sanctum with honor and steel.", icon: "seal", color: "#bc2f32"}];
            }
            renderApps(currentAdmin);
        }

        function renderApps(isAdmin = false) {
            currentAdmin = isAdmin;
            const grid = document.getElementById('job-grid');
            const trigger = document.getElementById('admin-trigger');
            if(isAdmin && trigger) trigger.classList.remove('hidden');
            grid.innerHTML = '';

            apps.forEach((app, i) => {
                const scroll = document.createElement('div');
                scroll.className = 'job-scroll';
                scroll.innerHTML = `
                    <div class="flex justify-center mb-2">
                        <img src="/dprt/decals/${app.icon || 'seal'}.png" class="w-10 h-10 opacity-70" alt="Icon">
                    </div>
                    <div class="text-center border-b border-zinc-100 pb-3 mb-3">
                        <h3 class="text-2xl font-['Ma_Shan_Zheng'] text-zinc-800 leading-tight">${app.title}</h3>
                        <p class="text-[7px] text-zinc-400 font-mono tracking-[0.3em] uppercase mt-1">State Department</p>
                    </div>
                    <div class="flex-grow flex items-center justify-center">
                        <p class="text-zinc-600 text-xs leading-relaxed italic text-center px-4">"${app.desc}"</p>
                    </div>
                    <div class="mt-4">
                        <button class="btn-initiate" style="background:${app.color || '#1a1a1a'}">Apply Now</button>
                        ${isAdmin ? `<div class="flex justify-center gap-4 mt-3"><span onclick="editApp(${i})" class="cursor-pointer text-zinc-400 hover:text-black text-[8px] uppercase">Edit</span><span onclick="deleteApp(${i})" class="cursor-pointer text-zinc-400 hover:text-red-700 text-[8px] uppercase">Redact</span></div>` : ''}
                    </div>
                `;
                grid.appendChild(scroll);
            });
        }

        function openEditor() { document.getElementById('admin-editor').classList.add('open'); }
        function closeEditor() { document.getElementById('admin-editor').classList.remove('open'); }
        function editApp(index) {
            const app = apps[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('edit-title').value = app.title;
            document.getElementById('edit-desc').value = app.desc;
            document.getElementById('edit-icon').value = app.icon || 'seal';
            document.getElementById('edit-color').value = app.color || "#bc2f32";
            openEditor();
        }

        function saveApp() {
            const idx = parseInt(document.getElementById("edit-index").value);
            const newData = { title: document.getElementById("edit-title").value, desc: document.getElementById("edit-desc").value, icon: document.getElementById("edit-icon").value, color: document.getElementById("edit-color").value };
            if (idx === -1) apps.push(newData); else apps[idx] = newData;
            localStorage.setItem("dprt_jobs", JSON.stringify(apps));
            renderApps(currentAdmin);
            closeEditor();
        }

        function copyJSON() { navigator.clipboard.writeText(JSON.stringify(apps, null, 2)).then(() => alert("Copied!")); }
        function deleteApp(i) { if (confirm("Redact?")) { apps.splice(i, 1); localStorage.setItem("dprt_jobs", JSON.stringify(apps)); renderApps(currentAdmin); } }

        window.addEventListener('DOMContentLoaded', loadArchive);
    </script>
</body>
</html>
