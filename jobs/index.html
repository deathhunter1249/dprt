<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Imperial Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1a1a; --cinnabar: #bc2f32; --paper: #e6e4e0; }

        body { 
            background-color: var(--paper);
            /* Background Detail: Subtle noise/grain texture */
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            background-blend-mode: overlay;
            font-family: 'Noto Serif SC', serif !important; 
            margin: 0; min-height: 100vh;
        }

        /* Screen detail: Soft vignette */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.15) 100%);
            pointer-events: none; z-index: 10;
        }

        .brush-font { font-family: 'Ma Shan Zheng', cursive !important; }

        /* THE APPLICATION SCROLL - Fixed Scaling Fix */
        .job-scroll { 
            background: #fdfcf8;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            border: 1px solid rgba(0,0,0,0.1);
            padding: 2.5rem; position: relative; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 8px 8px 0px rgba(0,0,0,0.05);
            /* This forces the cards to be identical widths */
            width: 380px; 
            min-height: 580px;
            display: flex;
            flex-direction: column;
            border-top: 5px solid var(--ink);
            z-index: 20;
        }

        .job-scroll:hover { 
            transform: translateY(-8px);
            box-shadow: 20px 20px 0px rgba(188, 47, 50, 0.05);
        }

        .vertical-label {
            position: absolute; left: -30px; top: 30px;
            writing-mode: vertical-rl; text-transform: uppercase;
            font-size: 8px; letter-spacing: 2px; color: #aaa; transform: rotate(180deg);
        }

        .status-watermark {
            position: absolute; top: 20px; right: 20px;
            font-family: 'Zhi Mang Xing'; font-size: 1.2rem;
            color: var(--cinnabar); opacity: 0.25;
            border: 1px solid var(--cinnabar); padding: 2px 8px;
            transform: rotate(12deg);
        }

        .btn-initiate {
            background: var(--ink); color: white; padding: 0.8rem 2rem;
            font-family: 'Zhi Mang Xing', cursive; font-size: 1.4rem;
            transition: 0.3s; border: none; cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            width: 100%;
        }

        /* ADMIN TERMINAL - Added Scroll Bar Fix */
        #admin-editor {
            position: fixed; top: 0; right: -450px; width: 450px; height: 100%;
            background: #0d0d0d; color: #d1d1d1;
            transition: right 0.5s cubic-bezier(0.8, 0, 0.2, 1);
            z-index: 2000; border-left: 1px solid #222;
            display: flex; flex-direction: column;
        }
        #admin-editor.open { right: 0; }
        
        .editor-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
        }
        
        /* Modern Scrollbar styling */
        .editor-scroll-area::-webkit-scrollbar { width: 5px; }
        .editor-scroll-area::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .input-field { background: #141414; border: 1px solid #222; color: #fff; width: 100%; padding: 0.8rem; margin-top: 5px; outline: none; }
    </style>
</head>
<body>

    <div id="main-content" class="py-24 px-10 relative z-20">
        <header class="max-w-7xl mx-auto mb-32">
            <div class="flex items-center gap-4 mb-4">
                <div class="bg-black text-white px-3 py-1 font-bold text-[10px] tracking-widest">VER. 1970</div>
                <div class="h-[1px] w-12 bg-zinc-300"></div>
            </div>
            <h1 class="text-[clamp(4rem,10vw,8rem)] brush-font leading-none text-zinc-900">
                Community <span class="text-[#bc2f32]">Jobs</span>
            </h1>
        </header>

        <div id="job-grid" class="flex flex-wrap justify-center gap-16 max-w-7xl mx-auto"></div>

        <button id="admin-trigger" onclick="openEditor()" class="hidden fixed bottom-12 right-12 w-20 h-20 bg-black text-[#bc2f32] rounded-full shadow-2xl flex items-center justify-center text-4xl font-['Zhi_Mang_Xing'] border-2 border-[#bc2f32] z-[1500] hover:scale-110 transition-all">改</button>
    </div>

    <div id="admin-editor">
        <div class="p-10 border-b border-[#222] bg-[#0d0d0d]">
            <h2 class="text-4xl brush-font text-white">Modify Archive</h2>
        </div>
        
        <div class="editor-scroll-area space-y-8">
            <input type="hidden" id="edit-index" value="-1">
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Post Designation</label>
                <input type="text" id="edit-title" class="input-field" placeholder="Job Title">
            </div>
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Directives</label>
                <textarea id="edit-desc" class="input-field h-32" placeholder="Responsibilities..."></textarea>
            </div>
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Decal Selection</label>
                <select id="edit-icon" class="input-field">
                    <option value="seal">Imperial Seal</option>
                    <option value="dragon">Dragon Spirit</option>
                    <option value="lotus">Peaceful Lotus</option>
                    <option value="sword">Imperial Blade</option>
                </select>
            </div>
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Accent Color</label>
                <input type="color" id="edit-color" class="w-full h-12 mt-2 bg-transparent border-none cursor-pointer" value="#bc2f32">
            </div>
            
            <div class="pt-6 space-y-4">
                <button onclick="saveApp()" class="w-full bg-[#bc2f32] py-4 font-bold text-white uppercase tracking-widest text-xs hover:brightness-110 transition-all">Update Preview</button>
                
                <button onclick="copyJSON()" class="w-full border border-zinc-700 py-3 text-zinc-400 uppercase tracking-widest text-[10px] hover:bg-zinc-800 transition-all">
                    Copy JSON for File Update
                </button>
            </div>

            <button onclick="closeEditor()" class="w-full text-[10px] text-zinc-600 uppercase tracking-widest text-center py-8">Discard Changes</button>
        </div>
    </div>

    <script>
        let apps = [];
        let currentAdmin = false;

        async function loadArchive() {
            const stored = localStorage.getItem("dprt_jobs");
            if (stored) {
                try { apps = JSON.parse(stored); } catch { apps = []; }
            } else {
                try {
                    const res = await fetch("./jobs/jobsdata.json");
                    if (res.ok) {
                        apps = await res.json();
                        localStorage.setItem("dprt_jobs", JSON.stringify(apps));
                    }
                } catch { apps = []; }
            }
            renderApps(currentAdmin);
        }

        function renderApps(isAdmin = false) {
            currentAdmin = isAdmin;
            const grid = document.getElementById('job-grid');
            const trigger = document.getElementById('admin-trigger');
            if(isAdmin && trigger) trigger.classList.remove('hidden');
            grid.innerHTML = '';

            apps.forEach((app, i) => {
                const scroll = document.createElement('div');
                scroll.className = 'job-scroll';
                scroll.style.borderTopColor = app.color || '#1a1a1a';
                
                scroll.innerHTML = `
                    <div class="vertical-label">ARC-ID: ${100 + i} // DP-RT</div>
                    <div class="status-watermark">OPEN</div>
                    <div class="flex justify-center mb-8">
                        <img src="/dprt/decals/${app.icon || 'seal'}.png" class="w-16 h-16 opacity-90" alt="Decal">
                    </div>
                    <div class="text-center border-b border-zinc-100 pb-6 mb-6">
                        <h3 class="text-4xl brush-font text-zinc-800">${app.title}</h3>
                        <p class="text-[9px] text-zinc-400 font-mono tracking-[0.3em] uppercase mt-2">Ministry Application</p>
                    </div>
                    <div class="flex-grow flex items-center justify-center">
                        <p class="text-zinc-600 text-sm leading-relaxed italic text-center px-6">"${app.desc}"</p>
                    </div>
                    <div class="mt-8 flex flex-col items-center gap-4">
                        <button class="btn-initiate" style="background:${app.color || '#1a1a1a'}">Apply Now</button>
                        ${isAdmin ? `
                            <div class="flex gap-6 mt-2">
                                <span onclick="editApp(${i})" class="cursor-pointer text-zinc-400 hover:text-black text-[10px] uppercase tracking-widest border-b border-black/10 hover:border-black">Edit</span>
                                <span onclick="deleteApp(${i})" class="cursor-pointer text-zinc-400 hover:text-red-700 text-[10px] uppercase tracking-widest border-b border-black/10 hover:border-red-700">Redact</span>
                            </div>
                        ` : ''}
                    </div>
                `;
                grid.appendChild(scroll);
            });
        }

        function openEditor() { 
            document.getElementById('edit-index').value = "-1";
            document.getElementById('edit-title').value = "";
            document.getElementById('edit-desc').value = "";
            document.getElementById('admin-editor').classList.add('open'); 
        }

        function closeEditor() { document.getElementById('admin-editor').classList.remove('open'); }

        function editApp(index) {
            const app = apps[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('edit-title').value = app.title;
            document.getElementById('edit-desc').value = app.desc;
            document.getElementById('edit-icon').value = app.icon || 'seal';
            document.getElementById('edit-color').value = app.color || "#bc2f32";
            document.getElementById('admin-editor').classList.add('open');
        }

        function saveApp() {
            const idx = parseInt(document.getElementById("edit-index").value);
            const newData = {
                title: document.getElementById("edit-title").value.trim() || "Untitled",
                desc: document.getElementById("edit-desc").value.trim() || "No description.",
                icon: document.getElementById("edit-icon").value,
                color: document.getElementById("edit-color").value
            };

            if (idx === -1) apps.push(newData);
            else apps[idx] = newData;

            localStorage.setItem("dprt_jobs", JSON.stringify(apps));
            renderApps(currentAdmin);
        }

        // NEW: Function to get the code for your file
        function copyJSON() {
            const dataStr = JSON.stringify(apps, null, 2);
            navigator.clipboard.writeText(dataStr).then(() => {
                alert("Archive Data Copied! Paste this into your ./jobs/jobsdata.json file.");
            });
        }

        function deleteApp(i) {
            if (confirm("Permanently redact this entry from the archive?")) {
                apps.splice(i, 1);
                localStorage.setItem("dprt_jobs", JSON.stringify(apps));
                renderApps(currentAdmin);
            }
        }

        window.addEventListener('DOMContentLoaded', loadArchive);
    </script>
    <script src="/dprt/styling/auth.js"></script>
</body>
</html>
