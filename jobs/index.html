<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Imperial Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
        }

        body { 
            background-color: var(--paper);
            /* Seamless Paper Texture */
            background-image: url('http://googleusercontent.com/image_collection/image_retrieval/6199966141472970469_0');
            background-blend-mode: multiply;
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden; 
        }

        /* Ink Splash Background Element */
        .ink-accent {
            position: fixed; top: 0; right: 0; width: 600px; height: 600px;
            background: url('http://googleusercontent.com/image_collection/image_retrieval/1204424196626481903_0') no-repeat;
            background-size: contain;
            opacity: 0.1; pointer-events: none; z-index: -1;
        }

        /* Red Seal (Stamp) Icon Style */
        .imperial-seal-stamp {
            width: 50px; height: 50px;
            background: url('http://googleusercontent.com/image_collection/image_retrieval/18071948604054727570_0') no-repeat center;
            background-size: contain;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1));
            margin-bottom: 1.5rem;
        }

        /* Animations & Content Entry */
        #main-content { opacity: 0; transform: translateY(15px); transition: all 1.2s ease-out; }
        #main-content.visible { opacity: 1; transform: translateY(0); }

        /* Job Cards: "Bamboo Scroll" Style */
        .job-card { 
            background: rgba(255, 255, 255, 0.4);
            border-left: 2px solid var(--ink);
            padding: 3rem; position: relative; 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(8px);
        }

        .job-card:hover { 
            background: #fff;
            border-left: 8px solid var(--cinnabar);
            transform: translateX(10px);
            box-shadow: 20px 20px 60px rgba(0,0,0,0.05);
        }

        /* Admin Terminal: "Sovereign UI" Side-Bar */
        #admin-editor {
            position: fixed; top: 0; right: -450px; width: 450px; height: 100%;
            background: #0d0d0d; color: #d1d1d1;
            transition: right 0.6s cubic-bezier(0.8, 0, 0.2, 1);
            z-index: 2000; box-shadow: -20px 0 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            border-left: 1px solid #222;
        }
        #admin-editor.open { right: 0; }

        .terminal-header { padding: 3rem 2rem; border-bottom: 1px solid #222; }
        .terminal-body { padding: 2rem; flex-grow: 1; }
        
        .input-field {
            background: #141414; border: 1px solid #222; color: #fff;
            width: 100%; padding: 1rem; margin-top: 0.5rem; outline: none;
            transition: border 0.3s;
        }
        .input-field:focus { border-color: var(--cinnabar); }

        .brush-font { font-family: 'Ma Shan Zheng', cursive; }
        .btn-brush {
            background: var(--cinnabar); color: #fff; padding: 1rem 2rem;
            font-family: 'Zhi Mang Xing'; font-size: 1.4rem; transition: 0.3s;
            cursor: pointer;
        }
        .btn-brush:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="ink-accent"></div>
    <div class="fixed top-1/2 left-4 text-black font-['Zhi_Mang_Xing'] text-9xl -translate-y-1/2 opacity-5 select-none vertical-text" style="writing-mode: vertical-rl;">大同茶國</div>

    <div id="header-placeholder" class="relative z-[1001]"></div>

    <div id="main-content">
        <main class="max-w-7xl mx-auto px-12 py-24">
            <header class="mb-40">
                <div class="flex items-center gap-4 mb-4">
                    <div class="bg-black text-white px-3 py-1 font-bold text-[10px] tracking-widest">VER. 1970</div>
                    <span class="text-zinc-400 font-mono text-[10px] uppercase tracking-[0.5em]">Apply</span>
                </div>
                <h1 class="text-9xl brush-font leading-none text-zinc-900">
                    Community <span class="text-[#bc2f32]">Jobs</span>
                </h1>
            </header>

            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 gap-16"></div>

<button id="admin-trigger" onclick="toggleAdmin()" class="hidden fixed bottom-12 right-12 w-20 h-20 bg-black text-[#bc2f32] rounded-full shadow-2xl flex items-center justify-center text-4xl font-['Zhi_Mang_Xing'] border-2 border-[#bc2f32] hover:bg-[#bc2f32] hover:text-white transition-all z-[1500]">
    改
</button>
        </main>
    </div>

    <div id="admin-editor">
        <div class="terminal-header">
            <span class="text-[#bc2f32] font-mono text-[10px] tracking-widest uppercase opacity-60">System // Authorized User</span>
            <h2 class="text-4xl brush-font mt-2 text-white">Modify Archive</h2>
        </div>
        <div class="terminal-body space-y-8">
            <div>
                <label class="text-zinc-500 font-mono text-[9px] uppercase tracking-widest">Entry Designation</label>
                <input type="text" id="edit-title" class="input-field" placeholder="Name of Edict">
            </div>
            <div>
                <label class="text-zinc-500 font-mono text-[9px] uppercase tracking-widest">Directives</label>
                <textarea id="edit-desc" class="input-field h-40" placeholder="Enter record details..."></textarea>
            </div>
            <div class="flex items-center gap-3">
                <input type="checkbox" id="edit-locked" class="accent-red-700 w-4 h-4">
                <label class="text-zinc-400 font-mono text-[9px] uppercase tracking-widest">Restricted Access</label>
            </div>
            <button onclick="saveApp()" class="w-full btn-brush">Seal Entry</button>
            <button onclick="toggleAdmin()" class="w-full text-zinc-600 font-mono text-[10px] uppercase hover:text-zinc-300">Close Interface</button>
        </div>
    </div>

<script>
        let apps = [];
        let currentStatus = false; // Keep track of admin status globally

        async function loadArchive() {
            try {
                const response = await fetch('./jobsdata.json'); 
                apps = await response.json();
            } catch (e) {
                // Fallback if JSON fails to load
                apps = [{ title: "Imperial Guard", desc: "The first line of ink against the white page.", locked: false }];
            }
            // Trigger initial render
            renderApps(currentStatus);
            document.getElementById('main-content').classList.add('visible');
        }

        function renderApps(isAdmin = false) { 
            currentStatus = isAdmin; // Update global status
            const grid = document.getElementById('job-grid');
            const adminBtn = document.getElementById('admin-trigger');
            
            grid.innerHTML = '';

            // Toggle the floating "Modify" (改) button
            if(isAdmin && adminBtn) {
                adminBtn.classList.remove('hidden');
            }

            apps.forEach((app, index) => {
                const card = document.createElement('div');
                card.className = `job-card ${app.locked ? 'opacity-30 grayscale' : ''}`;
                
                // Determine if we show the Redact button
                const redactBtn = isAdmin ? 
                    `<button onclick="deleteApp(${index})" class="text-zinc-300 hover:text-red-700 font-mono text-[9px] tracking-widest uppercase transition-colors">Redact</button>` 
                    : '';

                card.innerHTML = `
                    <div class="imperial-seal-stamp"></div>
                    <h3 class="text-6xl brush-font mb-4">${app.title}</h3>
                    <p class="text-zinc-600 font-serif leading-relaxed mb-12 text-lg italic border-l border-zinc-200 pl-6">
                        ${app.desc}
                    </p>
                    <div class="flex justify-between items-center">
                        <button class="btn-brush !text-lg !py-2">${app.locked ? 'Locked' : 'Initiate'}</button>
                        ${redactBtn}
                    </div>`;
                grid.appendChild(card);
            });
        }

        function toggleAdmin() { document.getElementById('admin-editor').classList.toggle('open'); }

        function saveApp() {
            const title = document.getElementById('edit-title').value;
            const desc = document.getElementById('edit-desc').value;
            const locked = document.getElementById('edit-locked').checked;
            if(!title) return;

            apps.push({ title, desc, locked });
            
            // Copies new JSON to clipboard so you can paste it into your jobsdata.json
            navigator.clipboard.writeText(JSON.stringify(apps, null, 2)).then(() => {
                alert("Archive Copied! Update jobsdata.json on GitHub to save permanently.");
            });
            
            renderApps(currentStatus); 
            toggleAdmin();
        }

        function deleteApp(i) {
            if(confirm("Confirm permanent redaction of this entry?")) {
                apps.splice(i, 1);
                navigator.clipboard.writeText(JSON.stringify(apps, null, 2));
                renderApps(currentStatus);
            }
        }

        window.addEventListener('load', loadArchive);
    </script>
    <script src="/dprt/styling/auth.js"></script>
</body>
</html>
