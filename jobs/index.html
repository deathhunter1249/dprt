<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Republic of Teapots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
        }

        /* Essential Fix: Prevents "Wobble" and Scrollbars */
        html, body {
            max-width: 100%;
            height: 100%;
            overflow: hidden; /* No scroll on landing page */
            background-color: var(--paper);
        }

        body {
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0;
            display: flex; flex-direction: column;
        }

        /* 1. BACKGROUND ELEMENTS - FIXED POSITIONS */
        .bg-watermark {
            position: fixed; top: 50%; right: -2%; transform: translateY(-50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 45rem; color: rgba(0, 0, 0, 0.04);
            pointer-events: none; z-index: 0; line-height: 0.8; user-select: none;
        }

        .cinnabar-glow {
            position: fixed; top: -15%; left: -10%; width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(188, 47, 50, 0.06) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* 2. REVEAL ANIMATIONS */
        .reveal-node { 
            opacity: 0; transform: translateX(-20px); 
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .reveal-active { opacity: 1; transform: translateX(0); }
        .delay-1 { transition-delay: 0.2s; }
        .delay-2 { transition-delay: 0.4s; }
        .delay-3 { transition-delay: 0.6s; }

        /* 3. STABLE INK DROPS */
        #ink-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 1; overflow: hidden; 
        }
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            filter: blur(1px); animation: fall 12s infinite linear;
        }
        @keyframes fall {
            0% { transform: translate3d(0, -2vh, 0) scale(0); opacity: 0; }
            15% { opacity: 0.12; }
            100% { transform: translate3d(5vw, 102vh, 0) scale(1.2); opacity: 0; }
        }

        /* 4. TYPOGRAPHY - Clean & Strong */
        .hero-title { 
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(3rem, 9vw, 6.5rem); 
            line-height: 0.95;
            letter-spacing: -0.02em;
        }

        .accent-stamp {
            writing-mode: vertical-rl;
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 1.3rem;
            color: var(--cinnabar);
            border-right: 2px solid var(--cinnabar);
            padding-right: 0.8rem;
            margin-right: 2rem;
            opacity: 0.85;
            letter-spacing: 0.1em;
        }

        /* 5. SEAL BUTTONS - High Readability */
        .btn-seal {
            padding: 0.75rem 2rem;
            font-family: 'Noto Serif SC', serif;
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            color: var(--ink);
            border: 2px solid var(--ink);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            background: transparent;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-seal:hover {
            background-color: var(--cinnabar);
            border-color: var(--cinnabar);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body id="blur-container">
    <div id="header-placeholder" class="relative z-[100]"></div>

    <div class="bg-watermark">龍</div>
    <div class="cinnabar-glow"></div>
    <div id="ink-container"></div>
    
    <div class="flex-grow flex flex-col justify-center relative z-10">
        <main class="max-w-5xl mx-auto px-12 py-10 w-full"> 
            <div class="flex items-start">
                <div class="reveal-node delay-1 accent-stamp">
                    君子不憂不懼 — ETERNAL PEACE
                </div>

                <div class="content-wrapper">
                    <div class="reveal-node delay-1 mb-5">
                        <span class="bg-zinc-900 text-white px-3 py-1 text-[9px] tracking-[0.5em] font-bold uppercase">
                            DPRT System Link
                        </span>
                    </div>

                    <div class="reveal-node delay-2">
                        <h1 class="hero-title text-zinc-900 mb-6">
                            ORDER IN <br>
                            <span class="text-[#bc2f32]">EVERY DROP</span>
                        </h1>
                    </div>

                    <div class="reveal-node delay-3">
                        <p class="text-zinc-600 text-lg font-serif max-w-lg leading-relaxed italic border-l-4 border-[#bc2f32] pl-6 mb-10">
                            The Republic is a scroll yet to be written. 
                            Loyalty is the ink; tranquility is the result.
                        </p>
                        
                        <div class="flex flex-wrap gap-5">
                            <button 
                                onclick="window.location.href='https://deathhunter1249.github.io/dprt/jobs/'" 
                                class="btn-seal">
                                View Directives
                            </button>
                            <button 
                                onclick="window.location.href='https://deathhunter1249.github.io/dprt/protocol/'" 
                                class="btn-seal" 
                                style="opacity: 0.6; border-style: dotted;">
                                Protocol
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/dprt/styling/auth.js"></script>

    <script>
        // Smooth Reveal Logic
        window.addEventListener('load', () => {
            const nodes = document.querySelectorAll('.reveal-node');
            setTimeout(() => {
                nodes.forEach(node => node.classList.add('reveal-active'));
            }, 100);
        });

        // Stable Ink Generation (Performance Optimized)
        const inkContainer = document.getElementById('ink-container');
        const dropCount = 10; 
        
        for (let i = 0; i < dropCount; i++) {
            const drop = document.createElement('div');
            drop.className = 'ink-drop';
            drop.style.left = (Math.random() * 95) + 'vw'; // Keep away from right edge
            const size = (Math.random() * 3 + 2) + 'px';
            drop.style.width = size;
            drop.style.height = size;
            drop.style.animationDelay = Math.random() * 10 + 's';
            drop.style.animationDuration = (Math.random() * 4 + 12) + 's';
            inkContainer.appendChild(drop);
        }
    </script>
</body>
</html>
