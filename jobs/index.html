<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | State Directives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
        }

        body {
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        /* 1. BACKGROUND ELEMENTS */
        .bg-dragon {
            position: fixed; top: 50%; right: -5%; transform: translateY(-50%);
            width: 60vw; height: 90vh;
            background-image: url('../decals/dragon-background.png'); 
            background-size: contain; background-repeat: no-repeat;
            background-position: center right;
            opacity: 0.06; pointer-events: none; z-index: 0;
            filter: grayscale(1) contrast(1.2);
            animation: dragonPulse 20s ease-in-out infinite;
        }
        @keyframes dragonPulse {
            0%, 100% { transform: translateY(-50%) scale(1); opacity: 0.05; }
            50% { transform: translateY(-52%) scale(1.05); opacity: 0.08; }
        }

        .cinnabar-glow {
            position: fixed; top: -10%; left: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(188, 47, 50, 0.05) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        /* 2. REVEAL ANIMATIONS */
        .reveal-node { opacity: 0; transform: translateX(-30px); transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-active { opacity: 1; transform: translateX(0); }
        .delay-1 { transition-delay: 0.3s; }
        .delay-2 { transition-delay: 0.6s; }

        /* 3. PHYSICAL SCROLLS (Kakemono) */
        .scroll-container {
            perspective: 1000px; opacity: 0; transform: translateY(40px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .scroll-container.visible { opacity: 1; transform: translateY(0); }

        .kakemono {
            background: #f4f1ea;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            width: 300px; min-height: 420px;
            margin: 0 auto; position: relative;
            box-shadow: 10px 20px 40px rgba(0,0,0,0.15);
            padding: 40px 30px; display: flex; flex-direction: column;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-origin: top center;
        }

        .scroll-container:hover .kakemono {
            transform: rotateX(8deg) rotateY(4deg);
            box-shadow: 25px 50px 70px rgba(0,0,0,0.25);
        }

        /* Scroll Hardware */
        .kakemono::before { 
            content: ""; position: absolute; top: -8px; left: -5%; width: 110%; height: 12px;
            background: #222; border-radius: 2px;
        }
        .hanging-string {
            position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
            width: 110px; height: 45px; border-top: 2px solid #555;
            border-left: 2px solid #555; border-right: 2px solid #555;
            border-radius: 55px 55px 0 0; opacity: 0.3;
        }
        .roller {
            position: absolute; bottom: -12px; left: -8%; width: 116%; height: 26px;
            background: linear-gradient(to bottom, #1a1a1a, #000, #222);
            border-radius: 13px; box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }

        /* 4. TYPOGRAPHY */
        .hero-title { 
            font-family: 'Ma Shan Zheng', cursive; 
            font-size: clamp(3rem, 8vw, 6rem); 
            line-height: 0.85; 
        }

        .accent-stamp { 
            writing-mode: vertical-rl; 
            font-family: 'Zhi Mang Xing', cursive; 
            font-size: 1.5rem; 
            color: var(--cinnabar); 
            border-right: 1px solid var(--cinnabar); 
            padding-right: 1rem; margin-right: 2rem; opacity: 0.8; 
        }

        .scroll-title { 
            font-family: 'Noto Serif SC', serif; 
            font-weight: 900; 
            font-size: 1.8rem; 
            color: var(--ink); 
            margin-bottom: 0.5rem; 
            line-height: 1.1;
        }

        .scroll-meta { 
            font-family: 'Noto Serif SC'; 
            font-weight: 900; 
            color: var(--cinnabar); 
            font-size: 0.7rem; 
            letter-spacing: 0.3em; 
            margin-bottom: 1.5rem; 
            border-bottom: 1px solid rgba(0,0,0,0.1); 
            padding-bottom: 5px; 
        }

        .btn-seal {
            margin-top: auto; border: 1.5px solid var(--ink); padding: 10px;
            font-family: 'Noto Serif SC', serif; font-weight: 700;
            font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--ink); transition: all 0.3s; background: transparent;
            cursor: pointer;
        }
        .btn-seal:hover { background: var(--ink); color: white; }

        /* 5. INK EFFECTS */
        #ink-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            filter: blur(1px); animation: fall 15s infinite linear;
        }
        @keyframes fall {
            0% { transform: translate3d(0, -10vh, 0) scale(0); opacity: 0; }
            20% { opacity: 0.1; }
            100% { transform: translate3d(10vw, 110vh, 0) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-dragon"></div>
    <div class="cinnabar-glow"></div>
    <div id="ink-container"></div>

    <main class="relative z-10">
        <div class="max-w-7xl mx-auto px-12 py-16 w-full">
            <div class="flex items-start">
                <div class="reveal-node delay-1 accent-stamp">君子不憂不懼 — Eternal Peace</div>
                <div>
                    <div class="reveal-node delay-1 mb-4">
                        <span class="bg-black text-white px-4 py-1 text-[10px] tracking-[0.5em] font-bold uppercase">
                            State Archives: Directives
                        </span>
                    </div>
                    <div class="reveal-node delay-2">
                        <h1 class="hero-title text-zinc-900">
                            REPUBLIC <br>
                            <span class="text-[#bc2f32]">APPLICATIONS</span>
                        </h1>
                    </div>
                </div>
            </div>
        </div>

        <div id="job-grid" class="flex flex-wrap justify-center gap-24 px-12 pb-40"></div>
    </main>

    <script>
        // 1. DATA: Add or edit jobs here
        const jobs = [
            { 
                id: "01", 
                title: "Senior Scribe", 
                desc: "Transcribe the edicts of the Republic with absolute precision and unwavering loyalty." 
            },
            { 
                id: "02", 
                title: "Imperial Guard", 
                desc: "Protect the borders of the Republic from dissent and ensure the peace is kept." 
            },
            { 
                id: "03", 
                title: "Tea Master", 
                desc: "Oversee the preparation of state-sanctioned infusions for the high council sessions." 
            }
        ];

        // 2. RENDER FUNCTION
        function renderJobs() {
            const grid = document.getElementById('job-grid');
            grid.innerHTML = jobs.map((job, i) => `
                <div class="scroll-container" style="transition-delay: ${i * 0.2}s">
                    <div class="hanging-string"></div>
                    <div class="kakemono">
                        <div class="scroll-meta">DIRECTIVE #0${job.id}</div>
                        <h2 class="scroll-title">${job.title}</h2>
                        <p class="text-zinc-600 text-[13px] leading-relaxed font-serif italic mb-6">
                            "${job.desc}"
                        </p>
                        <button class="btn-seal">APPLY</button>
                        <div class="roller"></div>
                    </div>
                </div>
            `).join('');

            // Trigger animations after content is injected
            setTimeout(() => {
                document.querySelectorAll('.scroll-container').forEach(el => el.classList.add('visible'));
                document.querySelectorAll('.reveal-node').forEach(node => node.classList.add('reveal-active'));
            }, 100);
        }

        // 3. INK DROP ANIMATION
        const inkContainer = document.getElementById('ink-container');
        for (let i = 0; i < 15; i++) {
            const drop = document.createElement('div');
            drop.className = 'ink-drop';
            drop.style.left = Math.random() * 100 + '%';
            const size = (Math.random() * 4 + 2) + 'px';
            drop.style.width = size; drop.style.height = size;
            drop.style.animationDelay = Math.random() * 15 + 's';
            inkContainer.appendChild(drop);
        }

        // Start render on load
        window.addEventListener('DOMContentLoaded', renderJobs);
    </script>
</body>
</html>
