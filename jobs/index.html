<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Imperial Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
        }

        body { 
            background-color: var(--paper);
            /* Rice paper texture */
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden; 
        }

        /* The Red Sun Accent */
        .red-sun {
            position: fixed; top: 10%; right: 15%;
            width: 300px; height: 300px;
            background: radial-gradient(circle, var(--cinnabar) 0%, transparent 70%);
            opacity: 0.15; filter: blur(40px);
            z-index: -1;
        }

        /* Large Background Calligraphy (From your image) */
        .ink-bg-text {
            position: fixed; top: 50%; left: 10%;
            transform: translateY(-50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 40rem; color: rgba(0, 0, 0, 0.04);
            pointer-events: none; z-index: -2; line-height: 0.8;
        }

        /* Fast Streak Animation */
        .brush-streak {
            position: fixed; top: 0; left: -100%; width: 100%; height: 4px;
            background: linear-gradient(to right, transparent, var(--ink), transparent);
            animation: streak 0.8s ease-out forwards;
            z-index: 1000;
        }

        @keyframes streak {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Content Fade */
        #main-content { opacity: 0; transition: opacity 1s ease-in; }
        #main-content.visible { opacity: 1; }

        /* Ink-Wash Job Cards */
        .job-card { 
            background: rgba(255, 255, 255, 0.4);
            border-bottom: 3px solid var(--ink);
            padding: 3rem 2rem; position: relative; 
            transition: all 0.4s ease;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.02);
        }

        .job-card:hover { 
            background: #fff;
            transform: translate(-4px, -4px);
            box-shadow: 15px 15px 0px var(--cinnabar);
            border-bottom-color: var(--cinnabar);
        }

        /* Decorative "Seal" or Stamp */
        .imperial-seal {
            width: 40px; height: 40px;
            border: 2px solid var(--cinnabar);
            color: var(--cinnabar);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Zhi Mang Xing'; font-weight: bold;
            margin-bottom: 1.5rem;
        }

        .calligraphy { font-family: 'Zhi Mang Xing', cursive; }
        .brush-title { font-family: 'Ma Shan Zheng', cursive; }
        
        .btn-brush {
            background: var(--ink); color: var(--paper);
            padding: 10px 30px; font-family: 'Zhi Mang Xing';
            font-size: 1.3rem; transition: all 0.3s;
        }
        .btn-brush:hover { background: var(--cinnabar); color: white; transform: rotate(-2deg); }

        #header-placeholder { border-bottom: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="red-sun"></div>
    <div class="ink-bg-text">龍抬頭</div>
    <div class="brush-streak"></div>

    <div id="header-placeholder" class="relative z-[1001]"></div>

    <div id="main-content">
        <main class="max-w-6xl mx-auto px-8 py-20">
            <header class="mb-32">
                <div class="flex items-center gap-6 mb-4">
                    <div class="bg-[#bc2f32] text-white p-2 font-bold text-xs vertical-text">貳月貳</div>
                    <h2 class="text-zinc-500 font-mono tracking-[0.5em] text-xs uppercase">Imperial Archive 2026</h2>
                </div>
                <h1 class="text-8xl md:text-[10rem] font-black var(--ink) brush-title leading-none">
                    PERSONNEL <br> <span class="text-[#bc2f32]">EDICTS</span>
                </h1>
            </header>

            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>

            <button id="admin-add-trigger" onclick="openEditor()" class="hidden w-full mt-24 border-2 border-zinc-300 border-dashed py-16 text-zinc-400 hover:text-[#bc2f32] hover:border-[#bc2f32] transition-all brush-title text-3xl">
                + Append New Scroll
            </button>
        </main>
    </div>

    <div id="admin-editor" class="fixed inset-0 bg-white/90 z-[2000] hidden items-center justify-center backdrop-blur-xl">
        <div class="bg-white border-4 border-black p-12 w-full max-w-xl shadow-[20px_20px_0px_#bc2f32]">
            <h2 class="text-black text-5xl mb-10 brush-title">New Archive</h2>
            <div class="space-y-8">
                <input type="text" id="edit-title" placeholder="Designation Name" class="w-full bg-zinc-50 border-b-2 border-black p-4 outline-none focus:bg-zinc-100 text-xl font-serif">
                <textarea id="edit-desc" placeholder="Directives..." class="w-full bg-zinc-50 border-b-2 border-black p-4 h-40 outline-none focus:bg-zinc-100"></textarea>
                <div class="flex gap-4">
                    <button onclick="saveApp()" class="flex-1 btn-brush">Seal Record</button>
                    <button onclick="closeEditor()" class="flex-1 text-zinc-400 uppercase text-[10px] tracking-widest font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let apps = [];

        async function loadArchive() {
            try {
                const response = await fetch('./jobsdata.json'); 
                apps = await response.json();
            } catch (e) {
                apps = [{ title: "Imperial Guard", desc: "The dragon awakens to protect the inner gates.", locked: false }];
            }
            renderApps();
            document.getElementById('main-content').classList.add('visible');
        }

        function renderApps() {
            const grid = document.getElementById('job-grid');
            grid.innerHTML = '';
            const isAdmin = window.location.search.includes('admin=true');
            if(isAdmin) document.getElementById('admin-add-trigger').classList.remove('hidden');

            apps.forEach((app, index) => {
                const card = document.createElement('div');
                card.className = `job-card ${app.locked ? 'opacity-40 grayscale' : ''}`;
                card.innerHTML = `
                    <div class="imperial-seal">命</div>
                    <h3 class="text-5xl text-black mb-6 brush-title">${app.title}</h3>
                    <p class="text-zinc-600 font-serif leading-relaxed mb-10 text-lg italic">${app.desc}</p>
                    <div class="flex justify-between items-center">
                        <button class="btn-brush">${app.locked ? 'Locked' : 'Initiate'}</button>
                        ${isAdmin ? `<button onclick="deleteApp(${index})" class="text-zinc-400 hover:text-red-600 text-[10px] font-bold">REDACT</button>` : ''}
                    </div>`;
                grid.appendChild(card);
            });
        }

        function saveApp() {
            const title = document.getElementById('edit-title').value;
            const desc = document.getElementById('edit-desc').value;
            if(!title) return;
            apps.push({ title, desc, locked: false });
            navigator.clipboard.writeText(JSON.stringify(apps, null, 2)).then(() => {
                alert("Seal Created. Paste into jobsdata.json on GitHub.");
            });
            renderApps(); closeEditor();
        }

        function deleteApp(i) {
            if(confirm("Burn this record?")) {
                apps.splice(i, 1);
                navigator.clipboard.writeText(JSON.stringify(apps, null, 2));
                renderApps();
            }
        }

        window.addEventListener('load', loadArchive);
        function openEditor() { document.getElementById('admin-editor').style.display = 'flex'; }
        function closeEditor() { document.getElementById('admin-editor').style.display = 'none'; }
    </script>
    <script src="/dprt/styling/auth.js"></script>
</body>
</html>
