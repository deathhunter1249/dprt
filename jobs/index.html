<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Imperial Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1a1a; --cinnabar: #bc2f32; --paper: #e6e4e0; }

        body { 
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: 'Noto Serif SC', serif !important; 
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        /* THE HOVERING INK DRAGON */
        .bg-artwork {
            position: fixed; 
            top: 45%; /* Slightly higher to center the sway */
            right: -2%; 
            width: 60vw; height: 85vh;
            background-image: url('background-dragon.png'); 
            background-size: contain; background-repeat: no-repeat;
            background-position: center right;
            opacity: 0.04; pointer-events: none; z-index: 0;
            filter: grayscale(1) contrast(1.1);
            /* Sway Animation: 12 seconds for a slow, graceful loop */
            animation: dragonSway 12s ease-in-out infinite;
        }

        @keyframes dragonSway {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-15px, 10px) rotate(-0.5deg); }
            50% { transform: translate(5px, -15px) rotate(0.5deg); }
            75% { transform: translate(-10px, -5px) rotate(-0.2deg); }
        }

        .cinnabar-glow {
            position: fixed; top: -15%; left: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(188, 47, 50, 0.07) 0%, transparent 75%);
            pointer-events: none; z-index: 0;
        }

        /* Ink Droplet Detail */
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            pointer-events: none; z-index: 1; filter: blur(1.5px);
            animation: fall 18s infinite linear;
        }
        @keyframes fall {
            0% { transform: translate3d(0, -10vh, 0) scale(0); opacity: 0; }
            20% { opacity: 0.08; }
            100% { transform: translate3d(15vw, 110vh, 0) scale(2.5); opacity: 0; }
        }

        /* JOB SCROLL - Scaled & Professional */
        .job-scroll { 
            background: #fdfcf8;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            border: 1px solid rgba(0,0,0,0.08);
            padding: 1.8rem 2rem;
            position: relative; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 6px 6px 0px rgba(0,0,0,0.04);
            width: 380px; height: 460px;
            display: flex; flex-direction: column;
            border-top: 5px solid var(--ink);
            z-index: 20;
        }

        .job-scroll:hover { 
            transform: translateY(-8px);
            box-shadow: 20px 20px 0px rgba(188, 47, 50, 0.04);
        }

        /* APPLY BUTTON */
        .btn-initiate {
            background: var(--ink); color: white; padding: 0.8rem;
            font-family: 'Zhi Mang Xing', cursive; font-size: 1.3rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: none; cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            width: 90%; align-self: center; text-align: center;
        }
        .btn-initiate:hover { filter: brightness(1.3); }
        .btn-initiate:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }

        /* ADMIN PANEL */
        #admin-editor {
            position: fixed; top: 0; right: -450px; width: 450px; height: 100%;
            background: #0d0d0d; color: #d1d1d1;
            transition: right 0.6s cubic-bezier(0.8, 0, 0.2, 1);
            z-index: 2000; display: flex; flex-direction: column;
        }
        #admin-editor.open { right: 0; }
        .editor-body { flex: 1; overflow-y: auto; padding: 2rem; }
        .editor-body::-webkit-scrollbar { width: 3px; }
        .editor-body::-webkit-scrollbar-thumb { background: var(--cinnabar); }
        .input-field { background: #141414; border: 1px solid #222; color: #fff; width: 100%; padding: 0.8rem; margin-top: 5px; outline: none; }
    </style>
</head>
<body>
    <div class="bg-artwork"></div>
    <div class="cinnabar-glow"></div>
    <div id="ink-container" class="fixed inset-0 pointer-events-none z-10"></div>

    <div id="header-placeholder" class="relative z-[100]"></div>

    <div id="main-content" class="py-20 px-10 relative z-20">
        <header class="max-w-7xl mx-auto mb-20">
            <div class="flex items-center gap-4 mb-2">
                <div class="bg-black text-white px-3 py-0.5 font-bold text-[10px] tracking-widest uppercase">Archive 2026</div>
                <div class="h-[1px] w-16 bg-zinc-300"></div>
            </div>
            <h1 class="text-[clamp(3.5rem,8vw,6.5rem)] font-['Ma_Shan_Zheng'] leading-none text-zinc-900">
                Imperial <span class="text-[#bc2f32]">Directives</span>
            </h1>
        </header>

        <div id="job-grid" class="flex flex-wrap justify-center gap-12 max-w-7xl mx-auto"></div>

        <button id="admin-trigger" onclick="openEditor()" class="hidden fixed bottom-8 right-8 w-16 h-16 bg-black text-[#bc2f32] rounded-full shadow-2xl flex items-center justify-center text-3xl font-['Zhi_Mang_Xing'] border-2 border-[#bc2f32] z-[1500] hover:rotate-90 transition-all duration-500">改</button>
    </div>

    <div id="admin-editor">
        <div class="p-8 border-b border-zinc-800"><h2 class="text-3xl font-['Ma_Shan_Zheng'] text-white">Modify Archive</h2></div>
        <div class="editor-body space-y-6">
            <input type="hidden" id="edit-index" value="-1">
            <div><label class="text-[9px] uppercase tracking-widest text-zinc-500">Job Title</label><input type="text" id="edit-title" class="input-field"></div>
            <div><label class="text-[9px] uppercase tracking-widest text-zinc-500">Description</label><textarea id="edit-desc" class="input-field h-24"></textarea></div>
            <div><label class="text-[9px] uppercase tracking-widest text-zinc-500">Icon Decal</label><select id="edit-icon" class="input-field"><option value="seal">Imperial Seal</option><option value="dragon">Dragon</option><option value="lotus">Lotus</option></select></div>
            <div><label class="text-[9px] uppercase tracking-widest text-zinc-500">Accent Color</label><input type="color" id="edit-color" class="w-full h-10 mt-2 bg-transparent border-none cursor-pointer" value="#bc2f32"></div>
            
            <div class="pt-6 space-y-3">
                <button onclick="saveApp()" class="w-full bg-[#bc2f32] py-4 font-bold text-white uppercase text-[10px] tracking-widest">Update Preview</button>
                <button onclick="copyJSON()" class="w-full border border-zinc-800 py-3 text-zinc-500 uppercase text-[9px] hover:text-white transition-all">Copy JSON for File</button>
            </div>
            <button onclick="closeEditor()" class="w-full text-[9px] text-zinc-600 uppercase text-center py-6">Discard Changes</button>
        </div>
    </div>

    <script>
        let apps = [];
        let currentAdmin = false;

        // Initialize Ink Drops
        const inkContainer = document.getElementById('ink-container');
        for (let i = 0; i < 15; i++) {
            const drop = document.createElement('div');
            drop.className = 'ink-drop';
            drop.style.left = Math.random() * 100 + '%';
            const size = (Math.random() * 3 + 2) + 'px';
            drop.style.width = size; drop.style.height = size;
            drop.style.animationDelay = Math.random() * 15 + 's';
            inkContainer.appendChild(drop);
        }

        async function loadArchive() {
            const stored = localStorage.getItem("dprt_jobs");
            if (stored) { try { apps = JSON.parse(stored); } catch { apps = []; } }
            else {
                try {
                    const res = await fetch("./jobs/jobsdata.json");
                    if (res.ok) { apps = await res.json(); localStorage.setItem("dprt_jobs", JSON.stringify(apps)); }
                } catch { apps = []; }
            }
            renderApps(currentAdmin);
        }

        function renderApps(isAdmin = false) {
            currentAdmin = isAdmin;
            const grid = document.getElementById('job-grid');
            const trigger = document.getElementById('admin-trigger');
            if(isAdmin && trigger) trigger.classList.remove('hidden');
            grid.innerHTML = '';

            apps.forEach((app, i) => {
                const scroll = document.createElement('div');
                scroll.className = 'job-scroll';
                scroll.style.borderTopColor = app.color || '#1a1a1a';
                scroll.innerHTML = `
                    <div class="flex justify-center mb-4"><img src="/dprt/decals/${app.icon || 'seal'}.png" class="w-12 h-12 opacity-80" alt="Icon"></div>
                    <div class="text-center border-b border-zinc-100 pb-4 mb-4">
                        <h3 class="text-3xl font-['Ma_Shan_Zheng'] text-zinc-800 leading-tight">${app.title}</h3>
                        <p class="text-[8px] text-zinc-400 font-mono tracking-widest uppercase mt-1">Republic Dept</p>
                    </div>
                    <div class="flex-grow flex items-center justify-center">
                        <p class="text-zinc-600 text-xs leading-relaxed italic text-center px-4">"${app.desc}"</p>
                    </div>
                    <div class="mt-6 flex flex-col items-center gap-4">
                        <button class="btn-initiate" style="background:${app.color || '#1a1a1a'}">Apply Now</button>
                        ${isAdmin ? `<div class="flex gap-4"><span onclick="editApp(${i})" class="cursor-pointer text-zinc-400 hover:text-black text-[9px] uppercase">Edit</span><span onclick="deleteApp(${i})" class="cursor-pointer text-zinc-400 hover:text-red-700 text-[9px] uppercase">Redact</span></div>` : ''}
                    </div>
                `;
                grid.appendChild(scroll);
            });
        }

        function openEditor() { document.getElementById('edit-index').value = "-1"; document.getElementById('admin-editor').classList.add('open'); }
        function closeEditor() { document.getElementById('admin-editor').classList.remove('open'); }
        function editApp(index) {
            const app = apps[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('edit-title').value = app.title;
            document.getElementById('edit-desc').value = app.desc;
            document.getElementById('edit-icon').value = app.icon || 'seal';
            document.getElementById('edit-color').value = app.color || "#bc2f32";
            document.getElementById('admin-editor').classList.add('open');
        }

        function saveApp() {
            const idx = parseInt(document.getElementById("edit-index").value);
            const newData = { title: document.getElementById("edit-title").value, desc: document.getElementById("edit-desc").value, icon: document.getElementById("edit-icon").value, color: document.getElementById("edit-color").value };
            if (idx === -1) apps.push(newData); else apps[idx] = newData;
            localStorage.setItem("dprt_jobs", JSON.stringify(apps));
            renderApps(currentAdmin);
        }

        function copyJSON() {
            navigator.clipboard.writeText(JSON.stringify(apps, null, 2)).then(() => alert("Archive Data Copied!"));
        }

        function deleteApp(i) {
            if (confirm("Redact?")) { apps.splice(i, 1); localStorage.setItem("dprt_jobs", JSON.stringify(apps)); renderApps(currentAdmin); }
        }

        window.activateAdminMode = function(status) { renderApps(status); };
        window.addEventListener('DOMContentLoaded', loadArchive);
    </script>
    <script src="/dprt/styling/auth.js"></script>
</body>
</html>
