<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Imperial Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1a1a; --cinnabar: #bc2f32; --paper: #e6e4e0; }

        body { 
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            background-blend-mode: overlay;
            font-family: 'Noto Serif SC', serif !important; 
            margin: 0; min-height: 100vh;
        }

        /* Subtle Background Vignette */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 70%, rgba(0,0,0,0.15) 100%);
            pointer-events: none; z-index: 10;
        }

        .brush-font { font-family: 'Ma Shan Zheng', cursive !important; }

        /* THE APPLICATION SCROLL - Shortened & Scaled */
        .job-scroll { 
            background: #fdfcf8;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            border: 1px solid rgba(0,0,0,0.1);
            padding: 1.5rem 2rem; /* Reduced vertical padding */
            position: relative; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 6px 6px 0px rgba(0,0,0,0.05);
            width: 380px; 
            height: 480px; /* Shortened height */
            display: flex;
            flex-direction: column;
            border-top: 4px solid var(--ink);
            z-index: 20;
        }

        .job-scroll:hover { 
            transform: translateY(-5px);
            box-shadow: 15px 15px 0px rgba(188, 47, 50, 0.05);
        }

        .vertical-label {
            position: absolute; left: -25px; top: 25px;
            writing-mode: vertical-rl; text-transform: uppercase;
            font-size: 8px; letter-spacing: 2px; color: #aaa; transform: rotate(180deg);
        }

        .status-watermark {
            position: absolute; top: 15px; right: 15px;
            font-family: 'Zhi Mang Xing'; font-size: 1rem;
            color: var(--cinnabar); opacity: 0.2;
            border: 1px solid var(--cinnabar); padding: 1px 6px;
            transform: rotate(10deg);
        }

        /* Apply Now Button + Animation */
        .btn-initiate {
            background: var(--ink); color: white; padding: 0.7rem 1.5rem;
            font-family: 'Zhi Mang Xing', cursive; font-size: 1.2rem;
            transition: all 0.2s ease; border: none; cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            width: 80%; align-self: center;
            text-align: center;
        }

        .btn-initiate:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
        }

        .btn-initiate:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
        }

        /* ADMIN TERMINAL */
        #admin-editor {
            position: fixed; top: 0; right: -450px; width: 450px; height: 100%;
            background: #0d0d0d; color: #d1d1d1;
            transition: right 0.5s cubic-bezier(0.8, 0, 0.2, 1);
            z-index: 2000; border-left: 1px solid #222;
            display: flex; flex-direction: column;
        }
        #admin-editor.open { right: 0; }
        
        .editor-content { flex: 1; overflow-y: auto; padding: 2rem; }
        .editor-content::-webkit-scrollbar { width: 4px; }
        .editor-content::-webkit-scrollbar-thumb { background: #333; }

        .input-field { background: #141414; border: 1px solid #222; color: #fff; width: 100%; padding: 0.8rem; margin-top: 5px; outline: none; }
    </style>
</head>
<body>

    <div id="header-placeholder" class="relative z-[1001]"></div>

    <div id="main-content" class="py-16 px-10">
        <header class="max-w-7xl mx-auto mb-20">
            <div class="flex items-center gap-4 mb-2">
                <div class="bg-black text-white px-2 py-0.5 font-bold text-[9px] tracking-widest">VER. 1970</div>
                <div class="h-[1px] w-12 bg-zinc-300"></div>
            </div>
            <h1 class="text-[clamp(3rem,8vw,6rem)] brush-font leading-none text-zinc-900">
                Community <span class="text-[#bc2f32]">Jobs</span>
            </h1>
        </header>

        <div id="job-grid" class="flex flex-wrap justify-center gap-10 max-w-7xl mx-auto"></div>

        <button id="admin-trigger" onclick="openEditor()" class="hidden fixed bottom-8 right-8 w-16 h-16 bg-black text-[#bc2f32] rounded-full shadow-2xl flex items-center justify-center text-3xl font-['Zhi_Mang_Xing'] border-2 border-[#bc2f32] z-[1500] hover:scale-110 transition-all">改</button>
    </div>

    <div id="admin-editor">
        <div class="p-8 border-b border-[#222]">
            <h2 class="text-3xl brush-font text-white">Modify Archive</h2>
        </div>
        <div class="editor-content space-y-6">
            <input type="hidden" id="edit-index" value="-1">
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Job Title</label>
                <input type="text" id="edit-title" class="input-field">
            </div>
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Directives (Description)</label>
                <textarea id="edit-desc" class="input-field h-24"></textarea>
            </div>
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Decal</label>
                <select id="edit-icon" class="input-field">
                    <option value="seal">Imperial Seal</option>
                    <option value="dragon">Dragon Spirit</option>
                    <option value="lotus">Peaceful Lotus</option>
                    <option value="sword">Imperial Blade</option>
                </select>
            </div>
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Accent Color</label>
                <input type="color" id="edit-color" class="w-full h-10 mt-2 bg-transparent border-none cursor-pointer" value="#bc2f32">
            </div>
            <div class="pt-4 space-y-3">
                <button onclick="saveApp()" class="w-full bg-[#bc2f32] py-3 font-bold text-white uppercase tracking-widest text-[10px]">Update Preview</button>
                <button onclick="copyJSON()" class="w-full border border-zinc-800 py-3 text-zinc-500 uppercase tracking-widest text-[9px] hover:text-white">Copy JSON for File</button>
            </div>
            <button onclick="closeEditor()" class="w-full text-[9px] text-zinc-600 uppercase tracking-widest text-center py-4">Discard Changes</button>
        </div>
    </div>

    <script>
        let apps = [];
        let currentAdmin = false;

        async function loadArchive() {
            const stored = localStorage.getItem("dprt_jobs");
            if (stored) {
                try { apps = JSON.parse(stored); } catch { apps = []; }
            } else {
                try {
                    const res = await fetch("./jobs/jobsdata.json");
                    if (res.ok) {
                        apps = await res.json();
                        localStorage.setItem("dprt_jobs", JSON.stringify(apps));
                    }
                } catch { apps = []; }
            }
            renderApps(currentAdmin);
        }

        function renderApps(isAdmin = false) {
            currentAdmin = isAdmin;
            const grid = document.getElementById('job-grid');
            const trigger = document.getElementById('admin-trigger');
            if(isAdmin && trigger) trigger.classList.remove('hidden');
            grid.innerHTML = '';

            apps.forEach((app, i) => {
                const scroll = document.createElement('div');
                scroll.className = 'job-scroll';
                scroll.style.borderTopColor = app.color || '#1a1a1a';
                
                scroll.innerHTML = `
                    <div class="vertical-label">ARC-ID: ${100 + i}</div>
                    <div class="status-watermark">OPEN</div>
                    <div class="flex justify-center mb-4">
                        <img src="/dprt/decals/${app.icon || 'seal'}.png" class="w-12 h-12 opacity-80" alt="Icon">
                    </div>
                    <div class="text-center border-b border-zinc-100 pb-4 mb-4">
                        <h3 class="text-3xl brush-font text-zinc-800 leading-tight">${app.title}</h3>
                        <p class="text-[8px] text-zinc-400 font-mono tracking-widest uppercase mt-1">Ministry Dept</p>
                    </div>
                    <div class="flex-grow flex items-center">
                        <p class="text-zinc-600 text-xs leading-relaxed italic text-center w-full px-2">"${app.desc}"</p>
                    </div>
                    <div class="mt-6 flex flex-col items-center gap-3">
                        <button class="btn-initiate" style="background:${app.color || '#1a1a1a'}">Apply Now</button>
                        ${isAdmin ? `
                            <div class="flex gap-4">
                                <span onclick="editApp(${i})" class="cursor-pointer text-zinc-400 hover:text-black text-[9px] uppercase tracking-widest">Edit</span>
                                <span onclick="deleteApp(${i})" class="cursor-pointer text-zinc-400 hover:text-red-700 text-[9px] uppercase tracking-widest">Redact</span>
                            </div>
                        ` : ''}
                    </div>
                `;
                grid.appendChild(scroll);
            });
        }

        // Authentication Bridge (for your auth.js)
        window.activateAdminMode = function(status) {
            renderApps(status);
        };

        function openEditor() { 
            document.getElementById('edit-index').value = "-1"; 
            document.getElementById('admin-editor').classList.add('open'); 
        }
        function closeEditor() { document.getElementById('admin-editor').classList.remove('open'); }

        function editApp(index) {
            const app = apps[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('edit-title').value = app.title;
            document.getElementById('edit-desc').value = app.desc;
            document.getElementById('edit-icon').value = app.icon || 'seal';
            document.getElementById('edit-color').value = app.color || "#bc2f32";
            document.getElementById('admin-editor').classList.add('open');
        }

        function saveApp() {
            const idx = parseInt(document.getElementById("edit-index").value);
            const newData = {
                title: document.getElementById("edit-title").value || "New Post",
                desc: document.getElementById("edit-desc").value || "...",
                icon: document.getElementById("edit-icon").value,
                color: document.getElementById("edit-color").value
            };
            if (idx === -1) apps.push(newData);
            else apps[idx] = newData;
            localStorage.setItem("dprt_jobs", JSON.stringify(apps));
            renderApps(currentAdmin);
        }

        function copyJSON() {
            const data = JSON.stringify(apps, null, 2);
            navigator.clipboard.writeText(data).then(() => alert("JSON copied! Paste this into jobsdata.json"));
        }

        function deleteApp(i) {
            if (confirm("Redact?")) {
                apps.splice(i, 1);
                localStorage.setItem("dprt_jobs", JSON.stringify(apps));
                renderApps(currentAdmin);
            }
        }

        window.addEventListener('DOMContentLoaded', loadArchive);
    </script>
    <script src="/dprt/styling/auth.js"></script>
</body>
</html>
