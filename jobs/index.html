<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Imperial Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
        }

        body { 
            background-color: var(--paper);
            background-image: url('https://googleusercontent.com/image_collection/image_retrieval/6199966141472970469_0');
            background-blend-mode: multiply;
            font-family: 'Noto Serif SC', serif !important; 
            margin: 0; min-height: 100vh;
        }

        .brush-font { font-family: 'Ma Shan Zheng', cursive !important; }
        
        /* THE SCROLL (Application Card) */
        .job-scroll { 
            background: #fdfcf8;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 2.5rem; 
            position: relative; 
            transition: all 0.4s ease;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.05);
            max-width: 550px;
            margin: 0 auto;
        }

        /* Decorative "Paper Fasteners" */
        .job-scroll::before, .job-scroll::after {
            content: ""; position: absolute; top: 15px; width: 10px; height: 10px;
            background: var(--ink); border-radius: 50%; opacity: 0.1;
        }
        .job-scroll::before { left: 15px; }
        .job-scroll::after { right: 15px; }

        .job-scroll:hover { 
            transform: translateY(-5px);
            box-shadow: 15px 15px 0px rgba(188, 47, 50, 0.1);
        }

        /* Side Vertical Label */
        .vertical-label {
            position: absolute; left: -25px; top: 20px;
            writing-mode: vertical-rl; text-transform: uppercase;
            font-size: 9px; letter-spacing: 2px; color: #aaa;
        }

        /* Application Watermark */
        .status-watermark {
            position: absolute; top: 20px; right: 20px;
            font-family: 'Zhi Mang Xing'; font-size: 1.2rem;
            color: var(--cinnabar); opacity: 0.2;
            border: 2px solid var(--cinnabar); padding: 2px 8px;
            transform: rotate(15deg);
        }

        .btn-initiate {
            background: var(--ink);
            color: white; padding: 0.5rem 2rem;
            font-family: 'Zhi Mang Xing', cursive; font-size: 1.2rem;
            transition: 0.3s; border: none; cursor: pointer;
        }
        .btn-initiate:hover { background: var(--cinnabar); letter-spacing: 1px; }

        /* Sidebar Editor */
        #admin-editor {
            position: fixed; top: 0; right: -450px; width: 450px; height: 100%;
            background: #0d0d0d; color: #d1d1d1;
            transition: right 0.5s cubic-bezier(0.8, 0, 0.2, 1);
            z-index: 2000; display: flex; flex-direction: column;
        }
        #admin-editor.open { right: 0; }
        .input-field { background: #141414; border: 1px solid #222; color: #fff; width: 100%; padding: 0.8rem; margin-top: 5px; outline: none; }
    </style>
</head>
<body>

    <div id="main-content" class="py-20 px-10">
        <header class="max-w-7xl mx-auto mb-20 text-center">
            <h1 class="text-8xl brush-font text-zinc-900">Imperial <span class="text-[#bc2f32]">Archive</span></h1>
            <p class="text-zinc-500 font-mono text-[10px] tracking-[0.5em] mt-4 uppercase">Directives & Applications</p>
        </header>

        <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 max-w-7xl mx-auto"></div>

        <button id="admin-trigger" onclick="openEditor()" class="hidden fixed bottom-10 right-10 w-16 h-16 bg-black text-[#bc2f32] rounded-full shadow-2xl flex items-center justify-center text-2xl font-['Zhi_Mang_Xing'] border-2 border-[#bc2f32] z-[1500]">改</button>
    </div>

    <div id="admin-editor">
        <div class="p-8 border-b border-[#222]">
            <h2 class="text-3xl brush-font text-white">Modify Archive</h2>
        </div>
        <div class="p-8 space-y-6 overflow-y-auto">
            <input type="hidden" id="edit-index" value="-1">
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Post Title</label>
                <input type="text" id="edit-title" class="input-field">
            </div>
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Requirements</label>
                <textarea id="edit-desc" class="input-field h-24"></textarea>
            </div>
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Decal (./decals/name.png)</label>
                <select id="edit-icon" class="input-field">
                    <option value="seal">Imperial Seal</option>
                    <option value="dragon">Dragon Emblem</option>
                    <option value="lotus">Lotus Flower</option>
                    <option value="sword">Officer Blade</option>
                </select>
            </div>
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500">Accent Hue</label>
                <input type="color" id="edit-color" class="w-full h-10 mt-2 bg-transparent border-none cursor-pointer" value="#bc2f32">
            </div>
            <button onclick="saveApp()" class="w-full bg-[#bc2f32] py-4 font-bold text-white uppercase tracking-widest text-xs">Commit to Archive</button>
            <button onclick="closeEditor()" class="w-full text-[10px] text-zinc-600 uppercase">Cancel</button>
        </div>
    </div>

    <script>
        let apps = [];
        let currentAdmin = false;

        async function loadArchive() {
            try {
                const res = await fetch('./jobsdata.json');
                apps = await res.json();
            } catch (e) { apps = []; }
            renderApps(currentAdmin);
        }

        function renderApps(isAdmin = false) {
            currentAdmin = isAdmin;
            const grid = document.getElementById('job-grid');
            if(isAdmin) document.getElementById('admin-trigger')?.classList.remove('hidden');
            grid.innerHTML = '';

            apps.forEach((app, i) => {
                const scroll = document.createElement('div');
                scroll.className = 'job-scroll';
                
                scroll.innerHTML = `
                    <div class="vertical-label">Ref. #${2024 + i} // DP-RT</div>
                    <div class="status-watermark">VACANT</div>
                    
                    <div class="flex justify-center mb-6">
                        <img src="./decals/${app.icon || 'seal'}.png" class="w-12 h-12 opacity-80" alt="Icon">
                    </div>

                    <div class="text-center border-b border-zinc-100 pb-4 mb-4">
                        <h3 class="text-3xl brush-font text-zinc-800">${app.title}</h3>
                        <p class="text-[10px] text-zinc-400 font-mono tracking-widest uppercase mt-1">Personnel Directive</p>
                    </div>

                    <div class="mb-8">
                        <p class="text-zinc-600 text-sm leading-relaxed italic text-center">"${app.desc}"</p>
                    </div>

                    <div class="flex flex-col items-center gap-4">
                        <button class="btn-initiate" style="background:${app.color || '#1a1a1a'}">Apply Now</button>
                        ${isAdmin ? `
                            <div class="flex gap-4">
                                <span onclick="editApp(${i})" class="cursor-pointer text-zinc-400 hover:text-black text-[9px] uppercase tracking-tighter">Edit</span>
                                <span onclick="deleteApp(${i})" class="cursor-pointer text-zinc-400 hover:text-red-700 text-[9px] uppercase tracking-tighter">Redact</span>
                            </div>
                        ` : ''}
                    </div>
                `;
                grid.appendChild(scroll);
            });
        }

        function openEditor() {
            document.getElementById('edit-index').value = "-1";
            document.getElementById('admin-editor').classList.add('open');
        }

        function closeEditor() { document.getElementById('admin-editor').classList.remove('open'); }

        function editApp(index) {
            const app = apps[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('edit-title').value = app.title;
            document.getElementById('edit-desc').value = app.desc;
            document.getElementById('edit-icon').value = app.icon || 'seal';
            document.getElementById('edit-color').value = app.color || "#bc2f32";
            document.getElementById('admin-editor').classList.add('open');
        }

        function saveApp() {
            const idx = parseInt(document.getElementById('edit-index').value);
            const newData = {
                title: document.getElementById('edit-title').value,
                desc: document.getElementById('edit-desc').value,
                icon: document.getElementById('edit-icon').value,
                color: document.getElementById('edit-color').value
            };

            if(idx === -1) apps.push(newData);
            else apps[idx] = newData;

            navigator.clipboard.writeText(JSON.stringify(apps, null, 2)).then(() => {
                alert("Archive Copied! Paste into jobsdata.json");
            });
            renderApps(currentAdmin);
            closeEditor();
        }

        function deleteApp(i) {
            if(confirm("Redact?")) {
                apps.splice(i, 1);
                navigator.clipboard.writeText(JSON.stringify(apps, null, 2));
                renderApps(currentAdmin);
            }
        }

        window.addEventListener('load', loadArchive);
    </script>
    <script src="/dprt/styling/auth.js"></script>
</body>
</html>
