<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fcfcfc;
            /* Simple Sumi-e inspired texture */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0,0,0,0.02) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,0,0,0.03) 0%, transparent 40%);
            font-family: "Georgia", serif;
            color: #1a1a1a;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 10px;
            font-weight: 900;
            /* Brush stroke feel */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BOO</h1>
        <p>This page is under maintenance</p>
    </div>

</body>
</html>
