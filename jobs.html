<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Applications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --dprt-bronze: #b8860b; --dprt-ink: #0a0a0c; }
        body {
            background: #0a0a0c;
            color: #e0e0e0; font-family: 'Inter', sans-serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        /* Performance Fix: Static Grain instead of heavy CSS gradients */
        .bg-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, #1a1a1c 0%, #0a0a0c 100%);
            z-index: -1;
        }

        /* Hardware Accelerated Embers */
        .ember {
            position: absolute; background: var(--dprt-bronze); border-radius: 50%; opacity: 0;
            pointer-events: none; z-index: 1; will-change: transform;
            animation: rise 12s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translate3d(0, 105vh, 0) scale(0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translate3d(0, -10vh, 0) scale(1.2); opacity: 0; }
        }

        /* Drag and Drop Styling */
        .job-card {
            background: rgba(20, 20, 22, 0.8);
            border: 1px solid rgba(184, 134, 11, 0.15);
            padding: 25px 35px;
            display: flex; align-items: center; justify-content: space-between;
            transition: transform 0.3s cubic-bezier(0.2, 1, 0.2, 1), box-shadow 0.3s, border-color 0.3s;
            cursor: default;
        }
        
        .draggable { cursor: grab; }
        .draggable:active { cursor: grabbing; }
        
        /* Dragging Animation States */
        .dragging {
            opacity: 0.5;
            transform: scale(0.98);
            border: 1px dashed var(--dprt-bronze);
        }

        .job-card.over {
            border-top: 4px solid var(--dprt-bronze);
            transform: translateY(5px);
        }

        .btn-delete {
            color: #ff4444; opacity: 0.5; transition: 0.3s;
            font-size: 10px; font-weight: 900; text-transform: uppercase;
        }
        .btn-delete:hover { opacity: 1; text-shadow: 0 0 10px #ff4444; }

        .chinese-font { font-family: 'Noto Serif SC', serif; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div id="embers-container"></div>
    <div id="header-placeholder"></div>

    <div id="blur-container">
        <main class="max-w-6xl mx-auto px-10 py-20">
            <div class="mb-16 border-l-4 border-[#b8860b] pl-8">
                <h1 class="text-6xl font-black italic uppercase tracking-tighter text-white">Community Applications</h1>
                <p class="text-zinc-500 text-lg mt-4">Database of active deployments and state roles.</p>
            </div>

            <div id="job-list" class="flex flex-col gap-4"></div>

            <button id="admin-add-trigger" onclick="openEditor()" class="hidden w-full mt-10 border border-dashed border-[#b8860b]/30 py-6 text-zinc-500 hover:border-[#b8860b] hover:text-[#b8860b] transition-all font-black uppercase text-xs">
                + Authorize New Entry
            </button>
        </main>
    </div>

    <div id="admin-editor" class="fixed inset-0 bg-black/90 z-[1000] hidden items-center justify-center backdrop-blur-md" onclick="if(event.target == this) closeEditor()">
        <div class="bg-[#0e0e10] border border-[#b8860b] p-8 w-full max-w-md">
            <h2 class="text-white font-black uppercase mb-6 italic text-xl border-b border-zinc-800 pb-2">Configuration</h2>
            <div class="space-y-4">
                <input type="text" id="edit-title" placeholder="Title" class="w-full bg-black border border-zinc-800 p-3 text-white">
                <textarea id="edit-desc" placeholder="Directives" class="w-full bg-black border border-zinc-800 p-3 text-white h-24"></textarea>
                <div class="flex items-center space-x-2">
                    <input type="checkbox" id="edit-locked" class="accent-[#b8860b]">
                    <label class="text-xs uppercase font-bold text-zinc-400">Lock App</label>
                </div>
                <div class="flex space-x-2">
                    <button onclick="saveApp()" class="flex-1 bg-[#b8860b] text-black font-black py-3 uppercase text-[10px]">Update</button>
                    <button onclick="closeEditor()" class="flex-1 bg-zinc-900 text-white font-black py-3 uppercase text-[10px]">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GUILD_ID = '1255926408312655963';
        const ROLE_IDS = { 'OWNER': '1255927538367332423', 'COUNCIL': '1256196665199558726' };

        let apps = JSON.parse(localStorage.getItem('dprt_apps')) || [
            { title: "Kettlenauts", desc: "Heavy siege infantry.", locked: false },
            { title: "Teaian Recons", desc: "Intelligence and elimination.", locked: true }
        ];

        async function loadHeader() {
            const resp = await fetch('header.html');
            document.getElementById('header-placeholder').innerHTML = await resp.text();
            initAuth();
        }

        function initAuth() {
            const user = JSON.parse(localStorage.getItem('dprt_user'));
            let isAdmin = false;
            if (user) {
                // ... (existing logic to hide login-btn and show user-display) ...
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-display').classList.remove('hidden');
                document.getElementById('nav-username').innerText = user.username;
                document.getElementById('nav-pfp').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;

                if (user.roles.includes(ROLE_IDS.OWNER) || user.roles.includes(ROLE_IDS.COUNCIL)) isAdmin = true;
                if (isAdmin) document.getElementById('admin-add-trigger').classList.remove('hidden');
            }
            renderApps(isAdmin);
        }

        function renderApps(isAdmin) {
            const list = document.getElementById('job-list');
            list.innerHTML = '';

            apps.forEach((app, index) => {
                const card = document.createElement('div');
                card.className = `job-card ${isAdmin ? 'draggable' : ''} ${app.locked ? 'locked' : ''}`;
                if (isAdmin) {
                    card.draggable = true;
                    card.dataset.index = index;
                    addDragListeners(card);
                }

                card.innerHTML = `
                    <div class="flex-1">
                        <h3 class="text-2xl font-black uppercase italic text-white">${app.title}</h3>
                        <p class="text-zinc-500 text-sm mt-1">${app.desc}</p>
                    </div>
                    <div class="flex items-center space-x-6">
                        ${isAdmin ? `
                            <button onclick="deleteApp(${index})" class="btn-delete">Delete</button>
                            <button onclick="openEditor(${index})" class="text-[10px] font-black uppercase text-zinc-500 hover:text-white">Edit</button>
                        ` : ''}
                        <button class="px-6 py-2 text-[10px] font-black uppercase tracking-widest ${app.locked ? 'bg-zinc-800 text-zinc-500' : 'bg-[#b8860b] text-black'}">
                            ${app.locked ? 'Locked' : 'Enlist'}
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // --- DRAG & DROP LOGIC ---
        let dragSourceEl = null;

        function addDragListeners(el) {
            el.addEventListener('dragstart', e => {
                dragSourceEl = el;
                el.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            el.addEventListener('dragover', e => {
                if (e.preventDefault) e.preventDefault();
                el.classList.add('over');
                return false;
            });
            el.addEventListener('dragleave', () => el.classList.remove('over'));
            el.addEventListener('drop', e => {
                if (e.stopPropagation) e.stopPropagation();
                if (dragSourceEl !== el) {
                    const fromIdx = parseInt(dragSourceEl.dataset.index);
                    const toIdx = parseInt(el.dataset.index);
                    
                    // Reorder Array
                    const item = apps.splice(fromIdx, 1)[0];
                    apps.splice(toIdx, 0, item);
                    
                    localStorage.setItem('dprt_apps', JSON.stringify(apps));
                    renderApps(true); // Re-render with admin tools
                }
                return false;
            });
            el.addEventListener('dragend', () => {
                document.querySelectorAll('.job-card').forEach(c => c.classList.remove('over', 'dragging'));
            });
        }

        function deleteApp(index) {
            if(confirm("Confirm deletion from State Database?")) {
                apps.splice(index, 1);
                localStorage.setItem('dprt_apps', JSON.stringify(apps));
                renderApps(true);
            }
        }

        // ... (Include existing openEditor, closeEditor, saveApp functions here) ...
        function openEditor(index = null) {
            currentEditingIndex = index;
            if (index !== null) {
                document.getElementById('edit-title').value = apps[index].title;
                document.getElementById('edit-desc').value = apps[index].desc;
                document.getElementById('edit-locked').checked = apps[index].locked;
            } else {
                document.getElementById('edit-title').value = '';
                document.getElementById('edit-desc').value = '';
                document.getElementById('edit-locked').checked = false;
            }
            document.getElementById('admin-editor').style.display = 'flex';
        }
        function closeEditor() { document.getElementById('admin-editor').style.display = 'none'; }
        function saveApp() {
            const newData = {
                title: document.getElementById('edit-title').value,
                desc: document.getElementById('edit-desc').value,
                locked: document.getElementById('edit-locked').checked
            };
            if (currentEditingIndex !== null) apps[currentEditingIndex] = newData;
            else apps.push(newData);
            localStorage.setItem('dprt_apps', JSON.stringify(apps));
            location.reload();
        }

        // Embers
        const embers = document.getElementById('embers-container');
        for (let i = 0; i < 15; i++) {
            const e = document.createElement('div');
            e.className = 'ember';
            e.style.left = Math.random() * 100 + '%';
            e.style.width = e.style.height = (Math.random() * 3 + 1) + 'px';
            e.style.animationDelay = Math.random() * 10 + 's';
            embers.appendChild(e);
        }

        window.onload = loadHeader;
    </script>
</body>
</html>
