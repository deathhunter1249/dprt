<style>
    :root {
        --ink: #1a1a1a;
        --cinnabar: #bc2f32;
    }

    /* GPU Optimization */
    #global-overlay, #profile-menu {
        will-change: opacity, transform;
        backface-visibility: hidden;
    }

    .ink-header {
        background-color: #f4f1ea;
        background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
        border-bottom: 2px solid var(--ink);
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .nav-btn { 
        position: relative;
        font-family: 'Noto Serif SC', serif;
        font-size: 14px; 
        font-weight: 700; 
        text-transform: uppercase; 
        letter-spacing: 0.15em; 
        color: var(--ink); 
        transition: all 0.3s ease; 
        padding: 8px 0;
        opacity: 0.8;
    }

    .nav-btn::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--cinnabar);
        transition: width 0.3s ease;
    }

    .nav-btn:hover, .nav-btn.active-page { 
        color: var(--cinnabar); 
        opacity: 1;
    }

    .nav-btn:hover::after, .nav-btn.active-page::after {
        width: 100%;
    }

    .btn-verify { 
        border: 2px solid var(--cinnabar); 
        color: var(--cinnabar); 
        padding: 6px 18px; 
        font-family: 'Noto Serif SC', serif;
        font-size: 11px; 
        font-weight: 900;
        text-transform: uppercase; 
        transition: all 0.3s ease; 
    }

    .btn-verify:hover { 
        background: var(--cinnabar); 
        color: #fff; 
        box-shadow: 3px 3px 0px var(--ink);
    }

    #nav-username { color: var(--ink); font-family: 'Noto Serif SC', serif; font-size: 13px; font-weight: 900; }
    #nav-rank { color: var(--cinnabar); letter-spacing: 0.1em; font-weight: 700; }
    
    #nav-pfp { border: 2px solid var(--ink); transition: transform 0.2s ease; }

    #global-overlay { background: rgba(0, 0, 0, 0.4); }

    #profile-menu {
        background: #f4f1ea;
        background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
        border: 3px solid var(--ink);
    }
</style>

<div id="global-overlay" class="fixed inset-0 z-[80] opacity-0 pointer-events-none transition-opacity duration-300" onclick="toggleMenu(false)"></div>

<header class="relative z-[101] ink-header">
    <nav class="flex items-center justify-between px-8 py-4 max-w-7xl mx-auto">
        <div class="flex items-center cursor-pointer group" onclick="window.location.href='/dprt/'">
            <div class="w-10 h-10 border-2 border-black flex items-center justify-center bg-black">
                <span class="text-[#f4f1ea] text-2xl font-black">茶</span>
            </div>
            <div class="flex flex-col leading-none ml-3">
                <span class="text-2xl font-black tracking-tighter text-black" style="font-family: 'Ma Shan Zheng', cursive;">DPRT</span>
                <span class="text-[8px] uppercase tracking-[0.4em] text-[#bc2f32] font-black mt-1">Sovereign State</span>
            </div>
        </div>

        <div class="hidden lg:flex items-center space-x-10">
            <a href="/dprt/" class="nav-btn" id="nav-home">Home</a>
            <a href="/dprt/info/" class="nav-btn" id="nav-info">Info</a>
            <a href="/dprt/jobs/" class="nav-btn" id="nav-jobs">Jobs</a>
            <a href="https://discord.gg/KBNqanJDfa" target="_blank" class="nav-btn">Group</a>
            <a href="/dprt/wiki/home/" class="nav-btn" id="nav-wiki">Wiki</a>
        </div>

        <div class="relative flex items-center justify-end min-w-[180px]">
            <button id="login-btn" onclick="login()" class="btn-verify">Log In</button>
            
            <div id="user-display" class="hidden flex items-center space-x-4">
                <div class="text-right hidden sm:block leading-tight">
                    <p id="nav-username" class="uppercase">Citizen</p>
                    <p id="nav-rank" class="text-[8px] font-black uppercase tracking-[0.2em] opacity-80">Authenticated</p>
                </div>
                <div class="relative">
                    <img id="nav-pfp" src="" class="w-11 h-11 cursor-pointer hover:scale-105 active:scale-95 shadow-sm" onclick="toggleMenu(true)">
                </div>
            </div>

            <div id="profile-menu" class="absolute top-[75px] right-0 w-[240px] z-[110] transform -translate-y-2 opacity-0 pointer-events-none transition-all duration-200 ease-out shadow-2xl p-4">
                <p id="menu-user-name" class="font-black text-black uppercase text-lg leading-none">Citizen</p>
                <p id="menu-user-rank" class="text-[8px] text-[#bc2f32] tracking-[0.2em] font-black uppercase mt-1 mb-4">Imperial Subject</p>
                
                <div class="border-t border-black/10 pt-2">
                    <div class="hover:bg-black hover:text-white p-3 cursor-pointer text-[11px] font-bold uppercase" onclick="window.location.href='/dprt/settings/'">Settings</div>
                    <button onclick="logout()" class="w-full mt-2 py-2 border-2 border-black text-black hover:bg-black hover:text-white text-[9px] font-black uppercase tracking-[0.2em]">Log Out</button>
                </div>
            </div>
        </div>
    </nav>
</header>
