<style>
    /* 1. Base Styles & Animations */
    .nav-btn { 
        position: relative;
        font-size: 17px; 
        font-weight: 700; 
        text-transform: uppercase; 
        letter-spacing: 0.15em; 
        color: #a0a0a0; 
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        cursor: pointer;
        padding: 4px 0;
        text-decoration: none;
    }

    .nav-btn::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 0;
        height: 2px;
        background: #b8860b;
        box-shadow: 0 0 10px #b8860b;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        transform: translateX(-50%);
    }

    /* Active & Hover state */
    .nav-btn:hover, .nav-btn.active-page { 
        color: #fff; 
        letter-spacing: 0.3em; 
        transform: translateY(-1px);
    }

    .nav-btn:hover::after, .nav-btn.active-page::after {
        width: 100%;
    }

    .menu-item { 
        position: relative;
        padding: 16px 20px; 
        border-bottom: 1px solid rgba(184, 134, 11, 0.1); 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        cursor: pointer; 
        font-size: 11px; 
        color: #888; 
        text-transform: uppercase;
        font-weight: 700;
        transition: all 0.3s ease; 
        overflow: hidden;
    }

    .menu-item:hover { 
        background: rgba(184, 134, 11, 0.08); 
        color: #fff; 
        padding-left: 28px;
    }

    .menu-item::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0;
        background: #b8860b;
        transition: 0.3s ease;
    }

    .menu-item:hover::before { width: 4px; }

    .btn-verify { 
        border: 1px solid #b8860b; 
        color: #b8860b; 
        padding: 10px 24px; 
        font-size: 10px; 
        font-weight: 900; 
        text-transform: uppercase; 
        letter-spacing: 0.3em; 
        transition: 0.4s; 
        background: transparent; 
        cursor: pointer; 
    }

    .btn-verify:hover { 
        background: #b8860b; 
        color: black; 
        box-shadow: 0 0 25px rgba(184, 134, 11, 0.5);
        transform: scale(1.05);
    }

    .chinese-font { font-family: 'Noto Serif SC', serif; }

    /* Performance Fix for Lag */
    #global-overlay {
        will-change: opacity;
    }
    
    .notif-badge {
        background: #b8860b;
        color: black;
        padding: 2px 6px;
        font-size: 9px;
        border-radius: 2px;
    }
</style>

<div id="global-overlay" class="fixed inset-0 bg-black/60 z-[80] opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-[2px]" onclick="toggleMenu(false)"></div>

<header class="relative z-[101] border-b border-white/5 bg-black/40 backdrop-blur-md">
    <nav class="flex items-center justify-between px-10 py-5 max-w-7xl mx-auto">
        
        <div class="flex items-center space-x-5 cursor-pointer group" onclick="window.location.href='/dprt/'">
            <div class="w-11 h-11 border border-[#b8860b] flex items-center justify-center bg-[#b8860b] group-hover:shadow-[0_0_15px_rgba(184,134,11,0.5)] transition-all">
                <span class="text-black text-2xl chinese-font font-black">茶</span>
            </div>
            <div class="flex flex-col leading-none">
                <span class="text-3xl font-black tracking-widest text-white">DPRT</span>
                <span class="text-[9px] uppercase tracking-[0.4em] text-[#b8860b] font-bold mt-1 opacity-80">Teapotian State</span>
            </div>
        </div>

        <div class="hidden lg:flex items-center space-x-10">
            <a href="/dprt/" class="nav-btn" id="nav-home">Home</a>
            <a href="/dprt/info/" class="nav-btn" id="nav-info">Info</a>
            <a href="/dprt/jobs/" class="nav-btn" id="nav-jobs">Jobs</a>
            <a href="https://discord.gg/KBNqanJDfa" target="_blank" class="nav-btn">Group</a>
            <a href="https://republicofteapots.miraheze.org/" target="_blank" class="nav-btn">Wiki</a>
        </div>

        <div class="relative flex items-center justify-end min-w-[150px]">
            <button id="login-btn" onclick="login()" class="btn-verify">Log In</button>
            
            <div id="user-display" class="hidden flex items-center space-x-4">
                <div class="text-right hidden sm:block">
                    <p id="nav-username" class="text-white text-[11px] font-black uppercase italic tracking-wider">Citizen</p>
                    <p id="nav-rank" class="text-[#b8860b] text-[9px] font-bold uppercase tracking-[0.2em] opacity-80 italic">Verifying...</p>
                </div>
                <div class="relative group">
                    <img id="nav-pfp" src="" class="w-11 h-11 border border-[#b8860b]/50 hover:border-[#b8860b] rounded-sm cursor-pointer transition-all active:scale-95 shadow-[0_0_10px_rgba(0,0,0,0.5)]" onclick="toggleMenu(true)">
                    <div class="absolute -top-1 -right-1 w-3 h-3 bg-[#b8860b] border-2 border-[#0a0a0c] rounded-full animate-pulse"></div>
                </div>
            </div>

            <div id="profile-menu" class="absolute top-[75px] right-0 w-[280px] bg-[#0c0c0e] border border-[#b8860b]/30 z-[110] transform -translate-y-4 opacity-0 pointer-events-none transition-all duration-300 ease-out shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                <div class="p-6 border-b border-[#b8860b]/20 bg-gradient-to-b from-[#b8860b]/10 to-transparent">
                    <p id="menu-user-name" class="font-black text-white uppercase italic text-lg tracking-tighter leading-none">Citizen</p>
                    <p id="menu-user-rank" class="text-[9px] text-[#b8860b] tracking-[0.3em] font-black uppercase mt-1">Verifying Rank</p>
                </div>
                
                <div class="menu-item group" onclick="alert('Directive: Maintain the Eternal Brew.')">
                    <span>Notifications</span>
                    <span id="notif-count" class="notif-badge">67</span>
                </div>
                
                <div class="menu-item group" onclick="window.location.href='/dprt/settings/'">
                    <span>Settings</span>
                </div>
                
                <div class="p-4 bg-black/20">
                    <button onclick="logout()" class="w-full py-3 border border-red-900/30 text-red-500 hover:bg-red-500/10 text-[10px] font-black uppercase tracking-[0.3em] transition-all">
                        Log Out
                    </button>
                </div>
            </div>
        </div>
    </nav>
</header>

<script>
    const CLIENT_ID = '1323365609777528962';

    // Toggle Menu Function
    function toggleMenu(open) {
        const menu = document.getElementById('profile-menu');
        const overlay = document.getElementById('global-overlay');
        if (open) {
            menu.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4');
            overlay.classList.remove('opacity-0', 'pointer-events-none');
        } else {
            menu.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4');
            overlay.classList.add('opacity-0', 'pointer-events-none');
        }
    }

    function login() {
        const redirect = encodeURIComponent(window.location.origin + '/dprt/');
        window.location.href = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${redirect}&scope=identify`;
    }

    function logout() {
        localStorage.removeItem('discord_access_token');
        window.location.reload();
    }

async function initAuth() {
    console.log("🔍 initAuth started");
    
    const fragment = new URLSearchParams(window.location.hash.slice(1));
    let token = fragment.get('access_token') || localStorage.getItem('discord_access_token');
    
    console.log("🔑 Token found:", token ? "YES" : "NO");
    
    if (fragment.get('access_token')) {
        localStorage.setItem('discord_access_token', token);
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    if (!token) {
        console.log("❌ No token, stopping auth");
        return;
    }

    try {
        console.log("📡 Fetching user data from Discord...");
        const response = await fetch('https://discord.com/api/users/@me', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        console.log("📊 Response status:", response.status);
        
        if (!response.ok) throw new Error("Invalid Token");
        const user = await response.json();
        
        console.log("👤 User data received:", user);
        console.log("🆔 User ID:", user.id);
        console.log("👤 Username:", user.username);

        // 1. Map the Elements
        const navName = document.getElementById('nav-username');
        const menuName = document.getElementById('menu-user-name');
        const navRank = document.getElementById('nav-rank');
        const menuRank = document.getElementById('menu-user-rank');
        const navPfp = document.getElementById('nav-pfp');

        console.log("🎯 Elements found:", {
            navName: !!navName,
            menuName: !!menuName,
            navRank: !!navRank,
            menuRank: !!menuRank,
            navPfp: !!navPfp
        });

        // 2. Update Basic Profile
        if(navName) {
            navName.innerText = user.username;
            console.log("✅ Updated navName to:", user.username);
        }
        if(menuName) {
            menuName.innerText = user.username;
            console.log("✅ Updated menuName to:", user.username);
        }
        if(navPfp) {
            navPfp.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            console.log("✅ Updated avatar");
        }

        // 3. Set Default Rank
        if(navRank) {
            navRank.innerText = "Teapotian Citizen";
            console.log("✅ Set default navRank");
        }
        if(menuRank) {
            menuRank.innerText = "Verified Citizen";
            console.log("✅ Set default menuRank");
        }

        // 4. Admin Rank Overwrite
        console.log("🔐 Checking admin status...");
        if (user.id === '735531512124145674' || user.username === 'deathhunter1249') {
            console.log("⭐ ADMIN DETECTED!");
            if(navRank) navRank.innerText = "Supreme Brewer";
            if(menuRank) menuRank.innerText = "Overseer / Admin";
            
            // Show Admin UI if on the jobs page
            const adminTrigger = document.getElementById('admin-add-trigger');
            if (adminTrigger) {
                adminTrigger.classList.remove('hidden');
                console.log("✅ Admin UI shown");
            }
        } else {
            console.log("❌ Not admin. User ID:", user.id);
        }

        // 5. Toggle Visibility
        const loginBtn = document.getElementById('login-btn');
        const userDisplay = document.getElementById('user-display');
        
        if(loginBtn) {
            loginBtn.classList.add('hidden');
            console.log("✅ Hidden login button");
        }
        if(userDisplay) {
            userDisplay.classList.remove('hidden');
            console.log("✅ Shown user display");
        }

        // 6. Trigger Job Grid if on Jobs Page
        if (typeof renderApps === "function") {
            const isAdmin = (user.id === '735531512124145674' || user.username === 'deathhunter1249');
            console.log("📋 Rendering apps, isAdmin:", isAdmin);
            renderApps(isAdmin);
        }

    } catch (err) {
        console.error("❌ Auth failed:", err);
        localStorage.removeItem('discord_access_token');
    }
}

// Run auth immediately
initAuth();
</script>
