<style>
    /* 1. Base Styles & Animations */
    .nav-btn { 
        position: relative;
        font-size: 17px; 
        font-weight: 700; 
        text-transform: uppercase; 
        letter-spacing: 0.15em; 
        color: #a0a0a0; 
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        cursor: pointer;
        padding: 4px 0;
    }

    .nav-btn::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 0;
        height: 2px;
        background: #b8860b;
        box-shadow: 0 0 10px #b8860b;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        transform: translateX(-50%);
    }

    /* Active & Hover state */
    .nav-btn:hover, .nav-btn.active-page { 
        color: #fff; 
        letter-spacing: 0.3em; 
        transform: translateY(-1px);
    }

    .nav-btn:hover::after, .nav-btn.active-page::after {
        width: 100%;
    }

    .menu-item { 
        position: relative;
        padding: 16px 20px; 
        border-bottom: 1px solid rgba(184, 134, 11, 0.1); 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        cursor: pointer; 
        font-size: 11px; 
        color: #888; 
        text-transform: uppercase;
        font-weight: 700;
        transition: all 0.3s ease; 
        overflow: hidden;
    }

    .menu-item:hover { 
        background: rgba(184, 134, 11, 0.08); 
        color: #fff; 
        padding-left: 28px;
    }

    .menu-item::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0;
        background: #b8860b;
        transition: 0.3s ease;
    }

    .menu-item:hover::before { width: 4px; }

    .btn-verify { 
        border: 1px solid #b8860b; 
        color: #b8860b; 
        padding: 10px 24px; 
        font-size: 10px; 
        font-weight: 900; 
        text-transform: uppercase; 
        letter-spacing: 0.3em; 
        transition: 0.4s; 
        background: transparent; 
        cursor: pointer; 
    }

    .btn-verify:hover { 
        background: #b8860b; 
        color: black; 
        box-shadow: 0 0 25px rgba(184, 134, 11, 0.5);
        transform: scale(1.05);
    }

    .chinese-font { font-family: 'Noto Serif SC', serif; }

    /* Performance Fix for Lag */
    #global-overlay {
        will-change: opacity;
    }
</style>

<div id="global-overlay" class="fixed inset-0 bg-black/60 z-[80] opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-[2px]" onclick="toggleMenu(false)"></div>

<header class="relative z-[101] border-b border-white/5 bg-black/40 backdrop-blur-md">
    <nav class="flex items-center justify-between px-10 py-5 max-w-7xl mx-auto">
        
        <div class="flex items-center space-x-5 cursor-pointer group" onclick="window.location.href='/dprt/home/'">
            <div class="w-11 h-11 border border-[#b8860b] flex items-center justify-center bg-[#b8860b] group-hover:shadow-[0_0_15px_rgba(184,134,11,0.5)] transition-all">
                <span class="text-black text-2xl chinese-font font-black">茶</span>
            </div>
            <div class="flex flex-col leading-none">
                <span class="text-3xl font-black tracking-widest text-white">DPRT</span>
                <span class="text-[9px] uppercase tracking-[0.4em] text-[#b8860b] font-bold mt-1 opacity-80">Teapotian State</span>
            </div>
        </div>

        <div class="hidden lg:flex items-center space-x-7">
            <a href="/dprt/home" class="nav-btn" id="nav-home">Home</a>
            <a href="/dprt/info" class="nav-btn" id="nav-info">Info</a>
            <a href="/dprt/jobs" class="nav-btn" id="nav-jobs">Jobs</a>
            <a href="https://discord.gg/KBNqanJDfa" target="_blank" class="nav-btn">Group</a>
            <a href="https://republicofteapots.miraheze.org/" target="_blank" class="nav-btn">Wiki</a>
        </div>

        <div class="relative flex items-center justify-end min-w-[150px]">
            <button id="login-btn" onclick="login()" class="btn-verify">Log In</button>
            
            <div id="user-display" class="hidden flex items-center space-x-4">
                <div class="text-right hidden sm:block">
                    <p id="nav-username" class="text-white text-[11px] font-black uppercase italic tracking-wider">Citizen</p>
                    <p id="nav-rank" class="text-[#b8860b] text-[9px] font-bold uppercase tracking-[0.2em] opacity-80 italic">Verifying...</p>
                </div>
                <div class="relative group">
                    <img id="nav-pfp" src="" class="w-11 h-11 border border-[#b8860b]/50 hover:border-[#b8860b] rounded-sm cursor-pointer transition-all active:scale-95 shadow-[0_0_10px_rgba(0,0,0,0.5)]" onclick="toggleMenu(true)">
                    <div class="absolute -top-1 -right-1 w-3 h-3 bg-[#b8860b] border-2 border-[#0a0a0c] rounded-full animate-pulse"></div>
                </div>
            </div>

            <div id="profile-menu" class="absolute top-[75px] right-0 w-[280px] bg-[#0c0c0e] border border-[#b8860b]/30 z-[110] transform -translate-y-4 opacity-0 pointer-events-none transition-all duration-300 ease-out shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                <div class="p-6 border-b border-[#b8860b]/20 bg-gradient-to-b from-[#b8860b]/10 to-transparent">
                    <p id="menu-user-name" class="font-black text-white uppercase italic text-lg tracking-tighter leading-none">Citizen</p>
                    <p id="menu-user-rank" class="text-[9px] text-[#b8860b] tracking-[0.3em] font-black uppercase mt-1">Verifying Rank</p>
                </div>
                
                <div class="menu-item group" onclick="alert('Directive: Maintain the Eternal Brew.')">
                    <span>Notifications</span>
                    <span id="notif-count" class="notif-badge">0</span>
                </div>
                
                <div class="menu-item group" onclick="window.location.href='/dprt/settings'">
                    <span>Citizen Settings</span>
                </div>
                
                <div class="p-4 bg-black/20">
                    <button onclick="logout()" class="w-full py-3 border border-red-900/30 text-red-500 hover:bg-red-500/10 text-[10px] font-black uppercase tracking-[0.3em] transition-all">
                        Log Out
                    </button>
                </div>
            </div>
        </div>
    </nav>
</header>

<script>
    // --- Configuration ---
    const CLIENT_ID = '1323365609777528962';

    function login() {
        const currentUrl = window.location.origin + window.location.pathname.replace(/\/$/, "");
        const redirectUri = encodeURIComponent(currentUrl);
        const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${redirectUri}&response_type=token&scope=identify%20guilds.members.read`;
        window.location.href = authUrl;
    }

    function logout() {
        localStorage.removeItem('discord_access_token');
        window.location.href = '/dprt/home';
    }

    function toggleMenu(show) {
        const menu = document.getElementById('profile-menu');
        const overlay = document.getElementById('global-overlay');
        if (show) {
            menu.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4');
            overlay.classList.remove('opacity-0', 'pointer-events-none');
        } else {
            menu.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4');
            overlay.classList.add('opacity-0', 'pointer-events-none');
        }
    }

    function highlightNav() {
        const path = window.location.pathname;
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-page'));

        if (path.includes('home')) document.getElementById('nav-home')?.classList.add('active-page');
        if (path.includes('info')) document.getElementById('nav-info')?.classList.add('active-page');
        if (path.includes('jobs')) document.getElementById('nav-jobs')?.classList.add('active-page');
    }

    // --- Main Logic ---
    window.addEventListener('DOMContentLoaded', async () => {
        highlightNav();
        
        // 1. Get Token from URL or LocalStorage
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        let token = fragment.get('access_token');
        
        if (token) {
            localStorage.setItem('discord_access_token', token);
            window.location.hash = ""; // Clean URL
        } else {
            token = localStorage.getItem('discord_access_token');
        }

        // 2. Fetch User Data if Token exists
        if (token) {
            try {
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('Unauthorized');
                }

                const user = await response.json();

                // Update UI Elements
                document.getElementById('nav-username').innerText = user.username;
                document.getElementById('menu-user-name').innerText = user.username;
                
                if (user.avatar) {
                    document.getElementById('nav-pfp').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                } else {
                    document.getElementById('nav-pfp').src = `https://cdn.discordapp.com/embed/avatars/0.png`;
                }

                document.getElementById('nav-rank').innerText = "Teapotian Citizen";
                document.getElementById('menu-user-rank').innerText = "Verified Resident";

                // Show user UI
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-display').classList.remove('hidden');

            } catch (err) {
                console.error("Auth session expired:", err);
                localStorage.removeItem('discord_access_token');
                document.getElementById('login-btn').classList.remove('hidden');
                document.getElementById('user-display').classList.add('hidden');
            }
        }
    });
</script>
