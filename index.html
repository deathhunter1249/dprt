<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Republic of Teapots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
        }

        /* Prevent the annoying horizontal scroll/shake */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
            background-color: var(--paper);
        }

        body {
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* 1. BACKGROUND ELEMENTS */
        .bg-watermark {
            position: fixed; top: 50%; right: -5%; transform: translateY(-50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 50rem; color: rgba(0, 0, 0, 0.03);
            pointer-events: none; z-index: 0; line-height: 0.8; user-select: none;
        }

        .cinnabar-glow {
            position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(188, 47, 50, 0.04) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* 2. REVEAL ANIMATIONS */
        .reveal-node { 
            opacity: 0; transform: translateY(15px); 
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .reveal-active { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.2s; }
        .delay-2 { transition-delay: 0.5s; }
        .delay-3 { transition-delay: 0.8s; }

        /* 3. FIXED INK DROPS (No more scrollbars) */
        #ink-container { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            pointer-events: none; z-index: 1; overflow: hidden; 
        }
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            filter: blur(1px); animation: fall 12s infinite linear;
        }
        @keyframes fall {
            0% { transform: translate3d(0, -5vh, 0) scale(0); opacity: 0; }
            20% { opacity: 0.15; }
            100% { transform: translate3d(10vw, 105vh, 0) scale(1.5); opacity: 0; }
        }

        /* 4. TYPOGRAPHY - Scaled down for "Smaller" feel */
        .hero-title { 
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(3.5rem, 10vw, 7.5rem); /* Reduced size */
            line-height: 0.9;
            letter-spacing: -0.04em;
        }

        .accent-stamp {
            writing-mode: vertical-rl;
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 1.4rem;
            color: var(--cinnabar);
            border-right: 2px solid var(--cinnabar);
            padding-right: 1rem;
            margin-right: 2.5rem;
            opacity: 0.8;
            letter-spacing: 0.15em;
        }

        /* 5. SEAL BUTTONS */
        .btn-seal {
            padding: 0.8rem 2.2rem;
            font-family: 'Noto Serif SC', serif;
            font-weight: 900;
            font-size: 1rem;
            color: var(--ink);
            border: 2px solid var(--ink);
            transition: all 0.3s ease;
            background: transparent;
        }
        .btn-seal:hover {
            background-color: var(--cinnabar);
            border-color: var(--cinnabar);
            color: white;
            transform: translateY(-3px);
        }
    </style>
</head>
<body id="blur-container">
    <div id="header-placeholder" class="relative z-[100]"></div>

    <div class="bg-watermark">龍</div>
    <div class="cinnabar-glow"></div>
    <div id="ink-container"></div>
    
    <div class="flex-grow flex flex-col justify-center relative z-10">
        <main class="max-w-6xl mx-auto px-12 py-12 w-full"> <div class="flex items-start">
                <div class="reveal-node delay-1 accent-stamp">
                    君子不憂不懼 — ETERNAL PEACE
                </div>

                <div class="content-wrapper">
                    <div class="reveal-node delay-1 mb-6">
                        <span class="bg-zinc-900 text-white px-4 py-1.5 text-[10px] tracking-[0.6em] font-bold uppercase">
                            State Directive 1970
                        </span>
                    </div>

                    <div class="reveal-node delay-2">
                        <h1 class="hero-title text-zinc-900 mb-8">
                            ORDER IN <br>
                            <span class="text-[#bc2f32]">EVERY DROP</span>
                        </h1>
                    </div>

                    <div class="reveal-node delay-3">
                        <p class="text-zinc-600 text-xl font-serif max-w-xl leading-relaxed italic border-l-4 border-[#bc2f32] pl-8 mb-12">
                            The Republic is a scroll yet to be written. 
                            Loyalty is the ink; tranquility is the result.
                        </p>
                        
                        <div class="flex gap-6">
                            <button onclick="window.location.href='/dprt/jobs/'" class="btn-seal">
                                VIEW APPLICATIONS
                            </button>
                            <button class="btn-seal" style="opacity: 0.5; border-style: dashed;">
                                PROTOCOL
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/dprt/styling/auth.js"></script>

    <script>
        // Trigger reveal animations
        window.addEventListener('load', () => {
            const nodes = document.querySelectorAll('.reveal-node');
            setTimeout(() => {
                nodes.forEach(node => node.classList.add('reveal-active'));
            }, 150);
        });

        // Fixed Ink Drop Generation
        const inkContainer = document.getElementById('ink-container');
        const dropCount = 12; // Fewer drops for a cleaner look
        
        for (let i = 0; i < dropCount; i++) {
            const drop = document.createElement('div');
            drop.className = 'ink-drop';
            drop.style.left = Math.random() * 100 + 'vw';
            const size = (Math.random() * 4 + 2) + 'px';
            drop.style.width = size;
            drop.style.height = size;
            drop.style.animationDelay = Math.random() * 10 + 's';
            drop.style.animationDuration = (Math.random() * 5 + 10) + 's';
            inkContainer.appendChild(drop);
        }
    </script>
</body>
</html>
