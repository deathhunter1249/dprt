<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Republic of Teapots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dprt-bronze: #b8860b;
            --dprt-ink: #0a0a0c;
        }
        body {
            background: radial-gradient(circle at 50% 50%, #1a1a1c 0%, var(--dprt-ink) 100%);
            color: #e0e0e0; font-family: 'Inter', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; position: relative;
        }
        .chinese-font { font-family: 'Noto Serif SC', serif; }

        /* 1. ANIMATED STEAM MIST */
        .mist {
            position: absolute; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            opacity: 0.03; pointer-events: none; z-index: 1;
            animation: drift 60s linear infinite;
        }
        @keyframes drift {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* 2. GEOMETRIC SILK PATTERN */
        .silk-pattern {
            position: absolute; inset: 0;
            background-image: radial-gradient(var(--dprt-bronze) 0.5px, transparent 0.5px);
            background-size: 40px 40px;
            opacity: 0.05; pointer-events: none;
        }

        /* 3. FLOATING EMBERS */
        .ember {
            position: absolute; background: var(--dprt-bronze);
            border-radius: 50%; opacity: 0; pointer-events: none;
            animation: rise 10s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .dragon-frame {
            position: absolute; inset: 0; z-index: 2; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0.12; mix-blend-mode: overlay;
        }
        .dragon-svg { width: 100%; height: 40vh; stroke: var(--dprt-bronze); stroke-width: 1; fill: none; }

        .logo-box {
            background: linear-gradient(145deg, #8b6508, #4a3304);
            border: 1px solid rgba(184, 134, 11, 0.5);
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        .nav-frame {
            background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(184, 134, 11, 0.15); z-index: 50;
        }
        .nav-btn {
            font-size: 14px; font-weight: 500; text-transform: uppercase; 
            letter-spacing: 0.15em; color: #a0a0a0; transition: all 0.4s ease;
            padding: 10px 20px;
        }
        .nav-btn:hover { color: var(--dprt-bronze); letter-spacing: 0.25em; }

        .discord-btn {
            background: transparent; color: var(--dprt-bronze);
            border: 1px solid var(--dprt-bronze); transition: all 0.3s ease;
        }
        .discord-btn:hover { background: var(--dprt-bronze); color: var(--dprt-ink); }

        .hero-title {
            font-size: clamp(3rem, 10vw, 7rem); line-height: 0.9; 
            color: #ffffff; font-family: 'Noto Serif SC', serif; font-weight: 900;
        }

        .user-pfp {
            width: 40px; height: 40px; border: 1px solid var(--dprt-bronze);
            border-radius: 2px; display: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="mist"></div>
    <div class="silk-pattern"></div>
    <div id="embers"></div>

    <div class="dragon-frame">
        <svg class="dragon-svg" viewBox="0 0 1000 100" preserveAspectRatio="none">
            <path d="M0,20 Q250,80 500,20 T1000,20" />
        </svg>
        <svg class="dragon-svg" viewBox="0 0 1000 100" preserveAspectRatio="none" style="transform: scaleY(-1);">
            <path d="M0,20 Q250,80 500,20 T1000,20" />
        </svg>
    </div>

    <header class="nav-frame sticky top-0">
        <nav class="flex items-center justify-between px-12 py-5 max-w-7xl mx-auto">
            <div class="flex items-center space-x-6">
                <div class="logo-box w-12 h-12 rounded-sm flex items-center justify-center">
                    <span class="text-white text-2xl chinese-font">茶</span>
                </div>
                <div class="flex flex-col leading-none">
                    <span class="text-3xl font-black tracking-widest text-white">DPRT</span>
                    <span class="text-[9px] uppercase tracking-[0.5em] text-zinc-600 font-bold">The Sovereign Estate</span>
                </div>
            </div>

            <div class="hidden lg:flex items-center space-x-4">
                <a href="#" class="nav-btn text-[#b8860b]">Home</a>
                <a href="#" class="nav-btn">Protocol</a>
                <a href="#" class="nav-btn">Vacancies</a>
                <a href="https://discord.gg/KBNqanJDfa" target="_blank" class="nav-btn">Enclave</a>
                <a href="https://republicofteapots.miraheze.org/" target="_blank" class="nav-btn">Wiki</a>
            </div>

            <div id="auth-area">
                <button id="login-btn" onclick="login()" class="discord-btn px-6 py-2 rounded-sm font-bold text-[10px] uppercase tracking-widest">
                    Identity Verify
                </button>
                <img id="user-pfp" class="user-pfp" onclick="logout()" src="">
            </div>
        </nav>
    </header>

    <main class="relative z-10 max-w-7xl mx-auto px-12 h-[calc(100vh-100px)] flex flex-col justify-center">
        <div class="max-w-4xl border-l-[1px] border-[#b8860b]/40 pl-12">
            <h3 class="text-[#b8860b] font-medium text-lg mb-4 tracking-[0.4em] uppercase opacity-60 chinese-font">大同茶國</h3>
            <h1 class="hero-title mb-8">TRANQUILITY <br> THROUGH ORDER</h1>
            <p class="text-zinc-500 text-xl max-w-2xl font-light leading-relaxed">
                The Estate is governed by the ritual of the leaf. 
                Precision in the pour, silence in the halls, and loyalty to the brew. 
                <span class="text-zinc-300">Unity is brewed in patience.</span>
            </p>
        </div>
    </main>

    <script>
        // Ember Generator
        const emberContainer = document.getElementById('embers');
        for (let i = 0; i < 15; i++) {
            const ember = document.createElement('div');
            ember.className = 'ember';
            const size = Math.random() * 3 + 1;
            ember.style.width = ember.style.height = size + 'px';
            ember.style.left = Math.random() * 100 + '%';
            ember.style.animationDelay = Math.random() * 10 + 's';
            ember.style.animationDuration = (Math.random() * 5 + 5) + 's';
            emberContainer.appendChild(ember);
        }

        const CLIENT_ID = '1323365609777528962';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        function login() {
            // Implicit grant: bypasses Netlify functions entirely
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        }

        async function init() {
            // Check for access token in the URL fragment (#access_token=...)
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (accessToken) {
                try {
                    const res = await fetch('https://discord.com/api/users/@me', {
                        headers: { Authorization: `Bearer ${accessToken}` }
                    });
                    const user = await res.json();
                    if (user.id) {
                        localStorage.setItem('dprt_user', JSON.stringify(user));
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } catch (e) { console.error("Identity check failed:", e); }
            }

            const user = JSON.parse(localStorage.getItem('dprt_user'));
            if (user) {
                document.getElementById('login-btn').style.display = 'none';
                const pfp = document.getElementById('user-pfp');
                pfp.style.display = 'block';
                pfp.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            }
        }

        function logout() {
            if(confirm("Relinquish your duties to the Republic?")) {
                localStorage.removeItem('dprt_user');
                window.location.reload();
            }
        }
        window.onload = init;
    </script>
</body>
</html>
