<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Republic of Teapots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dprt-gold: #d4af37;
            --dprt-gold-glow: rgba(212, 175, 55, 0.4);
            --dprt-bg: #050505;
        }
        body {
            background-color: var(--dprt-bg);
            background-image: radial-gradient(circle at 20% 30%, #111 0%, #050505 100%);
            color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; overflow: hidden;
        }
        .chinese-font { font-family: 'Noto Serif SC', serif; }

        /* PERFORMANCE FIX: CSS LINES INSTEAD OF SVG */
        .dragon-spine {
            position: absolute; width: 200%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--dprt-gold), transparent);
            box-shadow: 0 0 15px var(--dprt-gold);
            will-change: transform; pointer-events: none; z-index: 0; opacity: 0.3;
        }
        .spine-1 { top: 25%; animation: slither 18s linear infinite; }
        .spine-2 { top: 75%; animation: slither 25s linear infinite reverse; }

        @keyframes slither {
            from { transform: translate3d(0, 0, 0) skewX(-20deg); }
            to { transform: translate3d(-50%, 0, 0) skewX(-20deg); }
        }

        /* STARFIELD */
        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0; animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle { 50% { opacity: 0.8; } }

        .nav-frame {
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--dprt-gold-glow); z-index: 100;
        }

        /* BETTER COLORING & BUTTONS */
        .nav-link {
            font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em;
            color: #666; transition: all 0.3s ease;
        }
        .nav-link:hover, .nav-link.active { color: var(--dprt-gold); text-shadow: 0 0 10px var(--dprt-gold-glow); }

        .discord-btn {
            background: #fff; color: #000; font-weight: 900;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .discord-btn:hover { background: var(--dprt-gold); transform: scale(1.05); }

        .user-pfp {
            width: 44px; height: 44px; border-radius: 50%;
            border: 2px solid var(--dprt-gold); display: none; cursor: pointer;
            box-shadow: 0 0 15px var(--dprt-gold-glow);
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 8rem); line-height: 0.8; letter-spacing: -0.05em;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>

    <div class="dragon-spine spine-1"></div>
    <div class="dragon-spine spine-2"></div>
    <div id="stars"></div>

    <header class="nav-frame sticky top-0">
        <nav class="flex items-center justify-between px-10 py-5 max-w-7xl mx-auto">
            <div class="flex items-center space-x-6">
                <div class="bg-[#d4af37] w-12 h-12 rounded flex items-center justify-center">
                    <span class="text-black text-2xl font-black chinese-font">茶</span>
                </div>
                <div class="flex flex-col leading-none">
                    <span class="text-3xl font-black tracking-tighter italic">DPRT</span>
                    <span class="text-[9px] uppercase tracking-[0.4em] text-zinc-500 font-bold">The Republic</span>
                </div>
            </div>

            <div class="hidden lg:flex space-x-10">
                <a href="#" class="nav-link active">Home</a>
                <a href="#info" class="nav-link">Info</a>
                <a href="#apps" class="nav-link">Apps</a>
                <a href="https://discord.gg/KBNqanJDfa" target="_blank" class="nav-link">Group</a>
                <a href="https://republicofteapots.miraheze.org/" target="_blank" class="nav-link">Wiki</a>
            </div>

            <div id="auth-area">
                <button id="login-btn" onclick="login()" class="discord-btn px-6 py-2 rounded uppercase text-[10px] tracking-widest">
                    Discord Login
                </button>
                <img id="user-pfp" class="user-pfp" onclick="logout()" src="">
            </div>
        </nav>
    </header>

    <main class="relative z-10 max-w-7xl mx-auto px-10 h-[calc(100vh-90px)] flex flex-col justify-center">
        <div class="max-w-4xl border-l-2 border-[#d4af37] pl-10 py-4">
            <h3 class="text-[#d4af37] font-bold text-lg mb-4 tracking-[0.3em] uppercase">Democratic People's Republic of Teapots</h3>
            <h1 class="hero-title font-black uppercase text-white mb-10 italic">GLORY TO <br> YOSOFO</h1>
            <p class="text-zinc-500 text-xl max-w-xl leading-relaxed">
                <span class="text-white font-bold italic underline decoration-[#d4af37] decoration-2">MOTIVE 01:</span> <br> 
                Maintain peace. Protect the motherland. Serve the eternal Republic.
            </p>
        </div>
    </main>

    <footer class="fixed bottom-8 left-0 w-full text-center">
        <div class="flex justify-center items-center space-x-10 text-zinc-700 uppercase tracking-[0.6em] text-[9px] font-black">
            <span>忠诚 LOYALTY</span> <span class="text-[#d4af37]">•</span> 
            <span>纪律 DISCIPLINE</span> <span class="text-[#d4af37]">•</span> 
            <span>茶 TEA</span>
        </div>
    </footer>

    <script>
        // Star generator (Performance friendly)
        const starContainer = document.getElementById('stars');
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            starContainer.appendChild(star);
        }

        const CLIENT_ID = '1323365609777528962';
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const FUNCTION_URL = '/.netlify/functions/auth'; 

        function login() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=identify`;
        }

        async function init() {
            const code = new URLSearchParams(window.location.search).get('code');
            if (code) {
                try {
                    const res = await fetch(`${FUNCTION_URL}?code=${code}`);
                    const data = await res.json();
                    if (data.user) {
                        localStorage.setItem('dprt_user', JSON.stringify(data.user));
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } catch (err) { console.error("Netlify function not ready."); }
            }
            const user = JSON.parse(localStorage.getItem('dprt_user'));
            if (user) {
                document.getElementById('login-btn').style.display = 'none';
                const pfp = document.getElementById('user-pfp');
                pfp.style.display = 'block';
                pfp.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            }
        }
        function logout() { if(confirm("Sign out?")) { localStorage.removeItem('dprt_user'); window.location.reload(); } }
        window.onload = init;
    </script>
</body>
</html>
