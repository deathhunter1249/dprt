<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Republic of Teapots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --dprt-bronze: #b8860b; --dprt-ink: #0a0a0c; }
        body {
            background: #0a0a0c;
            color: #e0e0e0; font-family: 'Inter', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; position: relative;
        }

        /* Hardware Accelerated Background */
        .bg-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, #1a1a1c 0%, #0a0a0c 100%);
            z-index: -1;
        }

        /* Performance Optimized Embers - Using GPU */
        .ember {
            position: absolute; background: var(--dprt-bronze); border-radius: 50%; opacity: 0;
            pointer-events: none; z-index: 1; will-change: transform;
            animation: rise 12s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translate3d(0, 105vh, 0) scale(0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translate3d(0, -10vh, 0) scale(1.2); opacity: 0; }
        }

        /* Scanline Overlay */
        body::before {
            content: " "; display: block; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01));
            z-index: 100; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        #blur-container { 
            transition: filter 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            will-change: filter, transform;
        }
        
        .hero-title { font-size: clamp(3.5rem, 12vw, 8rem); line-height: 0.8; color: #fff; font-family: 'Noto Serif SC', serif; font-weight: 900; }
        .chinese-font { font-family: 'Noto Serif SC', serif; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div id="embers-container"></div>
    
    <div id="header-placeholder"></div>

    <div id="blur-container" class="relative z-10">
        <main class="max-w-7xl mx-auto px-12 h-[calc(100vh-100px)] flex flex-col justify-center">
            <div class="max-w-4xl border-l-2 border-[#b8860b]/40 pl-16 relative">
                <div class="absolute -left-[2px] top-0 h-24 w-[2px] bg-[#b8860b] shadow-[0_0_15px_#b8860b]"></div>
                
                <h3 class="text-[#b8860b] font-black text-xs mb-8 tracking-[0.8em] uppercase opacity-80 chinese-font">
                    大同茶國 — 永恆秩序
                </h3>
                <h1 class="hero-title mb-10 italic uppercase">
                    Tranquility<br>
                    <span class="text-white">Through</span> 
                    <span class="text-[#ff8c00]">Order</span>
                </h1>
                <p class="text-zinc-500 text-xl font-light leading-relaxed max-w-2xl">
                    The Estate is built upon the <span class="text-zinc-200 font-bold italic">Eternal Brew</span>. 
                    Structure is the vessel; loyalty is the tea.
                </p>
            </div>
        </main>
    </div>

    <script>
        const CLIENT_ID = '1323365609777528962';
        const GUILD_ID = '1255926408312655963'; 
        // Ensure REDIRECT_URI matches Discord Dev Portal exactly
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        // 1. LOAD HEADER & SYNC UI
        async function loadGlobalHeader() {
            try {
                const resp = await fetch('/dprt/styling/header.html');
                if (!resp.ok) throw new Error("Header file not found");
                const html = await resp.text();
                document.getElementById('header-placeholder').innerHTML = html;
                
                // Highlight active link
                const path = window.location.pathname.split("/").pop() || 'index.html';
                const links = {'index.html': 'nav-home', 'home.html': 'nav-home', 'jobs.html': 'nav-jobs', 'info.html': 'nav-info'};
                if(links[path]) document.getElementById(links[path])?.classList.add('text-[#b8860b]');
                
                // Trigger Authentication check once header exists
                initAuth();
            } catch (e) {
                console.error("Layout Error:", e);
            }
        }

        // 2. DISCORD AUTHENTICATION
        async function initAuth() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (accessToken) {
                try {
                    const userRes = await fetch('https://discord.com/api/users/@me', {
                        headers: { Authorization: `Bearer ${accessToken}` }
                    });
                    const user = await userRes.json();
                    
                    if (user.id) {
                        localStorage.setItem('dprt_user', JSON.stringify(user));
                        // Clean URL fragment
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } catch (e) { console.error("Identity Verification Failed:", e); }
            }
            renderUser();
        }

        // 3. RENDER USER DATA INTO HEADER
        function renderUser() {
            const user = JSON.parse(localStorage.getItem('dprt_user'));
            const loginBtn = document.getElementById('login-btn');
            const userDisplay = document.getElementById('user-display');

            if (!user || !loginBtn) return;

            loginBtn.style.display = 'none';
            userDisplay.classList.remove('hidden');
            
            // Inject data into header elements
            document.getElementById('nav-username').innerText = user.username;
            document.getElementById('menu-user-name').innerText = user.username;
            document.getElementById('nav-pfp').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
        }

        // 4. GLOBAL UTILITIES (Used by header.html buttons)
        function login() {
            const scopes = encodeURIComponent('identify guilds.members.read');
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${scopes}`;
        }

        function logout() {
            localStorage.removeItem('dprt_user');
            window.location.reload();
        }

        function toggleMenu(show) {
            const menu = document.getElementById('profile-menu');
            const overlay = document.getElementById('global-overlay');
            const blur = document.getElementById('blur-container');
            
            if (!menu) return;

            if (show) {
                menu.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4');
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                blur.style.filter = "blur(12px) brightness(0.4)";
                blur.style.transform = "scale(0.96)";
            } else {
                menu.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4');
                overlay.classList.add('opacity-0', 'pointer-events-none');
                blur.style.filter = "none";
                blur.style.transform = "scale(1)";
            }
        }

        // 5. AMBIANCE GENERATOR
        const embersContainer = document.getElementById('embers-container');
        for (let i = 0; i < 15; i++) {
            const e = document.createElement('div');
            e.className = 'ember';
            e.style.left = Math.random() * 100 + '%';
            e.style.width = e.style.height = (Math.random() * 3 + 1) + 'px';
            e.style.animationDelay = Math.random() * 10 + 's';
            embersContainer.appendChild(e);
        }

        // Initialize on load
        window.onload = loadGlobalHeader;
    </script>
</body>
</html>
