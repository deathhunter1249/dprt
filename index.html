<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Republic of Teapots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --dprt-bronze: #b8860b; --dprt-ink: #0a0a0c; }
        
        body {
            background: radial-gradient(circle at 50% 50%, #1a1a1c 0%, var(--dprt-ink) 100%);
            color: #e0e0e0; font-family: 'Inter', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; position: relative;
        }

        /* BACKGROUND EFFECTS */
        .mist {
            position: absolute; inset: 0; background: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            opacity: 0.03; pointer-events: none; z-index: 1; animation: drift 60s linear infinite;
        }
        @keyframes drift { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .silk-pattern {
            position: absolute; inset: 0; opacity: 0.05; pointer-events: none; z-index: 1;
            background-image: radial-gradient(var(--dprt-bronze) 0.5px, transparent 0.5px); background-size: 40px 40px;
        }

        .ember {
            position: absolute; background: var(--dprt-bronze); border-radius: 50%; opacity: 0; pointer-events: none;
            animation: rise 12s infinite ease-in; z-index: 2;
        }
        @keyframes rise {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* BLUR & MENU */
        #blur-container { transition: filter 0.4s ease, opacity 0.4s ease; z-index: 10; position: relative; }
        body.menu-open #blur-container { filter: blur(4px); opacity: 0.5; pointer-events: none; }

        #global-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.3);
            z-index: 80; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        body.menu-open #global-overlay { opacity: 1; pointer-events: auto; }

        #profile-menu {
            position: absolute; top: 85px; right: 40px; width: 280px;
            background: #121214; border: 1px solid var(--dprt-bronze);
            z-index: 110; transform: translateY(-10px); opacity: 0;
            pointer-events: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        body.menu-open #profile-menu { transform: translateY(0); opacity: 1; pointer-events: auto; }

        .menu-item {
            padding: 16px 20px; border-bottom: 1px solid rgba(184, 134, 11, 0.1);
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .menu-item:hover { background: rgba(184, 134, 11, 0.05); color: var(--dprt-bronze); }
        .notif-badge { background: var(--dprt-bronze); color: black; font-size: 10px; font-weight: 900; padding: 1px 6px; border-radius: 2px; }

        .chinese-font { font-family: 'Noto Serif SC', serif; }
        .nav-btn { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; color: #a0a0a0; transition: 0.4s ease; }
        .nav-btn:hover { color: var(--dprt-bronze); letter-spacing: 0.3em; }
        .hero-title { font-size: clamp(3rem, 10vw, 7rem); line-height: 0.85; color: #fff; font-family: 'Noto Serif SC', serif; font-weight: 900; }
        
        .user-pfp {
            width: 44px; height: 44px; border: 1px solid var(--dprt-bronze);
            border-radius: 2px; cursor: pointer; display: none;
            position: relative; z-index: 101; 
        }

        /* THE "OLD" LOGIN BUTTON STYLE */
        .btn-verify {
            border: 1px solid var(--dprt-bronze);
            color: var(--dprt-bronze);
            padding: 10px 24px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            transition: all 0.3s ease;
            background: transparent;
            cursor: pointer;
        }
        .btn-verify:hover {
            background: var(--dprt-bronze);
            color: black;
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.4);
        }
    </style>
</head>
<body id="body">

    <div class="mist"></div>
    <div class="silk-pattern"></div>
    <div id="embers-container"></div>
    <div id="global-overlay" onclick="toggleMenu(false)"></div>

    <div id="blur-container">
        <header class="relative z-50 border-b border-white/5 bg-black/20">
            <nav class="flex items-center justify-between px-10 py-5 max-w-7xl mx-auto">
                <div class="flex items-center space-x-5">
                    <div class="w-11 h-11 border border-[#b8860b] flex items-center justify-center bg-[#b8860b]">
                        <span class="text-black text-2xl chinese-font font-black">茶</span>
                    </div>
                    <div class="flex flex-col leading-none">
                        <span class="text-3xl font-black tracking-widest text-white">DPRT</span>
                        <span class="text-[9px] uppercase tracking-[0.4em] text-zinc-500 font-bold mt-1">Teapotian State</span>
                    </div>
                </div>

                <div class="hidden lg:flex items-center space-x-10">
                    <a href="index.html" class="nav-btn text-[#b8860b]">Home</a>
                    <a href="info.html" class="nav-btn">Info</a>
                    <a href="jobs.html" class="nav-btn">Jobs</a>
                    <a href="https://discord.gg/KBNqanJDfa" target="_blank" class="nav-btn">Group</a>
                    <a href="https://republicofteapots.miraheze.org/" target="_blank" class="nav-btn">Wiki</a>
                </div>

                <div style="width: 44px;"></div>
            </nav>
        </header>

        <main class="max-w-7xl mx-auto px-12 h-[calc(100vh-100px)] flex flex-col justify-center">
            <div class="max-w-4xl border-l-2 border-[#b8860b]/30 pl-16">
                <h3 class="text-[#b8860b] font-bold text-sm mb-6 tracking-[0.6em] uppercase opacity-60 chinese-font">大同茶國 — 永恆秩序</h3>
                <h1 class="hero-title mb-10">TRANQUILITY<br>THROUGH ORDER</h1>
                <p class="text-zinc-500 text-xl font-light leading-relaxed">
                    The Estate is built upon the <span class="text-zinc-300">Eternal Brew</span>. 
                    Serve the kettle; protect the leaf.
                </p>
            </div>
        </main>
    </div>

    <div class="fixed top-6 right-10 z-[110] flex flex-col items-end">
        <button id="login-btn" onclick="login()" class="btn-verify">
            Log In
        </button>
        <img id="user-pfp" class="user-pfp" onclick="toggleMenu(true)">
        
        <div id="profile-menu">
            <div class="p-6 border-b border-[#b8860b]/20 bg-[#b8860b]/5">
                <p id="user-name" class="font-black text-white uppercase italic text-lg">Citizen</p>
                <p id="user-rank" class="text-[9px] text-[#b8860b] tracking-widest font-bold uppercase">Verifying...</p>
            </div>
            <div class="menu-item" onclick="alert('Viewing alerts...')">
                <span>Notifications</span>
                <span id="notif-count" class="notif-badge">0</span>
            </div>
            <div class="menu-item" onclick="window.location.href='settings.html'">
                <span>Settings</span>
            </div>
            <div class="menu-item text-red-500 hover:bg-red-500/5" onclick="logout()">
                <span class="font-bold uppercase tracking-widest text-[11px]">Log Out</span>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const CLIENT_ID = '1323365609777528962';
        const GUILD_ID = '1255926408312655963'; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        const ROLE_IDS = {
            'COUNCIL': '1256196665199558726', 
            'OFFICER': '1255950197746438357',
            'CIVILIAN': '1255941719199977585',
            'PEASANT': '1389026114554560562'
        };

        // Ember Generation
        const embers = document.getElementById('embers-container');
        for (let i = 0; i < 15; i++) {
            const e = document.createElement('div');
            e.className = 'ember';
            e.style.left = Math.random() * 100 + '%';
            e.style.width = e.style.height = (Math.random() * 3 + 1) + 'px';
            e.style.animationDelay = Math.random() * 10 + 's';
            embers.appendChild(e);
        }

        // --- 2. LOGIC ---
        function toggleMenu(show) {
            document.getElementById('body').classList.toggle('menu-open', show);
        }

        function login() {
            const scopes = encodeURIComponent('identify guilds.members.read');
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${scopes}`;
        }

        async function init() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (accessToken) {
                try {
                    const userRes = await fetch('https://discord.com/api/users/@me', {
                        headers: { Authorization: `Bearer ${accessToken}` }
                    });
                    const user = await userRes.json();

                    const memberRes = await fetch(`https://discord.com/api/users/@me/guilds/${GUILD_ID}/member`, {
                        headers: { Authorization: `Bearer ${accessToken}` }
                    });
                    const memberData = await memberRes.json();

                    if (user.id) {
                        const userData = { ...user, roles: memberData.roles || [] };
                        localStorage.setItem('dprt_user', JSON.stringify(userData));
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } catch (e) { 
                    console.error("Identity verify failed:", e); 
                }
            }
            renderUser();
        }

        function renderUser() {
            const user = JSON.parse(localStorage.getItem('dprt_user'));
            if (!user) return;

            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('user-name').innerText = user.username;
            const pfp = document.getElementById('user-pfp');
            pfp.style.display = 'block';
            pfp.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;

            let rank = "Civilian";
            if (user.roles.includes(ROLE_IDS.COUNCIL)) rank = "High Council";
            else if (user.roles.includes(ROLE_IDS.OFFICER)) rank = "Imperial Officer";
            else if (user.roles.includes(ROLE_IDS.CIVILIAN)) rank = "Verified Citizen";
            else if (user.roles.includes(ROLE_IDS.PEASANT)) rank = "Peasant";
            
            document.getElementById('user-rank').innerText = rank;
            document.getElementById('notif-count').innerText = "2";
        }

        function logout() {
            localStorage.removeItem('dprt_user');
            window.location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
