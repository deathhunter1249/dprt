<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Republic of Teapots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
        }

        body {
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        /* Large Background Calligraphy */
        .bg-watermark {
            position: fixed; top: 50%; right: -10%; transform: translateY(-50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 60rem; color: rgba(0, 0, 0, 0.03);
            pointer-events: none; z-index: 0; line-height: 0.8; user-select: none;
        }

        .cinnabar-glow {
            position: fixed; top: -10%; left: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(188, 47, 50, 0.05) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* Reveal Animations */
        .reveal-node { 
            opacity: 0; transform: translateY(20px); 
            transition: all 1.8s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        
        .reveal-active { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.3s; }
        .delay-2 { transition-delay: 0.7s; }
        .delay-3 { transition-delay: 1.1s; }

        /* Floating Ink Droplets */
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            pointer-events: none; z-index: 1; filter: blur(1px);
            animation: fall 15s infinite linear;
        }
        @keyframes fall {
            0% { transform: translate3d(0, -10vh, 0) scale(0); opacity: 0; }
            20% { opacity: 0.1; }
            100% { transform: translate3d(20vw, 110vh, 0) scale(2); opacity: 0; }
        }

        /* Hero Typography - Dramatic & Sharp */
        .hero-title { 
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(4rem, 12vw, 9rem);
            line-height: 0.9;
            letter-spacing: -0.05em;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.05));
        }

        .accent-stamp {
            writing-mode: vertical-rl;
            font-family: 'Zhi_Mang_Xing', cursive;
            font-size: 1.8rem;
            color: var(--cinnabar);
            border-right: 2px solid var(--cinnabar);
            padding-right: 1.5rem;
            margin-right: 3rem;
            opacity: 0.9;
            letter-spacing: 0.2em;
        }

        /* Button as an Imperial Seal */
        .btn-seal {
            position: relative;
            padding: 1rem 3rem;
            font-family: 'Noto Serif SC', serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--ink);
            border: 2px solid var(--ink);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .btn-seal:hover {
            color: white;
            background-color: var(--cinnabar);
            border-color: var(--cinnabar);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(188, 47, 50, 0.2);
        }
    </style>
</head>
<body>
    <div class="bg-watermark">龍</div>
    <div class="cinnabar-glow"></div>
    <div id="ink-container"></div>
    
    <div class="flex-grow flex flex-col justify-center relative z-10">
        <main class="max-w-7xl mx-auto px-12 py-20 w-full">
            <div class="flex items-start">
                <div class="reveal-node delay-1 accent-stamp">
                    君子不憂不懼 — ETERNAL PEACE
                </div>

                <div class="content-wrapper">
                    <div class="reveal-node delay-1 mb-10">
                        <span class="bg-zinc-900 text-white px-6 py-2 text-[12px] tracking-[0.8em] font-bold uppercase">
                            Established 2026
                        </span>
                    </div>

                    <div class="reveal-node delay-2">
                        <h1 class="hero-title text-zinc-900 mb-12">
                            ORDER IN <br>
                            <span class="text-[#bc2f32]">EVERY DROP</span>
                        </h1>
                    </div>

                    <div class="reveal-node delay-3">
                        <p class="text-zinc-500 text-3xl font-serif max-w-2xl leading-relaxed italic border-l-8 border-[#bc2f32] pl-10 mb-16">
                            The Republic is a scroll yet to be written. 
                            Loyalty is the ink; tranquility is the result.
                        </p>
                        
                        <div class="flex gap-10">
                            <button onclick="window.location.href='/dprt/jobs/'" class="btn-seal">
                                VIEW DIRECTIVES
                            </button>
                            <button class="btn-seal" style="border-style: dashed; opacity: 0.6;">
                                PROTOCOL
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        window.addEventListener('load', () => {
            const nodes = document.querySelectorAll('.reveal-node');
            setTimeout(() => {
                nodes.forEach(node => node.classList.add('reveal-active'));
            }, 200);
        });

        const inkContainer = document.getElementById('ink-container');
        for (let i = 0; i < 20; i++) {
            const drop = document.createElement('div');
            drop.className = 'ink-drop';
            drop.style.left = Math.random() * 100 + '%';
            const size = (Math.random() * 5 + 2) + 'px';
            drop.style.width = size;
            drop.style.height = size;
            drop.style.animationDelay = Math.random() * 15 + 's';
            drop.style.animationDuration = (Math.random() * 10 + 12) + 's';
            inkContainer.appendChild(drop);
        }
    </script>
</body>
</html>
