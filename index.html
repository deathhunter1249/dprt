<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Republic of Teapots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dprt-gold: #d4af37;
            --dprt-bg: #050505;
        }
        body {
            background: var(--dprt-bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* HARDWARE ACCELERATED SCALES */
        .dragon-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
        }

        .scale-line {
            position: absolute;
            width: 200%;
            height: 15px;
            background: repeating-linear-gradient(90deg, 
                var(--dprt-gold) 0px, 
                var(--dprt-gold) 2px, 
                transparent 2px, 
                transparent 40px);
            /* This is the secret to no lag: */
            transform: translateZ(0); 
            will-change: transform;
        }

        .top-line { top: 20%; animation: slither 15s linear infinite; }
        .bottom-line { bottom: 20%; animation: slither 20s linear infinite reverse; }

        @keyframes slither {
            from { transform: translateX(0) skewX(-20deg); }
            to { transform: translateX(-40px) skewX(-20deg); }
        }

        .nav-frame {
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--dprt-gold);
        }
        
        .hero-title {
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.85;
        }
    </style>
</head>
<body>

    <div class="dragon-bg">
        <div class="scale-line top-line"></div>
        <div class="scale-line bottom-line"></div>
    </div>

    <header class="nav-frame relative z-50">
        <nav class="flex items-center justify-between px-8 py-5 max-w-7xl mx-auto">
            <div class="flex items-center space-x-4">
                <div class="bg-[#d4af37] w-12 h-12 rounded flex items-center justify-center">
                    <span class="text-black text-2xl font-black font-serif">茶</span>
                </div>
                <span class="text-3xl font-black italic tracking-tighter">DPRT</span>
            </div>

            <div id="auth-zone">
                <button id="login-btn" onclick="discordLogin()" class="border border-[#d4af37] px-6 py-2 rounded uppercase text-xs font-bold hover:bg-[#d4af37] hover:text-black transition-all">
                    Discord Login
                </button>
                <img id="user-pfp" class="w-12 h-12 rounded-full border-2 border-[#d4af37] hidden cursor-pointer" onclick="logout()">
            </div>
        </nav>
    </header>

    <main class="relative z-10 max-w-7xl mx-auto px-8 h-[calc(100vh-80px)] flex flex-col justify-center">
        <h3 class="text-[#d4af37] font-bold tracking-widest mb-4">DEMOCRATIC PEOPLE'S REPUBLIC OF TEAPOTS</h3>
        <h1 class="hero-title font-black italic mb-8">GLORY TO <br> YOSOFO</h1>
        <p class="text-zinc-500 text-xl border-l-2 border-[#d4af37] pl-6">
            <span class="text-white font-bold italic underline">MOTIVE 01:</span><br>
            Maintain peace. Protect the motherland.
        </p>
    </main>

    <footer class="fixed bottom-8 w-full text-center text-[10px] tracking-[0.4em] text-zinc-600 font-bold">
        忠诚 LOYALTY • 纪律 DISCIPLINE • 茶 TEA
    </footer>

    <script>
        const CLIENT_ID = '1323365609777528962';
        // Redirect to wherever your server.js is hosted (e.g. Render/Railway)
        const SERVER_URL = 'http://localhost:3000'; 

        function discordLogin() {
            const redirect = encodeURIComponent(window.location.origin + window.location.pathname);
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${redirect}&response_type=code&scope=identify`;
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            if (code) {
                try {
                    const res = await fetch(`${SERVER_URL}/discord/callback?code=${code}`);
                    const data = await res.json();
                    if (data.user) {
                        localStorage.setItem('dprt_user', JSON.stringify(data.user));
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } catch (e) { console.error("Server not reachable"); }
            }

            const user = JSON.parse(localStorage.getItem('dprt_user'));
            if (user) {
                document.getElementById('login-btn').classList.add('hidden');
                const pfp = document.getElementById('user-pfp');
                pfp.classList.remove('hidden');
                pfp.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            }
        }

        function logout() {
            localStorage.removeItem('dprt_user');
            window.location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
