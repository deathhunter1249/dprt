<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Republic of Teapots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dprt-gold: #d4af37;
            --dprt-bg: #0a0a0a;
        }
        body {
            background-color: var(--dprt-bg);
            background-image: radial-gradient(circle at 30% 40%, #1a1a1a 0%, #0a0a0a 70%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden; 
        }
        .chinese-font { font-family: 'Noto Serif SC', serif; }
        
        /* HORIZONTAL SNAKING DRAGON */
        .dragon-overlay {
            position: absolute;
            top: 20%;
            left: 0;
            width: 100%;
            height: 60%;
            z-index: 0; 
            pointer-events: none;
            opacity: 0.12;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
        }

        .nav-frame {
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.95), rgba(10, 10, 10, 0.7));
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .gold-text { color: var(--dprt-gold); }
        .nav-link { transition: all 0.2s ease; border-bottom: 2px solid transparent; }
        .nav-link:hover { color: var(--dprt-gold); border-bottom: 2px solid var(--dprt-gold); }
        
        .discord-btn {
            background-color: var(--dprt-gold);
            color: #000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        .discord-btn:hover {
            transform: translateY(-2px);
            background-color: #f0c74d;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .hero-title {
            font-size: clamp(3.5rem, 11vw, 8.5rem);
            line-height: 0.85;
            letter-spacing: -0.03em;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="dragon-overlay">
        <svg viewBox="0 0 1400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M-100 350 C 200 150, 500 550, 800 300 S 1150 150, 1500 350" 
                  stroke="var(--dprt-gold)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M-100 360 C 200 160, 500 560, 800 310 S 1150 160, 1500 360" 
                  stroke="#000" stroke-width="2" opacity="0.3" stroke-dasharray="8 16"/>
            <g transform="translate(780, 275) rotate(-10)">
                <path d="M0 30 L45 0 L85 25 L70 65 L10 65 Z" fill="var(--dprt-gold)"/>
                <circle cx="55" cy="25" r="3" fill="black" opacity="0.5"/>
                <path d="M45 0 C 65 -25, 100 5, 85 25" stroke="var(--dprt-gold)" stroke-width="4" fill="none"/>
            </g>
        </svg>
    </div>

    <header class="nav-frame">
        <nav class="flex items-center justify-between px-8 py-5 max-w-7xl mx-auto">
            <div class="flex items-center space-x-5">
                <div class="bg-[#c29a30] w-14 h-14 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(194,154,48,0.4)]">
                    <span class="text-black text-3xl font-black chinese-font">茶</span>
                </div>
                <div class="flex flex-col leading-none">
                    <span class="text-4xl font-black tracking-tighter">DPRT</span>
                    <span class="text-[11px] uppercase tracking-[0.3em] text-gray-400 font-bold">Republic of Teapots</span>
                </div>
            </div>

            <div class="hidden xl:flex space-x-10 text-[12px] font-black uppercase tracking-widest text-gray-300">
                <a href="https://deathhunter1249.github.io/dprt/" class="nav-link gold-text">Home</a>
                <a href="https://deathhunter1249.github.io/dprt/#info" class="nav-link">Info</a>
                <a href="https://deathhunter1249.github.io/dprt/#apps" class="nav-link">Applications</a>
                <a href="https://discord.gg/KBNqanJDfa" target="_blank" class="nav-link">Group</a>
                <a href="https://republicofteapots.miraheze.org/" target="_blank" class="nav-link text-gray-600">WIKI</a>
            </div>

            <div class="flex items-center space-x-4">
                <div class="h-8 w-[1px] bg-zinc-800 hidden lg:block"></div>
                <button onclick="window.location.href='https://discord.gg/KBNqanJDfa'" class="discord-btn flex items-center px-7 py-3 rounded-lg font-black text-xs uppercase tracking-wider">
                    <svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.076.076 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 0 0-.031-.03zM8.02 15.33c-1.18 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.086 2.157 2.419c0 1.334-.956 2.419-2.157 2.419zm7.975 0c-1.18 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.086 2.157 2.419c0 1.334-.946 2.419-2.157 2.419z"/>
                    </svg>
                    Discord Login
                </button>
            </div>
        </nav>
    </header>

    <main class="relative z-10 max-w-7xl mx-auto px-8 h-[calc(100vh-100px)] flex flex-col justify-center">
        <div class="max-w-5xl border-l-4 border-[#d4af37] pl-8">
            <h3 class="gold-text font-bold text-2xl md:text-3xl mb-4 tracking-tight">
                Democratic People's Republic of Teapots
            </h3>
            
            <h1 class="hero-title font-black uppercase text-white mb-8 italic">
                GLORY TO <br> YOSOFO
            </h1>
            
            <p class="text-gray-400 text-xl md:text-2xl max-w-2xl font-light leading-relaxed">
                <span class="text-white font-bold italic underline decoration-[#d4af37]">Motive 01:</span> <br> 
                Maintain peace. Protect the motherland. Serve the eternal Republic.
            </p>
        </div>
    </main>

    <footer class="fixed bottom-10 left-0 w-full text-center z-10">
        <div class="flex justify-center items-center space-x-12 text-gray-500 uppercase tracking-[0.6em] text-[10px] font-black opacity-60">
            <span>忠诚 (LOYALTY)</span>
            <span class="text-[#d4af37]">•</span>
            <span>纪律 (DISCIPLINE)</span>
            <span class="text-[#d4af37]">•</span>
            <span>茶 (TEA)</span>
        </div>
    </footer>

</body>
</html>
