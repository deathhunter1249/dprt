<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Republic of Teapots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dprt-gold: #d4af37;
            --dprt-bg: #0a0a0a;
        }
        body {
            background-color: var(--dprt-bg);
            background-image: radial-gradient(circle at 30% 40%, #151515 0%, #0a0a0a 70%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden; 
        }
        .chinese-font { font-family: 'Noto Serif SC', serif; }

        /* ANIMATED FLOWING LINES */
        .line-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
        }

        .flowing-line {
            position: absolute;
            width: 200%; /* Extra width for the sliding animation */
            height: 300px;
            stroke: var(--dprt-gold);
            stroke-width: 4;
            fill: none;
            animation: moveLine 20s linear infinite;
        }

        .line-top { top: 10%; animation-duration: 25s; opacity: 0.8; }
        .line-bottom { bottom: 5%; animation-duration: 18s; transform: scaleY(-1); opacity: 0.6; }

        @keyframes moveLine {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .nav-frame {
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.95), rgba(10, 10, 10, 0.7));
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .gold-text { color: var(--dprt-gold); }
        .nav-link { transition: all 0.2s ease; }
        .nav-link:hover { color: var(--dprt-gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        
        .discord-btn {
            background-color: var(--dprt-gold);
            color: #000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .discord-btn:hover {
            transform: translateY(-2px);
            background-color: #f0c74d;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .hero-title {
            font-size: clamp(3.5rem, 11vw, 8rem);
            line-height: 0.85;
            letter-spacing: -0.04em;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="line-container">
        <svg class="flowing-line line-top" viewBox="0 0 1000 300" preserveAspectRatio="none">
            <path d="M0,150 Q125,50 250,150 T500,150 T750,150 T1000,150 M1000,150 Q1125,50 1250,150 T1500,150 T1750,150 T2000,150" />
        </svg>

        <svg class="flowing-line line-bottom" viewBox="0 0 1000 300" preserveAspectRatio="none">
            <path d="M0,150 C150,250 350,50 500,150 S850,50 1000,150 M1000,150 C1150,250 1350,50 1500,150 S1850,50 2000,150" stroke-width="6"/>
        </svg>
    </div>

    <header class="nav-frame">
        <nav class="flex items-center justify-between px-8 py-5 max-w-7xl mx-auto">
            <div class="flex items-center space-x-5">
                <div class="bg-[#c29a30] w-14 h-14 rounded-lg flex items-center justify-center">
                    <span class="text-black text-3xl font-black chinese-font">茶</span>
                </div>
                <div class="flex flex-col leading-none">
                    <span class="text-4xl font-black tracking-tighter">DPRT</span>
                    <span class="text-[11px] uppercase tracking-[0.3em] text-gray-400 font-bold">Republic of Teapots</span>
                </div>
            </div>

            <div class="hidden xl:flex space-x-10 text-[12px] font-black uppercase tracking-widest text-gray-300">
                <a href="https://deathhunter1249.github.io/dprt/" class="nav-link gold-text">Home</a>
                <a href="https://deathhunter1249.github.io/dprt/#info" class="nav-link">Info</a>
                <a href="https://deathhunter1249.github.io/dprt/#apps" class="nav-link">Applications</a>
                <a href="https://discord.gg/KBNqanJDfa" target="_blank" class="nav-link">Group</a>
                <a href="https://republicofteapots.miraheze.org/" target="_blank" class="nav-link text-gray-600">WIKI</a>
            </div>

            <button onclick="window.location.href='https://discord.gg/KBNqanJDfa'" class="discord-btn flex items-center px-7 py-3 rounded-lg font-black text-xs uppercase tracking-wider">
                Discord Login
            </button>
        </nav>
    </header>

    <main class="relative z-10 max-w-7xl mx-auto px-8 h-[calc(100vh-100px)] flex flex-col justify-center">
        <div class="max-w-5xl border-l-4 border-[#d4af37] pl-8">
            <h3 class="gold-text font-bold text-2xl md:text-3xl mb-4 tracking-tight uppercase">
                Democratic People's Republic of Teapots
            </h3>
            
            <h1 class="hero-title font-black uppercase text-white mb-8 italic">
                GLORY TO <br> YOSOFO
            </h1>
            
            <p class="text-gray-400 text-xl md:text-2xl max-w-2xl font-light leading-relaxed">
                <span class="text-white font-bold italic underline decoration-[#d4af37]">Motive 01:</span> <br> 
                Maintain peace. Protect the motherland. Serve the eternal Republic.
            </p>
        </div>
    </main>

    <footer class="fixed bottom-10 left-0 w-full text-center z-10">
        <div class="flex justify-center items-center space-x-12 text-gray-500 uppercase tracking-[0.6em] text-[10px] font-black opacity-60">
            <span>LOYALTY</span>
            <span class="text-[#d4af37]">•</span>
            <span>DISCIPLINE</span>
            <span class="text-[#d4af37]">•</span>
            <span>TEA</span>
        </div>
    </footer>

</body>
</html>
