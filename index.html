<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Republic of Teapots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1a1a; 
            --cinnabar: #bc2f32; 
            --paper: #e6e4e0;
        }

        body {
            background-color: var(--paper);
            /* Seamless High-Quality Paper Texture */
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--ink); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        /* Large Background Calligraphy (The "Dragon") */
        .bg-watermark {
            position: fixed;
            top: 50%;
            right: -10%;
            transform: translateY(-50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 60rem;
            color: rgba(0, 0, 0, 0.03);
            pointer-events: none;
            z-index: 0;
            line-height: 0.8;
            user-select: none;
        }

        /* Red Sun / Cinnabar Glow */
        .cinnabar-glow {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(188, 47, 50, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Reveal Animations */
        .reveal-node { 
            opacity: 0; 
            transform: translateX(-30px); 
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        
        .reveal-active { 
            opacity: 1; 
            transform: translateX(0); 
        }

        .delay-1 { transition-delay: 0.3s; }
        .delay-2 { transition-delay: 0.6s; }
        .delay-3 { transition-delay: 0.9s; }

        /* Floating Ink Droplets (Replaces Embers) */
        .ink-drop {
            position: absolute; background: var(--ink); border-radius: 50%; opacity: 0;
            pointer-events: none; z-index: 1; filter: blur(1px);
            animation: fall 15s infinite linear;
        }
        @keyframes fall {
            0% { transform: translate3d(0, -10vh, 0) scale(0); opacity: 0; }
            20% { opacity: 0.1; }
            100% { transform: translate3d(20vw, 110vh, 0) scale(2); opacity: 0; }
        }

        /* Hero Typography */
        .hero-title { 
            font-size: clamp(3rem, 10vw, 8rem); 
            line-height: 0.85; 
            font-family: 'Ma Shan Zheng', cursive; 
            letter-spacing: -0.02em;
        }

        .accent-stamp {
            writing-mode: vertical-rl;
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 1.5rem;
            color: var(--cinnabar);
            border-right: 1px solid var(--cinnabar);
            padding-right: 1rem;
            margin-right: 2rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="bg-watermark">龍</div>
    <div class="cinnabar-glow"></div>
    <div id="ink-container"></div>
    
    <div id="header-placeholder" class="relative z-[90]"></div>

    <div class="flex-grow flex flex-col justify-center relative z-10">
        <main class="max-w-7xl mx-auto px-12 py-20 w-full">
            <div class="flex items-start">
                <div class="reveal-node delay-1 accent-stamp">
                    君子不憂不懼 — Eternal Peace
                </div>

                <div class="content-wrapper">
                    <div class="reveal-node delay-1 mb-6">
                        <span class="bg-black text-white px-4 py-1 text-[10px] tracking-[0.5em] font-bold uppercase">
                            Imperial Edict 2026
                        </span>
                    </div>

                    <div class="reveal-node delay-2">
                        <h1 class="hero-title text-zinc-900 mb-8">
                            ORDER IN <br>
                            <span class="text-[#bc2f32]">EVERY DROP</span>
                        </h1>
                    </div>

                    <div class="reveal-node delay-3">
                        <p class="text-zinc-600 text-2xl font-serif max-w-xl leading-relaxed italic border-l-4 border-black pl-8">
                            The Republic is a scroll yet to be written. 
                            Loyalty is the ink; tranquility is the result.
                        </p>
                        
                        <div class="mt-16 flex gap-8">
                            <button onclick="window.location.href='/dprt/jobs/'" class="bg-black text-white px-10 py-4 font-['Zhi_Mang_Xing'] text-2xl hover:bg-[#bc2f32] transition-colors shadow-xl">
                                View Jobs
                            </button>
                            <button class="border-2 border-black text-black px-10 py-4 font-['Zhi_Mang_Xing'] text-2xl hover:bg-black hover:text-white transition-all">
                                Protocol
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Trigger reveal on load
        window.addEventListener('load', () => {
            const nodes = document.querySelectorAll('.reveal-node');
            setTimeout(() => {
                nodes.forEach(node => node.classList.add('reveal-active'));
            }, 200);
        });

        // Sumi-e Ink Drop Effect
        const inkContainer = document.getElementById('ink-container');
        for (let i = 0; i < 15; i++) {
            const drop = document.createElement('div');
            drop.className = 'ink-drop';
            drop.style.left = Math.random() * 100 + '%';
            const size = (Math.random() * 4 + 2) + 'px';
            drop.style.width = size;
            drop.style.height = size;
            drop.style.animationDelay = Math.random() * 15 + 's';
            drop.style.animationDuration = (Math.random() * 10 + 15) + 's';
            inkContainer.appendChild(drop);
        }
    </script>
    
    <script src="/dprt/styling/auth.js"></script>
</body>
</html>
